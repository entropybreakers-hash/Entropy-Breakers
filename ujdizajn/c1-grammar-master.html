<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Grammar Master · C1 | Entropy Breakers</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}

:root{
  --bg:#ffffff;
  --bg2:#faf8f3;
  --bg3:#f0ebe3;
  --cream:#1a1612;
  --cream2:#5a5248;
  --dim:#8a8075;
  --dimmer:#b5aa9a;
  --orange:#c9671f;
  --orange2:#a85418;
  --border:rgba(26,22,18,0.06);
  --border2:rgba(26,22,18,0.12);
}

body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--cream);
  min-height:100vh;
  display:flex;flex-direction:column;
  -webkit-font-smoothing:antialiased;
  line-height:1.5;
}

.accent{color:var(--orange);font-weight:500}

/* ───── NAV ───── */
nav{
  height:56px;padding:0 40px;flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  background:#0a0806;
  border-bottom:1px solid rgba(240,235,227,0.08);
}
.logo{
  font-size:11px;font-weight:500;letter-spacing:.24em;
  text-transform:uppercase;color:#f0ebe3;
  display:flex;align-items:baseline;gap:5px;
  text-decoration:none;
}
.logo .accent{
  color:var(--orange);
  font-weight:600;letter-spacing:.24em;
}
.nav-right{display:flex;align-items:center;gap:20px}
.nav-greeting{
  font-size:11px;letter-spacing:.14em;
  text-transform:uppercase;color:#c8c1b8;
}
.nav-greeting b{color:var(--orange);font-weight:500}
.nav-btn{
  font-size:10px;font-weight:500;letter-spacing:.18em;
  text-transform:uppercase;color:#f0ebe3;
  background:transparent;
  border:1px solid rgba(240,235,227,0.14);
  padding:8px 18px;border-radius:60px;
  cursor:pointer;transition:all .3s;
  font-family:inherit;text-decoration:none;
  display:inline-flex;align-items:center;gap:6px;
}
.nav-btn:hover{border-color:var(--orange);color:var(--orange)}
.nav-btn-arrow{
  font-family:'Inter',sans-serif;
  font-size:16px;font-weight:300;
}

/* ───── MAIN ───── */
main{
  flex:1;display:flex;align-items:center;justify-content:center;
  padding:32px 24px;
}

/* ───── MODULE HEADER (compact) ───── */
.module-frame{
  width:100%;max-width:480px;
  display:flex;flex-direction:column;gap:20px;
}

.module-head{
  text-align:center;
}
.module-badge{
  display:inline-block;
  font-size:10px;font-weight:500;letter-spacing:.24em;
  text-transform:uppercase;color:var(--orange);
  padding:5px 14px;border-radius:60px;
  border:1px solid rgba(201,103,31,0.3);
  background:rgba(201,103,31,0.05);
  margin-bottom:12px;
}
.module-title{
  font-family:'Inter',sans-serif;
  font-size:clamp(26px,4vw,34px);
  font-weight:500;line-height:1.1;
  letter-spacing:-.03em;color:var(--cream);
}
.module-subtitle{
  font-size:12px;color:var(--cream2);
  margin-top:6px;letter-spacing:.02em;
}

/* ───── PROGRESS ───── */
.progress-wrap{max-width:380px;margin:0 auto;width:100%}
.progress-row{
  display:flex;align-items:center;justify-content:space-between;
  font-size:10px;letter-spacing:.2em;text-transform:uppercase;
  color:var(--dim);margin-bottom:8px;
}
.progress-row .category{
  color:var(--cream2);font-weight:500;
  max-width:70%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.progress-track{
  width:100%;height:2px;
  background:var(--border);border-radius:999px;overflow:hidden;
}
.progress-fill{
  height:100%;background:var(--orange);
  transition:width .5s cubic-bezier(.2,.8,.2,1);
}

/* ───── QUIZ CARD ───── */
.quiz-card{
  width:100%;max-width:520px;margin:0 auto;
  background:var(--bg2);
  border:1px solid var(--border2);
  border-radius:6px;
  padding:32px 28px;
}
.quiz-question{
  font-family:'Inter',sans-serif;
  font-size:clamp(17px,2.5vw,22px);
  font-weight:500;line-height:1.35;
  letter-spacing:-.01em;
  color:var(--cream);
  text-align:center;
  margin-bottom:24px;
}
.quiz-options{
  display:flex;flex-direction:column;gap:10px;
}
.quiz-option{
  font-family:'Inter',sans-serif;
  font-size:14px;font-weight:500;
  color:var(--cream);
  background:#ffffff;
  border:1px solid var(--border2);
  border-radius:4px;
  padding:12px 16px;
  cursor:pointer;
  transition:all .2s;
  text-align:left;
  width:100%;
}
.quiz-option:hover:not(:disabled){
  border-color:var(--orange);
  color:var(--orange);
}
.quiz-option:disabled{cursor:default}
.quiz-option.correct{
  background:rgba(45,134,89,0.08);
  border-color:#2d8659;
  color:#2d8659;
}
.quiz-option.wrong{
  background:rgba(183,52,52,0.06);
  border-color:#b73434;
  color:#b73434;
}
.quiz-feedback{
  font-family:'Inter',sans-serif;
  font-size:12px;
  color:var(--cream2);
  line-height:1.45;
  text-align:center;
  margin-top:16px;
  min-height:18px;
}
.quiz-feedback.show{color:var(--orange)}

/* ───── FLIP CARD (legacy) ───── */
.flip-container{
  perspective:1200px;
  width:100%;max-width:380px;
  margin:0 auto;
  height:200px;
  cursor:pointer;
}
.flip-inner{
  position:relative;width:100%;height:100%;
  transition:transform .6s cubic-bezier(.2,.8,.2,1);
  transform-style:preserve-3d;
}
.flip-inner.is-flipped{transform:rotateY(180deg)}

.flip-face{
  position:absolute;inset:0;
  backface-visibility:hidden;
  border-radius:6px;
  padding:24px 22px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;
}
.flip-front{
  background:var(--bg2);
  border:1px solid var(--border2);
}
.flip-back{
  background:var(--bg2);
  border:1px solid var(--border2);
  transform:rotateY(180deg);
}

.face-label{
  font-size:8px;font-weight:500;letter-spacing:.3em;
  text-transform:uppercase;
  margin-bottom:10px;
  color:var(--dim);
}

.face-word{
  font-family:'Inter',sans-serif;
  font-size:clamp(22px,3.5vw,30px);
  font-weight:500;line-height:1.1;
  letter-spacing:-.03em;
  max-width:100%;
  word-wrap:break-word;
}
.flip-front .face-word{color:var(--cream)}
.flip-back .face-word{color:var(--orange)}

.face-example{
  font-family:'Inter',sans-serif;
  font-size:11px;
  max-width:100%;
  line-height:1.45;
  color:var(--cream2);
  position:absolute;
  bottom:14px;left:16px;right:16px;
  padding:0 8px;
}
.face-example::before,.face-example::after{
  content:'"';color:var(--orange);
  font-size:14px;
}

.flip-hint{
  position:absolute;bottom:10px;left:0;right:0;
  font-size:8px;font-weight:500;letter-spacing:.24em;
  text-transform:uppercase;opacity:.4;
  color:var(--dim);
}

/* ───── NAV BUTTONS ───── */
.nav-row{
  display:flex;align-items:center;justify-content:center;
  gap:16px;max-width:380px;margin:0 auto;width:100%;
}
.arrow-btn{
  width:38px;height:38px;flex-shrink:0;
  background:transparent;
  border:1px solid var(--border2);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .3s;
  color:var(--cream);
  font-family:'Inter',sans-serif;
  font-size:16px;font-weight:400;
}
.arrow-btn:hover{
  border-color:var(--orange);
  color:var(--orange);
}
.arrow-btn:disabled{opacity:.3;cursor:not-allowed;pointer-events:none}

.nav-hint{
  flex:1;text-align:center;
  font-size:10px;font-weight:500;letter-spacing:.2em;
  text-transform:uppercase;color:var(--dim);
}

/* ───── ACTION BUTTONS ───── */
.action-row{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
  max-width:380px;margin:0 auto;width:100%;
}
.action-btn{
  padding:12px 18px;
  font-size:10px;font-weight:500;letter-spacing:.2em;
  text-transform:uppercase;
  font-family:inherit;
  border-radius:4px;
  cursor:pointer;transition:all .3s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.action-btn.secondary{
  background:transparent;
  border:1px solid var(--border2);
  color:var(--cream);
}
.action-btn.secondary:hover{
  border-color:var(--orange);color:var(--orange);
}
.action-btn.primary{
  background:var(--orange);
  border:1px solid var(--orange);
  color:#fff;
}
.action-btn.primary:hover{
  background:var(--orange2);border-color:var(--orange2);
}

/* ───── RESULT SCREEN ───── */
.result-screen{
  display:none;text-align:center;width:100%;max-width:560px;
}
.result-screen.active{display:block;animation:fadeUp .6s ease both}
.result-badge{
  display:inline-block;
  font-size:10px;font-weight:500;letter-spacing:.3em;
  text-transform:uppercase;color:var(--orange);
  padding:6px 16px;border-radius:60px;
  border:1px solid rgba(201,103,31,0.3);
  background:rgba(201,103,31,0.05);
  margin-bottom:24px;
}
.result-title{
  font-family:'Inter',sans-serif;
  font-size:clamp(28px,4vw,38px);
  font-weight:500;line-height:1.1;
  letter-spacing:-.03em;color:var(--cream);
  margin-bottom:14px;
}
.result-name{color:var(--orange);font-weight:500}
.result-subtitle{
  font-family:'Inter',sans-serif;
  font-size:15px;color:var(--cream2);
  margin-bottom:32px;line-height:1.5;
}
.result-stats{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:6px;
  padding:32px 24px;margin-bottom:28px;
}
.result-number{
  font-family:'Inter',sans-serif;
  font-size:clamp(60px,10vw,96px);
  font-weight:600;color:var(--orange);
  line-height:1;letter-spacing:-.04em;
}
.result-meta{
  font-size:10px;letter-spacing:.24em;
  text-transform:uppercase;color:var(--dim);
  margin-top:10px;
}
.result-feedback{
  font-family:'Inter',sans-serif;
  font-size:16px;
  color:var(--cream2);margin-top:18px;
  max-width:360px;margin-left:auto;margin-right:auto;
  line-height:1.45;
}

/* ───── FOOTER ───── */
footer{
  background:#0a0806;
  padding:24px 40px;flex-shrink:0;
  border-top:1px solid rgba(240,235,227,0.08);
}
.footer-inner{
  max-width:980px;margin:0 auto;
  display:flex;align-items:center;justify-content:space-between;
  gap:24px;flex-wrap:wrap;
}
.footer-brand{
  font-size:11px;font-weight:500;letter-spacing:.24em;
  text-transform:uppercase;color:#f0ebe3;
  display:flex;align-items:baseline;gap:5px;
}
.footer-brand .accent{
  color:var(--orange);
  font-weight:600;letter-spacing:.24em;
}
.footer-tagline{
  font-family:'Inter',sans-serif;
  font-size:11px;color:#c8c1b8;font-weight:500;
  letter-spacing:.2em;text-transform:uppercase;
}

/* ───── ANIMATIONS ───── */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}
.module-frame.active{animation:fadeUp .5s ease both}

/* ───── MOBILE ───── */
@media (max-width:640px){
  nav{padding:0 20px;height:52px}
  .nav-greeting{display:none}
  main{padding:20px 16px}
  .module-frame{gap:16px}
  .flip-container{height:180px;max-width:320px}
  .flip-face{padding:20px 18px}
  .face-word{font-size:clamp(20px,5vw,26px)}
  .face-example{font-size:11px;margin-top:8px}
  footer{padding:18px 20px}
  .footer-tagline{display:none}
}
</style>
</head>
<body>

<nav>

<!-- ══════════ MAIN ══════════ -->
<main>

</main>

<footer>
  <div class="footer-inner">

<script>
const MAKE_WEBHOOK_URL = "https://hook.eu1.make.com/ww4obw8ghb8h46ti1gi6yoy2qg1db7ad";

const MODULE_META = {
  title: "C1 - Grammar Master",
  level: "C1",

};

const CARDS = [
  { cat:"Hungarian-angol hibák", question:"Hungarian logika: 'Jól érzem magam.'", options:["I feel good / I am having a great time.", "I feel myself well.", "I feel me good.", "I am feeling myself."], correct:0, explanation:"Hiba: A 'feel' angolul nem visszaható ige. A 'myself' használata tükörfordítás a magyarból." },
  { cat:"Hungarian-angol hibák", question:"Hungarian logika: 'Hogy hívják ezt?'", options:["What is this called?", "How is this called?", "How do you name this?", "What's the name?"], correct:0, explanation:"Hiba: In English a 'What' kérdőszót használjuk a név megkérdezésére, sosem a 'How'-t." },
  { cat:"Hungarian-angol hibák", question:"Hungarian logika: 'Ez tőled függ.'", options:["It depends on you.", "It depends from you.", "It hangs on you.", "It stays with you."], correct:0, explanation:"Vonzat: depend on, nem depend from." },
  { cat:"Hungarian-angol hibák", question:"Hogyan válaszolnál a legtermészetesebben a 'How are you?' kérdésre?", options:["Can't complain, things are looking up!", "I am fine, and you?", "I am well, thanks.", "Not bad."], correct:0, explanation:"A természetes, idiomatikus válaszok C1 szinten erősebbek, mint a túl tankönyviek." },
  { cat:"Hungarian-angol hibák", question:"Hungarian logika: 'Ez eszembe jutott.'", options:["It occurred to me / It crossed my mind.", "It came into my head.", "It jumped in my mind.", "I got it into my brain."], correct:0, explanation:"Az 'occur to me' és a 'cross my mind' a helyes, természetes angol szerkezet." },
  { cat:"Hungarian-angol hibák", question:"Hogyan zárnál le egy professzionális C1-es levelet?", options:["I am looking forward to hearing from you.", "I wait for your reply.", "Give me your answer please.", "Reply to me soon!"], correct:0, explanation:"A 'look forward to' után -ing alak jön, és ez a legtermészetesebb lezárás." },
  { cat:"Hungarian-angol hibák", question:"Hungarian logika: 'Sokat tanultam a hibáimból.'", options:["I have gained a lot of insight from my mistakes.", "I learned much from my mistakes.", "Insight was learned by me.", "Many wrongs taught me."], correct:0, explanation:"A 'gain insight' választékosabb, fejlettebb megfogalmazás." },
  { cat:"Hungarian-angol hibák", question:"Melyik idiómát használnád, ha bizonytalan vagy két lehetőség között?", options:["I'm in two minds about this.", "I can't decide.", "I don't know the choice.", "Decision is hard."], correct:0, explanation:"'In two minds' = kételkedem, bizonytalan vagyok." },
  { cat:"Hungarian-angol hibák", question:"Hungarian logika: 'Elegem van belőle.'", options:["I'm fed up with it.", "I have enough from it.", "I am full with this.", "Enough is this."], correct:0, explanation:"A helyes szerkezet: fed up with something." },
  { cat:"Hungarian-angol hibák", question:"Melyik a helyes reported speech forma: 'He promised he will come.'", options:["He promised he would come.", "He promised he will come.", "He said he comes.", "He is coming he said."], correct:0, explanation:"Függő beszédben a will általában would-ra változik." },
  { cat:"Hungarian-angol hibák", question:"Hungarian logika: 'Gyakorolnom kell az angolt.' (Felfrissíteni)", options:["I need to brush up on my English.", "I must practice English.", "I have to do English.", "More English needed."], correct:0, explanation:"'Brush up on' = felfrissíteni a meglévő tudást." },
  { cat:"Hungarian-angol hibák", question:"Hogyan kérnél elnézést választékosan a késésért?", options:["Please accept my apologies for the delay.", "I am sorry for my late.", "Sorry I'm late.", "My late is bad."], correct:0, explanation:"Ez a legprofibb és legtermészetesebb megoldás formális helyzetben." },
  { cat:"Hungarian-angol hibák", question:"Melyik szerkezet helyes egy dolog külsejének leírására?", options:["What does it look like? / How does it look?", "How is it look like?", "What is it look?", "Look like what?"], correct:0, explanation:"'What does it look like?' és 'How does it look?' helyes. A kettőt nem keverjük." },
  { cat:"Hungarian-angol hibák", question:"Hungarian logika: 'Közel lakom hozzád.'", options:["I live close to you.", "I live close from you.", "I am near from you.", "Close at you."], correct:0, explanation:"A helyes vonzat: close to." },
  { cat:"Hungarian-angol hibák", question:"Hogyan mondanád, hogy 'Végül sikerült' (választékosan)?", options:["I eventually succeeded in doing it.", "Finally I did it.", "At the end I won.", "In the finish I made it."], correct:0, explanation:"'Eventually succeeded' sokkal természetesebb és erősebb C1 megoldás." },
  { cat:"Hungarian-angol hibák", question:"Hungarian logika: 'Gratulálok a vizsgádhoz.'", options:["Congratulations on passing your exam.", "Congrats for your exam.", "I congratulate to you.", "Good for your test."], correct:0, explanation:"A helyes szerkezet: congratulate someone on something." },
  { cat:"Hungarian-angol hibák", question:"Melyik kifejezés a legjobb egy C1 szintű vitában véleményünk bevezetésére?", options:["I am of the opinion that this is accurate.", "I think it is true.", "In my brain it is true.", "Me think true."], correct:0, explanation:"A 'I am of the opinion that...' kifinomult, formális megoldás." },
  { cat:"Hungarian-angol hibák", question:"Hungarian logika: 'Unom már ezt.'", options:["I am bored with this.", "I am bored from this.", "I am boring.", "I have boredom."], correct:0, explanation:"A bored with/of helyes, a bored from hibás." },
  { cat:"Hungarian-angol hibák", question:"Hungarian logika: 'Kölcsönkértem tőle egy tollat.'", options:["I borrowed a pen from him.", "I borrowed him a pen.", "I lent from him a pen.", "I took him a pen."], correct:0, explanation:"Borrow from someone; lend to someone." },
  { cat:"Hungarian-angol hibák", question:"Hungarian logika: 'Vitatkoztunk a tervről.' (Megbeszéltük)", options:["We discussed the plan.", "We discussed about the plan.", "We talked the plan.", "Discussing was on."], correct:0, explanation:"A discuss után nem kell about." },

let studentName = '';
let cardList = [...CARDS];
let currentIndex = 0;
let isFlipped = false;

// Read student name from URL
(function() {
  const params = new URLSearchParams(window.location.search);
  const urlName = params.get('name');
  if (urlName) {
    studentName = decodeURIComponent(urlName);
  } else {
    // No name = send them back to login
    window.location.href = 'index.html';
    return;
  }
  document.getElementById('nav-name').textContent = studentName;

  // Preserve name on back link
  const nameParam = '?name=' + encodeURIComponent(studentName);
  document.getElementById('back-link').setAttribute('href', 'index.html' + nameParam);
  document.getElementById('logo-link').setAttribute('href', 'index.html' + nameParam);

  renderCard();
})();

let score = 0;
let answered = false;
const answersLog = [];

function renderCard() {
  const card = cardList[currentIndex];
  const total = cardList.length;

  document.getElementById('counter').textContent = `${currentIndex + 1} / ${total}`;
  document.getElementById('progress-fill').style.width = `${((currentIndex + 1) / total) * 100}%`;
  document.getElementById('cat-label').textContent = card.cat || '—';
  document.getElementById('quiz-question').textContent = card.question;

  const optionsDiv = document.getElementById('quiz-options');
  optionsDiv.innerHTML = '';
  card.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'quiz-option';
    btn.textContent = opt;
    btn.onclick = () => selectOption(i);
    optionsDiv.appendChild(btn);
  });

  document.getElementById('quiz-feedback').textContent = '';
  document.getElementById('quiz-feedback').classList.remove('show');
  answered = false;
}

function selectOption(chosen) {
  if (answered) return;
  const card = cardList[currentIndex];
  const buttons = document.querySelectorAll('.quiz-option');
  buttons.forEach(b => b.disabled = true);

  const isCorrect = (chosen === card.correct);
  if (isCorrect) {
    buttons[chosen].classList.add('correct');
    score++;
  } else {
    buttons[chosen].classList.add('wrong');
    buttons[card.correct].classList.add('correct');
  }

  answersLog.push({
    question: card.question,
    correct: card.options[card.correct],
    student: card.options[chosen],
    isCorrect: isCorrect
  });

  if (card.explanation) {
    const fb = document.getElementById('quiz-feedback');
    fb.textContent = card.explanation;
    fb.classList.add('show');
  }
  answered = true;

  // Automatikusan tovább 1.5 mp múlva
  setTimeout(() => {
    if (currentIndex < cardList.length - 1) nextCard();
    else showResult();
  }, 1800);
}

function flipCard() {}

function nextCard() {
  if (currentIndex < cardList.length - 1) {
    currentIndex++;
    renderCard();
  } else {
    showResult();
  }
}

function prevCard() {
  if (currentIndex > 0) {
    currentIndex--;
    renderCard();
  }
}

function shuffleCards() {
  for (let i = cardList.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [cardList[i], cardList[j]] = [cardList[j], cardList[i]];
  }
  currentIndex = 0;
  renderCard();
}

function showResult() {
  document.getElementById('card-screen').style.display = 'none';
  document.getElementById('result-screen').classList.add('active');

  const seen = currentIndex + 1;
  const total = cardList.length;
  const pct = Math.round((seen / total) * 100);

  document.getElementById('result-name').textContent = studentName;
  document.getElementById('result-count').textContent = score;

  let feedback = '';
  if (pct === 100) {
    feedback = 'Végigmentél az összes szón. Szuper munka!';
  } else if (pct >= 60) {
    feedback = 'Szép haladás. Még pár kör, és rögzül!';
  } else {
    feedback = 'Jó kezdés. Térj vissza hamarosan — az ismétlés a kulcs.';
  }
  document.getElementById('result-feedback').textContent = feedback;

  // Send to Make webhook (silently — ignore failures)
  fetch(MAKE_WEBHOOK_URL, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      Student: studentName,
      Quiz: MODULE_META.title,
      Score: seen,
      TotalQuestions: total,
      Level: MODULE_META.level,
      Skill: MODULE_META.skill,
      Percentage: pct,
      CompletedAt: new Date().toISOString()
    })
  }).catch(() => {});
}

function restartFromStart() {
  currentIndex = 0;
  score = 0;
  answersLog.length = 0;
  document.getElementById('result-screen').classList.remove('active');
  document.getElementById('card-screen').style.display = 'flex';
  renderCard();
}

function shuffleAndRestart() {
  shuffleCards();
  score = 0;
  answersLog.length = 0;
  document.getElementById('result-screen').classList.remove('active');
  document.getElementById('card-screen').style.display = 'flex';
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (document.getElementById('result-screen').classList.contains('active')) return;
  if (e.key === 'ArrowRight') nextCard();
  if (e.key === 'ArrowLeft') prevCard();
  if (e.key === ' ') { e.preventDefault(); flipCard(); }
});
</script>
