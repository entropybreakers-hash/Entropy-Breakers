<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Grammar Master · B1 | Entropy Breakers</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}

:root{
  --bg:#ffffff;
  --bg2:#faf8f3;
  --bg3:#f0ebe3;
  --cream:#1a1612;
  --cream2:#5a5248;
  --dim:#8a8075;
  --dimmer:#b5aa9a;
  --orange:#c9671f;
  --orange2:#a85418;
  --border:rgba(26,22,18,0.06);
  --border2:rgba(26,22,18,0.12);
}

body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--cream);
  min-height:100vh;
  display:flex;flex-direction:column;
  -webkit-font-smoothing:antialiased;
  line-height:1.5;
}

.accent{color:var(--orange);font-weight:500}

/* ───── NAV ───── */
nav{
  height:56px;padding:0 40px;flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  background:#0a0806;
  border-bottom:1px solid rgba(240,235,227,0.08);
}
.logo{
  font-size:11px;font-weight:500;letter-spacing:.24em;
  text-transform:uppercase;color:#f0ebe3;
  display:flex;align-items:baseline;gap:5px;
  text-decoration:none;
}
.logo .accent{
  color:var(--orange);
  font-weight:600;letter-spacing:.24em;
}
.nav-right{display:flex;align-items:center;gap:20px}
.nav-greeting{
  font-size:11px;letter-spacing:.14em;
  text-transform:uppercase;color:#c8c1b8;
}
.nav-greeting b{color:var(--orange);font-weight:500}
.nav-btn{
  font-size:10px;font-weight:500;letter-spacing:.18em;
  text-transform:uppercase;color:#f0ebe3;
  background:transparent;
  border:1px solid rgba(240,235,227,0.14);
  padding:8px 18px;border-radius:60px;
  cursor:pointer;transition:all .3s;
  font-family:inherit;text-decoration:none;
  display:inline-flex;align-items:center;gap:6px;
}
.nav-btn:hover{border-color:var(--orange);color:var(--orange)}
.nav-btn-arrow{
  font-family:'Inter',sans-serif;
  font-size:16px;font-weight:300;
}

/* ───── MAIN ───── */
main{
  flex:1;display:flex;align-items:center;justify-content:center;
  padding:32px 24px;
}

/* ───── MODULE HEADER (compact) ───── */
.module-frame{
  width:100%;max-width:540px;
  display:flex;flex-direction:column;gap:20px;
}

.module-head{
  text-align:center;
}
.module-badge{
  display:inline-block;
  font-size:10px;font-weight:500;letter-spacing:.24em;
  text-transform:uppercase;color:var(--orange);
  padding:5px 14px;border-radius:60px;
  border:1px solid rgba(201,103,31,0.3);
  background:rgba(201,103,31,0.05);
  margin-bottom:12px;
}
.module-title{
  font-family:'Inter',sans-serif;
  font-size:clamp(26px,4vw,34px);
  font-weight:500;line-height:1.1;
  letter-spacing:-.03em;color:var(--cream);
}
.module-subtitle{
  font-size:12px;color:var(--cream2);
  margin-top:6px;letter-spacing:.02em;
}

/* ───── PROGRESS ───── */
.progress-wrap{max-width:380px;margin:0 auto;width:100%}
.progress-row{
  display:flex;align-items:center;justify-content:space-between;
  font-size:10px;letter-spacing:.2em;text-transform:uppercase;
  color:var(--dim);margin-bottom:8px;
}
.progress-row .category{
  color:var(--cream2);font-weight:500;
  max-width:70%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.progress-track{
  width:100%;height:2px;
  background:var(--border);border-radius:999px;overflow:hidden;
}
.progress-fill{
  height:100%;background:var(--orange);
  transition:width .5s cubic-bezier(.2,.8,.2,1);
}

/* ───── QUIZ CARD ───── */
.quiz-card{
  width:100%;max-width:520px;margin:0 auto;
  background:var(--bg2);
  border:1px solid var(--border2);
  border-radius:6px;
  padding:32px 28px;
}
.quiz-question{
  font-family:'Inter',sans-serif;
  font-size:clamp(17px,2.5vw,22px);
  font-weight:500;line-height:1.35;
  letter-spacing:-.01em;
  color:var(--cream);
  text-align:center;
  margin-bottom:24px;
}
.quiz-options{
  display:flex;flex-direction:column;gap:10px;
}
.quiz-option{
  font-family:'Inter',sans-serif;
  font-size:14px;font-weight:500;
  color:var(--cream);
  background:#ffffff;
  border:1px solid var(--border2);
  border-radius:4px;
  padding:12px 16px;
  cursor:pointer;
  transition:all .2s;
  text-align:left;
  width:100%;
}
.quiz-option:hover:not(:disabled){
  border-color:var(--orange);
  color:var(--orange);
}
.quiz-option:disabled{cursor:default}
.quiz-option.correct{
  background:rgba(45,134,89,0.08);
  border-color:#2d8659;
  color:#2d8659;
}
.quiz-option.wrong{
  background:rgba(183,52,52,0.06);
  border-color:#b73434;
  color:#b73434;
}
.quiz-feedback{
  font-family:'Inter',sans-serif;
  font-size:12px;
  color:var(--cream2);
  line-height:1.45;
  text-align:center;
  margin-top:16px;
  min-height:18px;
}
.quiz-feedback.show{color:var(--orange)}

/* ───── FLIP CARD (legacy) ───── */
.flip-container{
  perspective:1200px;
  width:100%;max-width:380px;
  margin:0 auto;
  height:200px;
  cursor:pointer;
}
.flip-inner{
  position:relative;width:100%;height:100%;
  transition:transform .6s cubic-bezier(.2,.8,.2,1);
  transform-style:preserve-3d;
}
.flip-inner.is-flipped{transform:rotateY(180deg)}

.flip-face{
  position:absolute;inset:0;
  backface-visibility:hidden;
  border-radius:6px;
  padding:24px 22px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;
}
.flip-front{
  background:var(--bg2);
  border:1px solid var(--border2);
}
.flip-back{
  background:var(--bg2);
  border:1px solid var(--border2);
  transform:rotateY(180deg);
}

.face-label{
  font-size:8px;font-weight:500;letter-spacing:.3em;
  text-transform:uppercase;
  margin-bottom:10px;
  color:var(--dim);
}

.face-word{
  font-family:'Inter',sans-serif;
  font-size:clamp(22px,3.5vw,30px);
  font-weight:500;line-height:1.1;
  letter-spacing:-.03em;
  max-width:100%;
  word-wrap:break-word;
}
.flip-front .face-word{color:var(--cream)}
.flip-back .face-word{color:var(--orange)}

.face-example{
  font-family:'Inter',sans-serif;
  font-size:11px;
  max-width:100%;
  line-height:1.45;
  color:var(--cream2);
  position:absolute;
  bottom:14px;left:16px;right:16px;
  padding:0 8px;
}
.face-example::before,.face-example::after{
  content:'"';color:var(--orange);
  font-size:14px;
}

.flip-hint{
  position:absolute;bottom:10px;left:0;right:0;
  font-size:8px;font-weight:500;letter-spacing:.24em;
  text-transform:uppercase;opacity:.4;
  color:var(--dim);
}

/* ───── NAV BUTTONS ───── */
.nav-row{
  display:flex;align-items:center;justify-content:center;
  gap:16px;max-width:380px;margin:0 auto;width:100%;
}
.arrow-btn{
  width:38px;height:38px;flex-shrink:0;
  background:transparent;
  border:1px solid var(--border2);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .3s;
  color:var(--cream);
  font-family:'Inter',sans-serif;
  font-size:16px;font-weight:400;
}
.arrow-btn:hover{
  border-color:var(--orange);
  color:var(--orange);
}
.arrow-btn:disabled{opacity:.3;cursor:not-allowed;pointer-events:none}

.nav-hint{
  flex:1;text-align:center;
  font-size:10px;font-weight:500;letter-spacing:.2em;
  text-transform:uppercase;color:var(--dim);
}

/* ───── ACTION BUTTONS ───── */
.action-row{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
  max-width:380px;margin:0 auto;width:100%;
}
.action-row.action-row-3{
  grid-template-columns:1fr 1fr 1fr;
  max-width:480px;
}
.action-btn{
  padding:12px 18px;
  font-size:10px;font-weight:500;letter-spacing:.2em;
  text-transform:uppercase;
  font-family:inherit;
  border-radius:4px;
  cursor:pointer;transition:all .3s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.action-btn.secondary{
  background:transparent;
  border:1px solid var(--border2);
  color:var(--cream);
}
.action-btn.secondary:hover{
  border-color:var(--orange);color:var(--orange);
}
.action-btn.primary{
  background:var(--orange);
  border:1px solid var(--orange);
  color:#fff;
}
.action-btn.primary:hover{
  background:var(--orange2);border-color:var(--orange2);
}

/* ───── RESULT SCREEN ───── */
.result-screen{
  display:none;text-align:center;width:100%;max-width:560px;
}
.result-screen.active{display:block;animation:fadeUp .6s ease both}
.result-badge{
  display:inline-block;
  font-size:10px;font-weight:500;letter-spacing:.3em;
  text-transform:uppercase;color:var(--orange);
  padding:6px 16px;border-radius:60px;
  border:1px solid rgba(201,103,31,0.3);
  background:rgba(201,103,31,0.05);
  margin-bottom:24px;
}
.result-title{
  font-family:'Inter',sans-serif;
  font-size:clamp(28px,4vw,38px);
  font-weight:500;line-height:1.1;
  letter-spacing:-.03em;color:var(--cream);
  margin-bottom:14px;
}
.result-name{color:var(--orange);font-weight:500}
.result-subtitle{
  font-family:'Inter',sans-serif;
  font-size:15px;color:var(--cream2);
  margin-bottom:32px;line-height:1.5;
}
.result-stats{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:6px;
  padding:32px 24px;margin-bottom:28px;
}
.result-number{
  font-family:'Inter',sans-serif;
  font-size:clamp(60px,10vw,96px);
  font-weight:600;color:var(--orange);
  line-height:1;letter-spacing:-.04em;
}
.result-meta{
  font-size:10px;letter-spacing:.24em;
  text-transform:uppercase;color:var(--dim);
  margin-top:10px;
}
.result-feedback{
  font-family:'Inter',sans-serif;
  font-size:16px;
  color:var(--cream2);margin-top:18px;
  max-width:360px;margin-left:auto;margin-right:auto;
  line-height:1.45;
}

/* ───── FOOTER ───── */
footer{
  background:#0a0806;
  padding:24px 40px;flex-shrink:0;
  border-top:1px solid rgba(240,235,227,0.08);
}
.footer-inner{
  max-width:980px;margin:0 auto;
  display:flex;align-items:center;justify-content:space-between;
  gap:24px;flex-wrap:wrap;
}
.footer-brand{
  font-size:11px;font-weight:500;letter-spacing:.24em;
  text-transform:uppercase;color:#f0ebe3;
  display:flex;align-items:baseline;gap:5px;
}
.footer-brand .accent{
  color:var(--orange);
  font-weight:600;letter-spacing:.24em;
}
.footer-tagline{
  font-family:'Inter',sans-serif;
  font-size:11px;color:#c8c1b8;font-weight:500;
  letter-spacing:.2em;text-transform:uppercase;
}

/* ───── ANIMATIONS ───── */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}
.module-frame.active{animation:fadeUp .5s ease both}

/* ───── MOBILE ───── */
@media (max-width:640px){
  nav{padding:0 20px;height:52px}
  .nav-greeting{display:none}
  main{padding:20px 16px}
  .module-frame{gap:16px}
  .flip-container{height:180px;max-width:320px}
  .flip-face{padding:20px 18px}
  .face-word{font-size:clamp(20px,5vw,26px)}
  .face-example{font-size:11px;margin-top:8px}
  footer{padding:18px 20px}
  .footer-tagline{display:none}
}
</style>
</head>
<body>

<!-- ══════════ NAV ══════════ -->
<nav>
  <a href="index.html" class="logo" id="logo-link">Entropy <span class="accent">Breakers</span></a>
  <div class="nav-right">
    <span class="nav-greeting">Szia, <b id="nav-name">—</b></span>
    <a href="index.html" class="nav-btn" id="back-link"><span class="nav-btn-arrow">←</span> Vissza</a>

</nav>

<!-- ══════════ MAIN ══════════ -->
<main>

  <!-- KÁRTYA KÉPERNYŐ -->
  <div class="module-frame active" id="card-screen">

    <div class="module-head">

    <div class="progress-wrap">

        <span id="counter">1 / 50</span>

      <div class="progress-track">
        <div class="progress-fill" id="progress-fill" style="width:2%"></div>

      <div class="quiz-question" id="quiz-question">—</div>
      <div class="quiz-options" id="quiz-options"></div>

  <div class="result-screen" id="result-screen">

    </div>

    <div class="action-row">

      <button class="action-btn primary" onclick="shuffleAndRestart()">Új sorrend</button>

  </div>

</main>

<!-- ══════════ FOOTER ══════════ -->
<footer>
  <div class="footer-inner">
    <div class="footer-brand">Entropy <span class="accent">Breakers</span></div>
    <div class="footer-tagline">Gyakorlás · Ismétlés · <span class="accent">Fejlődés</span></div>
  </div>
</footer>

<script>
const MAKE_WEBHOOK_URL = "https://hook.eu1.make.com/ww4obw8ghb8h46ti1gi6yoy2qg1db7ad";

const MODULE_META = {
  title: "B1 - Grammar Master",
  level: "B1",
  skill: "Grammar"
};

const CARDS = [
  { cat:"Nyelvtan", question:"I __________ English since I was ten years old.", options:["studied", "was studying", "have studied", "study"], correct:2, explanation:"Present Perfect: A cselekvés a múltban kezdődött és ma is tart." },
  { cat:"Nyelvtan", question:"If it __________ tomorrow, we will stay at home.", options:["rains", "will rain", "rained", "is raining"], correct:0, explanation:"First Conditional: Az 'if' utáni tagmondatban jelen időt használunk." },
  { cat:"Nyelvtan", question:"She asked me where __________ from.", options:["I came", "did I come", "I come", "come I"], correct:0, explanation:"Reported speech: Függő kérdésben az igealak nem kérdő sorrendű." },
  { cat:"Nyelvtan", question:"By the time we arrived, the film __________.", options:["had already started", "already started", "has already started", "was already starting"], correct:0, explanation:"Past Perfect: Egy múltbeli cselekvés, amely egy másik előtt történt." },
  { cat:"Nyelvtan", question:"You __________ take an umbrella — it's not going to rain.", options:["don't have to", "mustn't", "shouldn't", "can't"], correct:0, explanation:"Don't have to: Nincs szükség rá, de nem tiltott." },
  { cat:"Nyelvtan", question:"The report __________ by the manager every month.", options:["is written", "writes", "is writing", "has written"], correct:0, explanation:"Passive voice (Present Simple): A cselekvés tárgya az alany." },
  { cat:"Nyelvtan", question:"I wish I __________ more time to travel.", options:["had", "have", "will have", "would have"], correct:0, explanation:"Wish + past simple: Jelenlegi valóságtól eltérő vágyat fejez ki." },
  { cat:"Nyelvtan", question:"He suggested __________ to the new restaurant.", options:["going", "to go", "go", "went"], correct:0, explanation:"Suggest + -ing: A 'suggest' után gerund (főnévi igenév -ing alakja) áll." },
  { cat:"Nyelvtan", question:"If I __________ you, I would apologize.", options:["were", "am", "was", "would be"], correct:0, explanation:"Second Conditional: Képzeletbeli helyzet — 'if I were you' fix kifejezés." },
  { cat:"Nyelvtan", question:"They __________ for three hours when the storm started.", options:["had been driving", "drove", "were driving", "have been driving"], correct:0, explanation:"Past Perfect Continuous: Folyamatban lévő múltbeli cselekvés, mielőtt egy másik bekövetkezett." },
  { cat:"Nyelvtan", question:"The new bridge __________ next year.", options:["will be opened", "will open", "is opening", "opens"], correct:0, explanation:"Future Passive: A jövőbeli cselekvés szenvedő szerkezetben." },
  { cat:"Nyelvtan", question:"I'd rather you __________ so loudly.", options:["didn't talk", "don't talk", "won't talk", "not talk"], correct:0, explanation:"I'd rather + past subjunctive: Mást kérünk meg valamire." },
  { cat:"Nyelvtan", question:"Despite __________ hard, she failed the exam.", options:["studying", "study", "studied", "to study"], correct:0, explanation:"Despite + -ing: A 'despite' elöljáró után gerund következik." },
  { cat:"Nyelvtan", question:"He __________ be at home — his car is in the driveway.", options:["must", "should", "might", "can"], correct:0, explanation:"Must: Logikai következtetés — majdnem biztosan igaz." },
  { cat:"Nyelvtan", question:"The letter __________ before I got to the office.", options:["had been sent", "was sent", "has been sent", "is sent"], correct:0, explanation:"Past Perfect Passive: Szenvedő szerkezet múlt idejű befejezett aspektussal." },
  { cat:"Nyelvtan", question:"She __________ to speak to the director when I saw her.", options:["was trying", "tried", "has tried", "tries"], correct:0, explanation:"Past Continuous: Folyamatban lévő cselekvés a múltban." },
  { cat:"Nyelvtan", question:"We need someone __________ can speak both French and English.", options:["who", "which", "whose", "whom"], correct:0, explanation:"Relative pronoun: 'who' személyekre vonatkozik." },
  { cat:"Nyelvtan", question:"I haven't seen her __________ last Monday.", options:["since", "for", "during", "ago"], correct:0, explanation:"Since: Egy konkrét időponttól kezdve (Present Perfect-tel)." },
  { cat:"Nyelvtan", question:"__________ the weather was bad, we enjoyed the trip.", options:["Although", "Despite", "However", "Because"], correct:0, explanation:"Although: Ellentétes tagmondat bevezetésére (+ mondat)." },
  { cat:"Nyelvtan", question:"He told me that he __________ the project the day before.", options:["had finished", "finished", "has finished", "would finish"], correct:0, explanation:"Reported speech: Az egyenes beszéd múlt idejű alakja past perfect lesz." },
  { cat:"Nyelvtan", question:"You look tired. You __________ get some rest.", options:["should", "must", "would", "shall"], correct:0, explanation:"Should: Tanács vagy javaslat kifejezése." },
  { cat:"Nyelvtan", question:"The book __________ I recommended is now a film.", options:["that", "who", "what", "whose"], correct:0, explanation:"Relative pronoun: 'that' tárgyakra és személyekre is vonatkozhat." },
  { cat:"Nyelvtan", question:"I'm used to __________ early every morning.", options:["getting up", "get up", "got up", "gets up"], correct:0, explanation:"Be used to + -ing: Megszokott cselekvést jelöl." },
  { cat:"Nyelvtan", question:"She __________ be a doctor when she grows up.", options:["is going to", "will", "would", "shall"], correct:0, explanation:"Be going to: Személyes szándékot vagy tervet fejez ki." },
  { cat:"Nyelvtan", question:"He __________ the window when the ball hit it.", options:["was cleaning", "cleaned", "has cleaned", "cleans"], correct:0, explanation:"Past Continuous: Folyamatban lévő cselekvés, amelyet egy másik megszakít." },
  { cat:"Nyelvtan", question:"This is the city __________ I was born.", options:["where", "which", "that", "who"], correct:0, explanation:"Relative adverb: 'where' helyre vonatkozik." },
  { cat:"Nyelvtan", question:"__________ you mind closing the window?", options:["Would", "Do", "Could", "Should"], correct:0, explanation:"Would you mind + -ing: Udvarias kérés formulája." },
  { cat:"Nyelvtan", question:"They __________ in Paris for five years before moving to London.", options:["had lived", "lived", "have lived", "were living"], correct:0, explanation:"Past Perfect: Múlt előtti cselekvés — megelőzte a londoni költözést." },
  { cat:"Nyelvtan", question:"The students __________ to bring their own dictionaries.", options:["were told", "told", "have told", "are told"], correct:0, explanation:"Passive voice (Past Simple): A cselekvés alanya nem fontos vagy ismeretlen." },
  { cat:"Nyelvtan", question:"I can't help __________ when I watch that film.", options:["laughing", "laugh", "to laugh", "laughed"], correct:0, explanation:"Can't help + -ing: Nem tudja megállni, hogy ne tegye." },
  { cat:"Nyelvtan", question:"__________ having a large salary, he was unhappy.", options:["In spite of", "Although", "Even though", "However"], correct:0, explanation:"In spite of + noun/gerund: Ellentét kifejezése főnévi szerkezettel." },
  { cat:"Nyelvtan", question:"You __________ have told me earlier — now it's too late.", options:["should", "must", "would", "could"], correct:0, explanation:"Should have + past participle: Múltbeli mulasztás kifejezése." },
  { cat:"Nyelvtan", question:"I don't know __________ she passed the test or not.", options:["whether", "if", "that", "what"], correct:0, explanation:"Whether: Kétféle lehetőség esetén használjuk, főleg 'or not'-tal." },
  { cat:"Nyelvtan", question:"The harder you work, __________ you will become.", options:["the better", "better", "the more better", "most better"], correct:0, explanation:"The + comparative … the + comparative: Párhuzamos fokozás." },
  { cat:"Nyelvtan", question:"She __________ for the job when she heard about the salary.", options:["had already applied", "already applied", "has already applied", "was already applying"], correct:0, explanation:"Past Perfect: A jelentkezés megelőzte a fizetésről való értesülést." },
  { cat:"Nyelvtan", question:"He admitted __________ the money from the till.", options:["taking", "to take", "take", "took"], correct:0, explanation:"Admit + -ing: Az 'admit' után gerund következik." },
  { cat:"Nyelvtan", question:"The concert __________ at eight o'clock sharp.", options:["starts", "is starting", "will start", "started"], correct:0, explanation:"Present Simple: Menetrend szerinti, rögzített jövőbeli esemény." },
  { cat:"Nyelvtan", question:"__________ she studied a lot, she didn't pass the exam.", options:["Even though", "Despite", "In spite of", "Because"], correct:0, explanation:"Even though: Erős ellentétet hangsúlyoz (+ teljes mondat)." },
  { cat:"Nyelvtan", question:"He is __________ to get the promotion — his work is excellent.", options:["likely", "probably", "surely", "maybe"], correct:0, explanation:"Likely (adjective): 'He is likely to' = valószínűleg meg fogja kapni." },
  { cat:"Nyelvtan", question:"We __________ finish the project by Friday if we start now.", options:["will be able to", "can", "could", "would"], correct:0, explanation:"Will be able to: Jövőbeli képesség kifejezése." },
];

let studentName = '';
let cardList = [...CARDS];
let currentIndex = 0;
let isFlipped = false;

// Read student name from URL
(function() {
  const params = new URLSearchParams(window.location.search);
  const urlName = params.get('name');
  if (urlName) {
    studentName = decodeURIComponent(urlName);
  } else {
    // No name = send them back to login
    window.location.href = 'index.html';
    return;
  }
  document.getElementById('nav-name').textContent = studentName;

  // Preserve name on back link
  const nameParam = '?name=' + encodeURIComponent(studentName);
  document.getElementById('back-link').setAttribute('href', 'index.html' + nameParam);
  document.getElementById('logo-link').setAttribute('href', 'index.html' + nameParam);

  renderCard();
})();

let score = 0;
let answered = false;
const answersLog = [];

function renderCard() {
  const card = cardList[currentIndex];
  const total = cardList.length;

  document.getElementById('counter').textContent = `${currentIndex + 1} / ${total}`;
  document.getElementById('progress-fill').style.width = `${((currentIndex + 1) / total) * 100}%`;
  document.getElementById('cat-label').textContent = card.cat || '—';
  document.getElementById('quiz-question').textContent = card.question;

  const optionsDiv = document.getElementById('quiz-options');
  optionsDiv.innerHTML = '';
  card.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'quiz-option';
    btn.textContent = opt;
    btn.onclick = () => selectOption(i);
    optionsDiv.appendChild(btn);
  });

  document.getElementById('quiz-feedback')?.classList.remove('show');
  answered = false;
}

function selectOption(chosen) {
  if (answered) return;
  const card = cardList[currentIndex];
  const isCorrect = (chosen === card.correct);
  if (isCorrect) score++;

  answersLog.push({
    question: card.question,
    correct: card.options[card.correct],
    student: card.options[chosen],
    isCorrect: isCorrect
  });

  answered = true;

  // Azonnal tovább — nincs visszajelzés
  if (currentIndex < cardList.length - 1) nextCard();
  else showResult();
}

function flipCard() {}

function nextCard() {
  if (currentIndex < cardList.length - 1) {
    currentIndex++;
    renderCard();
  } else {
    showResult();
  }
}

function prevCard() {
  if (currentIndex > 0) {
    currentIndex--;
    renderCard();
  }
}

function shuffleCards() {
  for (let i = cardList.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [cardList[i], cardList[j]] = [cardList[j], cardList[i]];
  }
  currentIndex = 0;
  renderCard();
}

function showResult() {
  document.getElementById('card-screen').style.display = 'none';
  document.getElementById('result-screen').classList.add('active');

  const seen = currentIndex + 1;
  const total = cardList.length;
  const pct = Math.round((seen / total) * 100);

  document.getElementById('result-name').textContent = studentName;
  document.getElementById('result-count').textContent = score;

  let feedback = '';
  if (pct === 100) {
    feedback = 'Végigmentél az összes szón. Szuper munka!';
  } else if (pct >= 60) {
    feedback = 'Szép haladás. Még pár kör, és rögzül!';
  } else {
    feedback = 'Jó kezdés. Térj vissza hamarosan — az ismétlés a kulcs.';
  }
  document.getElementById('result-feedback').textContent = feedback;

  // Send to Make webhook (silently — ignore failures)
  fetch(MAKE_WEBHOOK_URL, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      Student: studentName,
      Quiz: MODULE_META.title,
      Score: seen,
      TotalQuestions: total,
      Level: MODULE_META.level,
      Skill: MODULE_META.skill,
      Percentage: pct,
      CompletedAt: new Date().toISOString()
    })
  }).catch(() => {});
}

function restartFromStart() {
  currentIndex = 0;
  score = 0;
  answersLog.length = 0;
  document.getElementById('result-screen').classList.remove('active');
  document.getElementById('card-screen').style.display = 'flex';
  renderCard();
}

function shuffleAndRestart() {
  shuffleCards();
  score = 0;
  answersLog.length = 0;
  document.getElementById('result-screen').classList.remove('active');
  document.getElementById('card-screen').style.display = 'flex';
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (document.getElementById('result-screen').classList.contains('active')) return;
  if (e.key === 'ArrowRight') nextCard();
  if (e.key === 'ArrowLeft') prevCard();
  if (e.key === ' ') { e.preventDefault(); flipCard(); }
});
</script>
