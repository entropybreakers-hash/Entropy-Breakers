<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}

:root{
  --bg:#ffffff;
  --bg2:#faf8f3;
  --bg3:#f0ebe3;
  --cream:#1a1612;
  --cream2:#5a5248;
  --dim:#8a8075;
  --dimmer:#b5aa9a;
  --orange:#c9671f;
  --orange2:#a85418;
  --border:rgba(26,22,18,0.06);
  --border2:rgba(26,22,18,0.12);
}

body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--cream);
  min-height:100vh;
  display:flex;flex-direction:column;
  -webkit-font-smoothing:antialiased;
  line-height:1.5;
}

.accent{color:var(--orange);font-weight:500}

/* ───── NAV ───── */
nav{
  height:56px;padding:0 40px;flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  background:#0a0806;
  border-bottom:1px solid rgba(240,235,227,0.08);
}
.logo{
  font-size:11px;font-weight:500;letter-spacing:.24em;
  text-transform:uppercase;color:#f0ebe3;
  display:flex;align-items:baseline;gap:5px;
  text-decoration:none;
}
.logo .accent{
  color:var(--orange);
  font-weight:600;letter-spacing:.24em;
}
.nav-right{display:flex;align-items:center;gap:20px}
.nav-greeting{
  font-size:11px;letter-spacing:.14em;
  text-transform:uppercase;color:#c8c1b8;
}
.nav-greeting b{color:var(--orange);font-weight:500}
.nav-btn{
  font-size:10px;font-weight:500;letter-spacing:.18em;
  text-transform:uppercase;color:#f0ebe3;
  background:transparent;
  border:1px solid rgba(240,235,227,0.14);
  padding:8px 18px;border-radius:60px;
  cursor:pointer;transition:all .3s;
  font-family:inherit;text-decoration:none;
  display:inline-flex;align-items:center;gap:6px;
}
.nav-btn:hover{border-color:var(--orange);color:var(--orange)}
.nav-btn-arrow{
  font-family:'Inter',sans-serif;
  font-size:16px;font-weight:300;
}

/* ───── MAIN ───── */
main{
  flex:1;display:flex;align-items:center;justify-content:center;
  padding:32px 24px;
}

/* ───── MODULE HEADER (compact) ───── */
.module-frame{
  width:100%;max-width:480px;
  display:flex;flex-direction:column;gap:20px;
}

.module-head{
  text-align:center;
}
.module-badge{
  display:inline-block;
  font-size:10px;font-weight:500;letter-spacing:.24em;
  text-transform:uppercase;color:var(--orange);
  padding:5px 14px;border-radius:60px;
  border:1px solid rgba(201,103,31,0.3);
  background:rgba(201,103,31,0.05);
  margin-bottom:12px;
}
.module-title{
  font-family:'Inter',sans-serif;
  font-size:clamp(26px,4vw,34px);
  font-weight:500;line-height:1.1;
  letter-spacing:-.03em;color:var(--cream);
}
.module-subtitle{
  font-size:12px;color:var(--cream2);
  margin-top:6px;letter-spacing:.02em;
}

/* ───── PROGRESS ───── */
.progress-wrap{max-width:380px;margin:0 auto;width:100%}
.progress-row{
  display:flex;align-items:center;justify-content:space-between;
  font-size:10px;letter-spacing:.2em;text-transform:uppercase;
  color:var(--dim);margin-bottom:8px;
}
.progress-row .category{
  color:var(--cream2);font-weight:500;
  max-width:70%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.progress-track{
  width:100%;height:2px;
  background:var(--border);border-radius:999px;overflow:hidden;
}
.progress-fill{
  height:100%;background:var(--orange);
  transition:width .5s cubic-bezier(.2,.8,.2,1);
}

/* ───── FLIP CARD ───── */
.flip-container{
  perspective:1200px;
  width:100%;max-width:380px;
  margin:0 auto;
  height:200px;
  cursor:pointer;
}
.flip-inner{
  position:relative;width:100%;height:100%;
  transition:transform .6s cubic-bezier(.2,.8,.2,1);
  transform-style:preserve-3d;
}
.flip-inner.is-flipped{transform:rotateY(180deg)}

.flip-face{
  position:absolute;inset:0;
  backface-visibility:hidden;
  border-radius:6px;
  padding:24px 22px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;
}
.flip-front{
  background:var(--bg2);
  border:1px solid var(--border2);
}
.flip-back{
  background:var(--bg2);
  border:1px solid var(--border2);
  transform:rotateY(180deg);
}

.face-label{
  font-size:8px;font-weight:500;letter-spacing:.3em;
  text-transform:uppercase;
  margin-bottom:10px;
  color:var(--dim);
}

.face-word{
  font-family:'Inter',sans-serif;
  font-size:clamp(22px,3.5vw,30px);
  font-weight:500;line-height:1.1;
  letter-spacing:-.03em;
  max-width:100%;
  word-wrap:break-word;
}
.flip-front .face-word{color:var(--cream)}
.flip-back .face-word{color:var(--orange)}

.face-example{
  font-family:'Inter',sans-serif;
  font-size:11px;
  max-width:100%;
  line-height:1.45;
  color:var(--cream2);
  position:absolute;
  bottom:14px;left:16px;right:16px;
  padding:0 8px;
}
.face-example::before,.face-example::after{
  content:'"';color:var(--orange);
  font-size:14px;
}

.flip-hint{
  position:absolute;bottom:10px;left:0;right:0;
  font-size:8px;font-weight:500;letter-spacing:.24em;
  text-transform:uppercase;opacity:.4;
  color:var(--dim);
}

/* ───── NAV BUTTONS ───── */
.nav-row{
  display:flex;align-items:center;justify-content:center;
  gap:16px;max-width:380px;margin:0 auto;width:100%;
}
.arrow-btn{
  width:38px;height:38px;flex-shrink:0;
  background:transparent;
  border:1px solid var(--border2);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .3s;
  color:var(--cream);
  font-family:'Inter',sans-serif;
  font-size:16px;font-weight:400;
}
.arrow-btn:hover{
  border-color:var(--orange);
  color:var(--orange);
}
.arrow-btn:disabled{opacity:.3;cursor:not-allowed;pointer-events:none}

.nav-hint{
  flex:1;text-align:center;
  font-size:10px;font-weight:500;letter-spacing:.2em;
  text-transform:uppercase;color:var(--dim);
}

/* ───── ACTION BUTTONS ───── */
.action-row{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
  max-width:380px;margin:0 auto;width:100%;
}
.action-btn{
  padding:12px 18px;
  font-size:10px;font-weight:500;letter-spacing:.2em;
  text-transform:uppercase;
  font-family:inherit;
  border-radius:4px;
  cursor:pointer;transition:all .3s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.action-btn.secondary{
  background:transparent;
  border:1px solid var(--border2);
  color:var(--cream);
}
.action-btn.secondary:hover{
  border-color:var(--orange);color:var(--orange);
}
.action-btn.primary{
  background:var(--orange);
  border:1px solid var(--orange);
  color:#fff;
}
.action-btn.primary:hover{
  background:var(--orange2);border-color:var(--orange2);
}

/* ───── RESULT SCREEN ───── */
.result-screen{
  display:none;text-align:center;width:100%;max-width:560px;
}
.result-screen.active{display:block;animation:fadeUp .6s ease both}
.result-badge{
  display:inline-block;
  font-size:10px;font-weight:500;letter-spacing:.3em;
  text-transform:uppercase;color:var(--orange);
  padding:6px 16px;border-radius:60px;
  border:1px solid rgba(201,103,31,0.3);
  background:rgba(201,103,31,0.05);
  margin-bottom:24px;
}
.result-title{
  font-family:'Inter',sans-serif;
  font-size:clamp(28px,4vw,38px);
  font-weight:500;line-height:1.1;
  letter-spacing:-.03em;color:var(--cream);
  margin-bottom:14px;
}
.result-name{color:var(--orange);font-weight:500}
.result-subtitle{
  font-family:'Inter',sans-serif;
  font-size:15px;color:var(--cream2);
  margin-bottom:32px;line-height:1.5;
}
.result-stats{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:6px;
  padding:32px 24px;margin-bottom:28px;
}
.result-number{
  font-family:'Inter',sans-serif;
  font-size:clamp(60px,10vw,96px);
  font-weight:600;color:var(--orange);
  line-height:1;letter-spacing:-.04em;
}
.result-meta{
  font-size:10px;letter-spacing:.24em;
  text-transform:uppercase;color:var(--dim);
  margin-top:10px;
}
.result-feedback{
  font-family:'Inter',sans-serif;
  font-size:16px;
  color:var(--cream2);margin-top:18px;
  max-width:360px;margin-left:auto;margin-right:auto;
  line-height:1.45;
}

/* ───── FOOTER ───── */
footer{
  background:#0a0806;
  padding:24px 40px;flex-shrink:0;
  border-top:1px solid rgba(240,235,227,0.08);
}
.footer-inner{
  max-width:980px;margin:0 auto;
  display:flex;align-items:center;justify-content:space-between;
  gap:24px;flex-wrap:wrap;
}
.footer-brand{
  font-size:11px;font-weight:500;letter-spacing:.24em;
  text-transform:uppercase;color:#f0ebe3;
  display:flex;align-items:baseline;gap:5px;
}
.footer-brand .accent{
  color:var(--orange);
  font-weight:600;letter-spacing:.24em;
}
.footer-tagline{
  font-family:'Inter',sans-serif;
  font-size:11px;color:#c8c1b8;font-weight:500;
  letter-spacing:.2em;text-transform:uppercase;
}

/* ───── ANIMATIONS ───── */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}
.module-frame.active{animation:fadeUp .5s ease both}

/* ───── MOBILE ───── */
@media (max-width:640px){
  nav{padding:0 20px;height:52px}
  .nav-greeting{display:none}
  main{padding:20px 16px}
  .module-frame{gap:16px}
  .flip-container{height:180px;max-width:320px}
  .flip-face{padding:20px 18px}
  .face-word{font-size:clamp(20px,5vw,26px)}
  .face-example{font-size:11px;margin-top:8px}
  footer{padding:18px 20px}
  .footer-tagline{display:none}
}
</style>

<script>
const MAKE_WEBHOOK_URL = "https://hook.eu1.make.com/ww4obw8ghb8h46ti1gi6yoy2qg1db7ad";

const MODULE_META = {
  title: "B2 Vocabulary - Money & Finance",

const CARDS = [

  { cat:"Bankolás", hu:"Kamat", en:"Interest rate", example:"The interest rate on my savings is very low." },

  { cat:"Befektetés", hu:"Befektetés", en:"Investment", example:"Property is a good long-term investment." },
  { cat:"Befektetés", hu:"Részvény", en:"Share / Stock", example:"He bought shares in a tech company." },
  { cat:"Befektetés", hu:"Kötvény", en:"Bond", example:"Government bonds are considered low-risk." },

  { cat:"Befektetés", hu:"Hozam", en:"Return on investment", example:"The return on investment was higher than expected." },
  { cat:"Befektetés", hu:"Kockázat", en:"Risk", example:"All investments carry some degree of risk." },
  { cat:"Befektetés", hu:"Diverzifikáció", en:"Diversification", example:"Diversification reduces the overall risk of your portfolio." },
  { cat:"Ingatlan & Hitel", hu:"Jelzáloghitel", en:"Mortgage", example:"They took out a mortgage to buy the house." },
  { cat:"Ingatlan & Hitel", hu:"Előleg", en:"Down payment", example:"We saved for three years to pay the down payment." },
  { cat:"Ingatlan & Hitel", hu:"Kölcsön", en:"Loan", example:"She took out a loan to start her business." },
  { cat:"Ingatlan & Hitel", hu:"Visszafizet", en:"Repay", example:"It will take ten years to repay the loan." },
  { cat:"Ingatlan & Hitel", hu:"Adósság", en:"Debt", example:"He worked hard to get out of debt." },
  { cat:"Személyes pénzügy", hu:"Költségvetés", en:"Budget", example:"I set a monthly budget for food and transport." },
  { cat:"Személyes pénzügy", hu:"Kiadás", en:"Expenditure / Expense", example:"Our monthly expenditure has increased significantly." },
  { cat:"Személyes pénzügy", hu:"Bevétel", en:"Income", example:"Her income doubled after the promotion." },

  { cat:"Adók & Támogatás", hu:"Szubvenció", en:"Subsidy", example:"The government introduced subsidies for renewable energy." },
  { cat:"Adók & Támogatás", hu:"Dotáció", en:"Grant", example:"She received a grant to fund her research." },
  { cat:"Vállalati pénzügyek", hu:"Nyereség", en:"Profit", example:"The company made a large profit last year." },
  { cat:"Vállalati pénzügyek", hu:"Veszteség", en:"Loss", example:"The firm reported a loss of two million euros." },
  { cat:"Vállalati pénzügyek", hu:"Bevétel (vállalati)", en:"Revenue", example:"The company's revenue increased by 15% this quarter." },
  { cat:"Vállalati pénzügyek", hu:"Cash flow", en:"Cash flow", example:"Good cash flow is essential for a healthy business." },
  { cat:"Vállalati pénzügyek", hu:"Csőd", en:"Bankruptcy", example:"The company filed for bankruptcy after years of losses." },
];

let studentName = '';
let cardList = [...CARDS];
let currentIndex = 0;
let isFlipped = false;

// Read student name from URL
(function() {
  const params = new URLSearchParams(window.location.search);
  const urlName = params.get('name');
  if (urlName) {
    studentName = decodeURIComponent(urlName);
  } else {
    // No name = send them back to login
    window.location.href = 'index.html';
    return;
  }
  document.getElementById('nav-name').textContent = studentName;

  // Preserve name on back link, and include level so dashboard returns to same section
  const nameParam = '?name=' + encodeURIComponent(studentName);
  const backParam = nameParam + '&level=b2';
  document.getElementById('back-link').setAttribute('href', 'index.html' + backParam);
  document.getElementById('logo-link').setAttribute('href', 'index.html' + nameParam);

  renderCard();
})();

function renderCard() {
  const card = cardList[currentIndex];
  const total = cardList.length;

  document.getElementById('counter').textContent = `${currentIndex + 1} / ${total}`;
  document.getElementById('progress-fill').style.width = `${((currentIndex + 1) / total) * 100}%`;
  document.getElementById('cat-label').textContent = card.cat;
  document.getElementById('card-hu').textContent = card.hu;
  document.getElementById('card-en').textContent = card.en;
  document.getElementById('card-example').textContent = card.example;

  // Un-flip on new card
  isFlipped = false;
  document.getElementById('flip-inner').classList.remove('is-flipped');

  // Disable prev on first card
  document.getElementById('prev-btn').disabled = currentIndex === 0;
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('flip-inner').classList.toggle('is-flipped', isFlipped);
}

function nextCard() {
  if (currentIndex < cardList.length - 1) {
    currentIndex++;
    renderCard();
  } else {
    showResult();
  }
}

function prevCard() {
  if (currentIndex > 0) {
    currentIndex--;
    renderCard();
  }
}

function shuffleCards() {
  for (let i = cardList.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [cardList[i], cardList[j]] = [cardList[j], cardList[i]];
  }
  currentIndex = 0;
  renderCard();
}

function showResult() {
  document.getElementById('card-screen').style.display = 'none';
  document.getElementById('result-screen').classList.add('active');

  const seen = currentIndex + 1;
  const total = cardList.length;
  const pct = Math.round((seen / total) * 100);

  document.getElementById('result-name').textContent = studentName;
  document.getElementById('result-count').textContent = seen;

  let feedback = '';
  if (pct === 100) {
    feedback = 'Végigmentél az összes szón. Szuper munka!';
  } else if (pct >= 60) {
    feedback = 'Szép haladás. Még pár kör, és rögzül!';
  } else {
    feedback = 'Jó kezdés. Térj vissza hamarosan — az ismétlés a kulcs.';
  }
  document.getElementById('result-feedback').textContent = feedback;

  // Send to Make webhook (silently — ignore failures)
  fetch(MAKE_WEBHOOK_URL, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      Student: studentName,
      Quiz: MODULE_META.title,
      Score: seen,
      TotalQuestions: total,
      Level: MODULE_META.level,
      Skill: MODULE_META.skill,
      Percentage: pct,
      CompletedAt: new Date().toISOString()
    })
  }).catch(() => {});
}

function restartFromStart() {
  currentIndex = 0;
  document.getElementById('result-screen').classList.remove('active');
  document.getElementById('card-screen').style.display = 'flex';
  renderCard();
}

function shuffleAndRestart() {
  shuffleCards();
  document.getElementById('result-screen').classList.remove('active');
  document.getElementById('card-screen').style.display = 'flex';
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (document.getElementById('result-screen').classList.contains('active')) return;
  if (e.key === 'ArrowRight') nextCard();
  if (e.key === 'ArrowLeft') prevCard();
  if (e.key === ' ') { e.preventDefault(); flipCard(); }
});
</script>
