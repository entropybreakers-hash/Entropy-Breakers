<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Grammar Master · B2 | Entropy Breakers</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}

:root{
  --bg:#ffffff;
  --bg2:#faf8f3;
  --bg3:#f0ebe3;
  --cream:#1a1612;
  --cream2:#5a5248;
  --dim:#8a8075;
  --dimmer:#b5aa9a;
  --orange:#c9671f;
  --orange2:#a85418;
  --border:rgba(26,22,18,0.06);
  --border2:rgba(26,22,18,0.12);
}

body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--cream);
  min-height:100vh;
  display:flex;flex-direction:column;
  -webkit-font-smoothing:antialiased;
  line-height:1.5;
}

.accent{color:var(--orange);font-weight:500}

/* ───── NAV ───── */
nav{
  height:56px;padding:0 40px;flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  background:#0a0806;
  border-bottom:1px solid rgba(240,235,227,0.08);
}
.logo{
  font-size:11px;font-weight:500;letter-spacing:.24em;
  text-transform:uppercase;color:#f0ebe3;
  display:flex;align-items:baseline;gap:5px;
  text-decoration:none;
}
.logo .accent{
  color:var(--orange);
  font-weight:600;letter-spacing:.24em;
}
.nav-right{display:flex;align-items:center;gap:20px}
.nav-greeting{
  font-size:11px;letter-spacing:.14em;
  text-transform:uppercase;color:#c8c1b8;
}
.nav-greeting b{color:var(--orange);font-weight:500}
.nav-btn{
  font-size:10px;font-weight:500;letter-spacing:.18em;
  text-transform:uppercase;color:#f0ebe3;
  background:transparent;
  border:1px solid rgba(240,235,227,0.14);
  padding:8px 18px;border-radius:60px;
  cursor:pointer;transition:all .3s;
  font-family:inherit;text-decoration:none;
  display:inline-flex;align-items:center;gap:6px;
}
.nav-btn:hover{border-color:var(--orange);color:var(--orange)}
.nav-btn-arrow{
  font-family:'Inter',sans-serif;
  font-size:16px;font-weight:300;
}

/* ───── MAIN ───── */
main{
  flex:1;display:flex;align-items:center;justify-content:center;
  padding:32px 24px;
}

/* ───── MODULE HEADER (compact) ───── */
.module-frame{
  width:100%;max-width:540px;
  display:flex;flex-direction:column;gap:20px;
}

.module-head{
  text-align:center;
}
.module-badge{
  display:inline-block;
  font-size:10px;font-weight:500;letter-spacing:.24em;
  text-transform:uppercase;color:var(--orange);
  padding:5px 14px;border-radius:60px;
  border:1px solid rgba(201,103,31,0.3);
  background:rgba(201,103,31,0.05);
  margin-bottom:12px;
}
.module-title{
  font-family:'Inter',sans-serif;
  font-size:clamp(26px,4vw,34px);
  font-weight:500;line-height:1.1;
  letter-spacing:-.03em;color:var(--cream);
}
.module-subtitle{
  font-size:12px;color:var(--cream2);
  margin-top:6px;letter-spacing:.02em;
}

/* ───── PROGRESS ───── */
.progress-wrap{max-width:380px;margin:0 auto;width:100%}
.progress-row{
  display:flex;align-items:center;justify-content:space-between;
  font-size:10px;letter-spacing:.2em;text-transform:uppercase;
  color:var(--dim);margin-bottom:8px;
}
.progress-row .category{
  color:var(--cream2);font-weight:500;
  max-width:70%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.progress-track{
  width:100%;height:2px;
  background:var(--border);border-radius:999px;overflow:hidden;
}
.progress-fill{
  height:100%;background:var(--orange);
  transition:width .5s cubic-bezier(.2,.8,.2,1);
}

/* ───── QUIZ CARD ───── */
.quiz-card{
  width:100%;max-width:520px;margin:0 auto;
  background:var(--bg2);
  border:1px solid var(--border2);
  border-radius:6px;
  padding:32px 28px;
}
.quiz-question{
  font-family:'Inter',sans-serif;
  font-size:clamp(17px,2.5vw,22px);
  font-weight:500;line-height:1.35;
  letter-spacing:-.01em;
  color:var(--cream);
  text-align:center;
  margin-bottom:24px;
}
.quiz-options{
  display:flex;flex-direction:column;gap:10px;
}
.quiz-option{
  font-family:'Inter',sans-serif;
  font-size:14px;font-weight:500;
  color:var(--cream);
  background:#ffffff;
  border:1px solid var(--border2);
  border-radius:4px;
  padding:12px 16px;
  cursor:pointer;
  transition:all .2s;
  text-align:left;
  width:100%;
}
.quiz-option:hover:not(:disabled){
  border-color:var(--orange);
  color:var(--orange);
}
.quiz-option:disabled{cursor:default}
.quiz-option.correct{
  background:rgba(45,134,89,0.08);
  border-color:#2d8659;
  color:#2d8659;
}
.quiz-option.wrong{
  background:rgba(183,52,52,0.06);
  border-color:#b73434;
  color:#b73434;
}
.quiz-feedback{
  font-family:'Inter',sans-serif;
  font-size:12px;
  color:var(--cream2);
  line-height:1.45;
  text-align:center;
  margin-top:16px;
  min-height:18px;
}
.quiz-feedback.show{color:var(--orange)}

/* ───── FLIP CARD (legacy) ───── */
.flip-container{
  perspective:1200px;
  width:100%;max-width:380px;
  margin:0 auto;
  height:200px;
  cursor:pointer;
}
.flip-inner{
  position:relative;width:100%;height:100%;
  transition:transform .6s cubic-bezier(.2,.8,.2,1);
  transform-style:preserve-3d;
}
.flip-inner.is-flipped{transform:rotateY(180deg)}

.flip-face{
  position:absolute;inset:0;
  backface-visibility:hidden;
  border-radius:6px;
  padding:24px 22px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;
}
.flip-front{
  background:var(--bg2);
  border:1px solid var(--border2);
}
.flip-back{
  background:var(--bg2);
  border:1px solid var(--border2);
  transform:rotateY(180deg);
}

.face-label{
  font-size:8px;font-weight:500;letter-spacing:.3em;
  text-transform:uppercase;
  margin-bottom:10px;
  color:var(--dim);
}

.face-word{
  font-family:'Inter',sans-serif;
  font-size:clamp(22px,3.5vw,30px);
  font-weight:500;line-height:1.1;
  letter-spacing:-.03em;
  max-width:100%;
  word-wrap:break-word;
}
.flip-front .face-word{color:var(--cream)}
.flip-back .face-word{color:var(--orange)}

.face-example{
  font-family:'Inter',sans-serif;
  font-size:11px;
  max-width:100%;
  line-height:1.45;
  color:var(--cream2);
  position:absolute;
  bottom:14px;left:16px;right:16px;
  padding:0 8px;
}
.face-example::before,.face-example::after{
  content:'"';color:var(--orange);
  font-size:14px;
}

.flip-hint{
  position:absolute;bottom:10px;left:0;right:0;
  font-size:8px;font-weight:500;letter-spacing:.24em;
  text-transform:uppercase;opacity:.4;
  color:var(--dim);
}

/* ───── NAV BUTTONS ───── */
.nav-row{
  display:flex;align-items:center;justify-content:center;
  gap:16px;max-width:380px;margin:0 auto;width:100%;
}
.arrow-btn{
  width:38px;height:38px;flex-shrink:0;
  background:transparent;
  border:1px solid var(--border2);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .3s;
  color:var(--cream);
  font-family:'Inter',sans-serif;
  font-size:16px;font-weight:400;
}
.arrow-btn:hover{
  border-color:var(--orange);
  color:var(--orange);
}
.arrow-btn:disabled{opacity:.3;cursor:not-allowed;pointer-events:none}

.nav-hint{
  flex:1;text-align:center;
  font-size:10px;font-weight:500;letter-spacing:.2em;
  text-transform:uppercase;color:var(--dim);
}

/* ───── ACTION BUTTONS ───── */
.action-row{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
  max-width:380px;margin:0 auto;width:100%;
}
.action-row.action-row-3{
  grid-template-columns:1fr 1fr 1fr;
  max-width:480px;
}
.action-btn{
  padding:12px 18px;
  font-size:10px;font-weight:500;letter-spacing:.2em;
  text-transform:uppercase;
  font-family:inherit;
  border-radius:4px;
  cursor:pointer;transition:all .3s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.action-btn.secondary{
  background:transparent;
  border:1px solid var(--border2);
  color:var(--cream);
}
.action-btn.secondary:hover{
  border-color:var(--orange);color:var(--orange);
}
.action-btn.primary{
  background:var(--orange);
  border:1px solid var(--orange);
  color:#fff;
}
.action-btn.primary:hover{
  background:var(--orange2);border-color:var(--orange2);
}

/* ───── RESULT SCREEN ───── */
.result-screen{
  display:none;text-align:center;width:100%;max-width:560px;
}
.result-screen.active{display:block;animation:fadeUp .6s ease both}
.result-badge{
  display:inline-block;
  font-size:10px;font-weight:500;letter-spacing:.3em;
  text-transform:uppercase;color:var(--orange);
  padding:6px 16px;border-radius:60px;
  border:1px solid rgba(201,103,31,0.3);
  background:rgba(201,103,31,0.05);
  margin-bottom:24px;
}
.result-title{
  font-family:'Inter',sans-serif;
  font-size:clamp(28px,4vw,38px);
  font-weight:500;line-height:1.1;
  letter-spacing:-.03em;color:var(--cream);
  margin-bottom:14px;
}
.result-name{color:var(--orange);font-weight:500}
.result-subtitle{
  font-family:'Inter',sans-serif;
  font-size:15px;color:var(--cream2);
  margin-bottom:32px;line-height:1.5;
}
.result-stats{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:6px;
  padding:32px 24px;margin-bottom:28px;
}
.result-number{
  font-family:'Inter',sans-serif;
  font-size:clamp(60px,10vw,96px);
  font-weight:600;color:var(--orange);
  line-height:1;letter-spacing:-.04em;
}
.result-meta{
  font-size:10px;letter-spacing:.24em;
  text-transform:uppercase;color:var(--dim);
  margin-top:10px;
}
.result-feedback{
  font-family:'Inter',sans-serif;
  font-size:16px;
  color:var(--cream2);margin-top:18px;
  max-width:360px;margin-left:auto;margin-right:auto;
  line-height:1.45;
}

/* ───── FOOTER ───── */
footer{
  background:#0a0806;
  padding:24px 40px;flex-shrink:0;
  border-top:1px solid rgba(240,235,227,0.08);
}
.footer-inner{
  max-width:980px;margin:0 auto;
  display:flex;align-items:center;justify-content:space-between;
  gap:24px;flex-wrap:wrap;
}
.footer-brand{
  font-size:11px;font-weight:500;letter-spacing:.24em;
  text-transform:uppercase;color:#f0ebe3;
  display:flex;align-items:baseline;gap:5px;
}
.footer-brand .accent{
  color:var(--orange);
  font-weight:600;letter-spacing:.24em;
}
.footer-tagline{
  font-family:'Inter',sans-serif;
  font-size:11px;color:#c8c1b8;font-weight:500;
  letter-spacing:.2em;text-transform:uppercase;
}

/* ───── ANIMATIONS ───── */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}
.module-frame.active{animation:fadeUp .5s ease both}

/* ───── MOBILE ───── */
@media (max-width:640px){
  nav{padding:0 20px;height:52px}
  .nav-greeting{display:none}
  main{padding:20px 16px}
  .module-frame{gap:16px}
  .flip-container{height:180px;max-width:320px}
  .flip-face{padding:20px 18px}
  .face-word{font-size:clamp(20px,5vw,26px)}
  .face-example{font-size:11px;margin-top:8px}
  footer{padding:18px 20px}
  .footer-tagline{display:none}
}
</style>
</head>
<body>

<!-- ══════════ NAV ══════════ -->
<nav>
  <a href="index.html" class="logo" id="logo-link">Entropy <span class="accent">Breakers</span></a>

</nav>

<!-- ══════════ MAIN ══════════ -->
<main>

  <!-- KÁRTYA KÉPERNYŐ -->
  <div class="module-frame active" id="card-screen">

    </div>

    <div class="action-row">

</main>

<!-- ══════════ FOOTER ══════════ -->
<footer>
  <div class="footer-inner">
    <div class="footer-brand">Entropy <span class="accent">Breakers</span></div>
    <div class="footer-tagline">Gyakorlás · Ismétlés · <span class="accent">Fejlődés</span></div>
  </div>
</footer>

<script>
const MAKE_WEBHOOK_URL = "https://hook.eu1.make.com/ww4obw8ghb8h46ti1gi6yoy2qg1db7ad";

const MODULE_META = {
  title: "B2 - Grammar Master",
  level: "B2",
  skill: "Grammar"
};

const CARDS = [
  { cat:"INVERSIONS", question:"Never _______ such a beautiful sunset before.", options:["had I seen", "I had seen", "I saw", "did I see"], correct:0, explanation:"Inverzió: 'Never' mondatkezdő tagadószó után fordított szórend (segédige + alany) kötelező." },
  { cat:"INVERSIONS", question:"Hardly _______ sat down when the phone rang.", options:["had she", "she had", "did she", "she"], correct:0, explanation:"Inverzió: 'Hardly...when' — a múlt befejezett idő inverzióval jelenik meg." },
  { cat:"INVERSIONS", question:"Not until midnight _______ the noise stop.", options:["did", "was", "had", "would"], correct:0, explanation:"Inverzió: 'Not until' után a segédige megelőzi az alanyt." },
  { cat:"INVERSIONS", question:"No sooner _______ left than it began to snow.", options:["had they", "they had", "did they", "were they"], correct:0, explanation:"Inverzió: 'No sooner...than' — Past Perfect inverzióval a 'no sooner' klózban." },
  { cat:"INVERSIONS", question:"Little _______ that she was being watched.", options:["did she know", "she knew", "she did know", "knew she"], correct:0, explanation:"Inverzió: 'Little' negatív értelmű határozó után segédige + alany sorrend." },
  { cat:"INVERSIONS", question:"Scarcely _______ finished eating when the guests arrived.", options:["had we", "we had", "did we", "were we"], correct:0, explanation:"Inverzió: 'Scarcely...when' — Past Perfect inverzióval." },
  { cat:"INVERSIONS", question:"Under no circumstances _______ leave the building unattended.", options:["should you", "you should", "you must", "must"], correct:0, explanation:"Inverzió: 'Under no circumstances' után kötelező a fordított szórend." },
  { cat:"CONDITIONALS", question:"If I _______ more carefully, I wouldn't have made that mistake.", options:["had read", "read", "would read", "have read"], correct:0, explanation:"3. feltételes: If + Past Perfect → would have + V3." },
  { cat:"CONDITIONALS", question:"Were _______ to resign, the whole project would collapse.", options:["he", "him", "his", "himself"], correct:0, explanation:"2. feltételes inverzióval: 'Were he to...' = If he were to resign..." },
  { cat:"CONDITIONALS", question:"Had they _______ earlier, they would have caught the train.", options:["left", "leave", "been leaving", "to leave"], correct:0, explanation:"3. feltételes inverzióval: 'Had they left' = If they had left." },
  { cat:"CONDITIONALS", question:"Supposing you _______ offered the job, would you take it?", options:["were", "are", "had been", "would be"], correct:0, explanation:"Supposing + Past Simple: képzeletbeli jelenbeli helyzet." },
  { cat:"CONDITIONALS", question:"I would sooner _______ alone than go with them.", options:["go", "to go", "going", "gone"], correct:0, explanation:"Would sooner + bare infinitive: inkább azt tenné." },
  { cat:"WISH", question:"I wish I _______ my temper in that meeting.", options:["hadn't lost", "didn't lose", "haven't lost", "wouldn't lose"], correct:0, explanation:"Wish + Past Perfect: múltbeli sajnálkozás — a 'lost' előtt had tagadva." },
  { cat:"WISH", question:"If only she _______ harder at school.", options:["had worked", "worked", "has worked", "would work"], correct:0, explanation:"If only + Past Perfect: erős múltbeli megbánás." },
  { cat:"WISH", question:"I wish you _______ make so much noise.", options:["wouldn't", "won't", "don't", "didn't"], correct:0, explanation:"Wish + would: bosszúságot fejez ki valaki viselkedésével kapcsolatban." },
  { cat:"MIXED SUBJUNCTIVE", question:"It's high time the government _______ action on climate change.", options:["took", "takes", "has taken", "take"], correct:0, explanation:"It's high time + Past Simple: sürgető, megkésett cselekvés jelzése." },
  { cat:"MIXED SUBJUNCTIVE", question:"The committee recommended that the policy _______ reviewed.", options:["be", "is", "was", "should be"], correct:0, explanation:"Kötőmód (subjunctive): recommend that + alap ige (be, not is)." },
  { cat:"MIXED SUBJUNCTIVE", question:"It is vital that every delegate _______ present.", options:["be", "is", "will be", "was"], correct:0, explanation:"Kötőmód: vital that + szótári alak (be), nem 'is'." },
  { cat:"PASSIVE ADVANCED", question:"The suspect is believed _______ the country.", options:["to have left", "to leave", "leaving", "have left"], correct:0, explanation:"Personal passive: is believed + to have + V3 (befejezett infinitív)." },
  { cat:"PASSIVE ADVANCED", question:"The results were said _______ impressive.", options:["to be", "being", "be", "to have been"], correct:0, explanation:"Personal passive: were said + to be (egyidejű cselekvés)." },
  { cat:"PASSIVE ADVANCED", question:"The building is reported _______ in the fire.", options:["to have been destroyed", "to be destroyed", "being destroyed", "to destroy"], correct:0, explanation:"Personal passive: to have been + V3 — passzív befejezett infinitív." },
  { cat:"PASSIVE ADVANCED", question:"He is known _______ a highly influential figure.", options:["to be", "being", "as being", "to have been"], correct:0, explanation:"Personal passive: is known + to be (általánosan tudott tény)." },
  { cat:"REPORTED SPEECH ADVANCED", question:"She warned me _______ touch the wet paint.", options:["not to", "to not", "not", "don't"], correct:0, explanation:"Reported warning: warn + object + not to + infinitive." },
  { cat:"REPORTED SPEECH ADVANCED", question:"He denied _______ the documents.", options:["having forged", "to forge", "forging", "forge"], correct:0, explanation:"Deny + -ing (tagadja, hogy tette): 'having forged' hangsúlyozza a befejezettséget." },
  { cat:"REPORTED SPEECH ADVANCED", question:"They urged the president _______ the treaty.", options:["to sign", "signing", "sign", "signed"], correct:0, explanation:"Urge + object + to infinitive." },
  { cat:"GERUNDS & INFINITIVES (ADVANCED)", question:"I regret _______ you that your application was unsuccessful.", options:["to inform", "informing", "inform", "to informing"], correct:0, explanation:"Regret + to-infinitive: sajnálattal közölni valamit (formális). Regret + -ing = sajnálja, amit tett." },
  { cat:"GERUNDS & INFINITIVES (ADVANCED)", question:"She stopped _______ to catch her breath.", options:["to run", "running", "run", "having run"], correct:0, explanation:"Stop + to-infinitive: azért áll meg, hogy tegyen valamit. Stop + -ing: abbahagyja a cselekvést." },
  { cat:"GERUNDS & INFINITIVES (ADVANCED)", question:"I remember _______ that film years ago — it was brilliant.", options:["seeing", "to see", "seen", "having seen"], correct:0, explanation:"Remember + -ing: visszaemlékszik a múltban történt eseményre." },
  { cat:"GERUNDS & INFINITIVES (ADVANCED)", question:"He went on _______ despite the interruptions.", options:["speaking", "to speak", "speak", "spoken"], correct:0, explanation:"Go on + -ing: folytatja ugyanazt a cselekvést." },
  { cat:"GERUNDS & INFINITIVES (ADVANCED)", question:"Try _______ the document in a different folder.", options:["saving", "to save", "save", "saved"], correct:0, explanation:"Try + -ing: kísérletezik, kipróbál valamit (lehet, hogy segít)." },
  { cat:"GERUNDS & INFINITIVES (ADVANCED)", question:"I meant _______ you, but I completely forgot.", options:["to call", "calling", "call", "to calling"], correct:0, explanation:"Mean + to-infinitive: szándékában volt valamit tenni." },
  { cat:"MODALS ADVANCED", question:"She _______ have passed — she studied for months.", options:["must", "should", "could", "might"], correct:0, explanation:"Must have + V3: logikai következtetés a múltra (szinte biztos)." },
  { cat:"MODALS ADVANCED", question:"You _______ have booked earlier — everything is sold out.", options:["should", "must", "could", "might"], correct:0, explanation:"Should have + V3: múltbeli mulasztás — lett volna szabad megtennie." },
  { cat:"MODALS ADVANCED", question:"He _______ have taken the wrong train — he knows this route well.", options:["can't", "mustn't", "shouldn't", "wouldn't"], correct:0, explanation:"Can't have + V3: múltra vonatkozó határozott tagadó következtetés." },
  { cat:"MODALS ADVANCED", question:"I _______ have finished earlier, but I got distracted.", options:["could", "must", "should", "would"], correct:0, explanation:"Could have + V3: múltbeli lehetőség, amellyel nem élt." },
  { cat:"MODALS ADVANCED", question:"They _______ have arrived by now — the flight landed two hours ago.", options:["ought to", "must", "should", "might"], correct:0, explanation:"Ought to have + V3: elvárás a múltra vonatkozóan (kellett volna már)." },
  { cat:"CLEFT SENTENCES", question:"It was the finance team _______ spotted the error.", options:["that", "who", "which", "what"], correct:0, explanation:"Kiemelő szerkezet (cleft): It was + főnév + that/who." },
  { cat:"CLEFT SENTENCES", question:"What I find most challenging _______ public speaking.", options:["is", "are", "was", "being"], correct:0, explanation:"Kiemelő szerkezet: 'What I find...' + egyes szám (is), mert a főnévi klóz az alany." },
  { cat:"RELATIVE CLAUSES ADVANCED", question:"The report, _______ findings were controversial, was widely discussed.", options:["whose", "which", "that", "its"], correct:0, explanation:"Nem megszorító vonatkozói mellékmondat: whose + főnév (birtok jelölése)." },
  { cat:"RELATIVE CLAUSES ADVANCED", question:"He gave a speech, _______ impressed everyone in the room.", options:["which", "that", "what", "who"], correct:0, explanation:"Nem megszorító vonatkozói mellékmondat: 'which' utal az egész előző mondatra." },
  { cat:"RELATIVE CLAUSES ADVANCED", question:"The era _______ we are living is full of uncertainty.", options:["in which", "in that", "which", "that"], correct:0, explanation:"Előljárós vonatkozói mellékmondat: 'in which' = when (formálisabb)." },
  { cat:"MIXED ADVANCED STRUCTURES", question:"He acted as though he _______ the owner of the place.", options:["were", "is", "was being", "had been"], correct:0, explanation:"As though + Past Simple subjunctive: képzeletbeli (valótlan) jelen helyzet." },
  { cat:"MIXED ADVANCED STRUCTURES", question:"The project will be completed, _______ the funding is approved.", options:["provided that", "despite", "even though", "unless"], correct:0, explanation:"Provided that: feltéve, hogy (feltételes összekötő szó)." },
  { cat:"MIXED ADVANCED STRUCTURES", question:"Much _______ I admire her work, I can't agree with her conclusions.", options:["as", "though", "however", "despite"], correct:0, explanation:"Much as: Noha nagyon... (engedményes szerkezet)." },
  { cat:"MIXED ADVANCED STRUCTURES", question:"The proposal met with _______ approval.", options:["widespread", "wide", "broadly", "extending"], correct:0, explanation:"Kollokáció: 'widespread approval' (széleskörű jóváhagyás) a természetes kifejezés." },
  { cat:"MIXED ADVANCED STRUCTURES", question:"It was _______ a complex issue that no simple solution existed.", options:["such", "so", "too", "very"], correct:0, explanation:"Such + (a/an) + melléknév + főnév. ('so' csak mellékneveket/határozószavakat módosíthat)." },
  { cat:"MIXED ADVANCED STRUCTURES", question:"She is _______ to have been involved in the scandal.", options:["alleged", "said", "known", "reported"], correct:0, explanation:"Alleged: állítólag (nincs bizonyítva) — 'alleged to have' a tipikus szerkezet." },

  { cat:"MIXED GRAMMAR", question:"I would rather the meeting _______ postponed.", options:["were", "was", "be", "is"], correct:0, explanation:"I'd rather + alany + Past Simple subjunctive (were): múltra és jelenre egyaránt vonatkozhat." },

  { cat:"MIXED GRAMMAR", question:"He is thought _______ left the country.", options:["to have", "to be", "having", "as having"], correct:0, explanation:"Personal passive + perfect infinitive: is thought to have + V3 (befejezett múlt)." },

];

let studentName = '';
let cardList = [...CARDS];
let currentIndex = 0;
let isFlipped = false;

// Read student name from URL
(function() {
  const params = new URLSearchParams(window.location.search);
  const urlName = params.get('name');
  if (urlName) {
    studentName = decodeURIComponent(urlName);
  } else {
    // No name = send them back to login
    window.location.href = 'index.html';
    return;
  }
  document.getElementById('nav-name').textContent = studentName;

  // Preserve name on back link, and include level so dashboard returns to same section
  const nameParam = '?name=' + encodeURIComponent(studentName);
  const backParam = nameParam + '&level=b2';
  document.getElementById('back-link').setAttribute('href', 'index.html' + backParam);
  document.getElementById('logo-link').setAttribute('href', 'index.html' + nameParam);

  renderCard();
})();

let score = 0;
let answered = false;
const answersLog = [];

function renderCard() {
  const card = cardList[currentIndex];
  const total = cardList.length;

  document.getElementById('counter').textContent = `${currentIndex + 1} / ${total}`;
  document.getElementById('progress-fill').style.width = `${((currentIndex + 1) / total) * 100}%`;
  document.getElementById('cat-label').textContent = card.cat || '—';
  document.getElementById('quiz-question').textContent = card.question;

  const optionsDiv = document.getElementById('quiz-options');
  optionsDiv.innerHTML = '';
  card.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'quiz-option';
    btn.textContent = opt;
    btn.onclick = () => selectOption(i);
    optionsDiv.appendChild(btn);
  });

  document.getElementById('quiz-feedback')?.classList.remove('show');
  answered = false;
}

function selectOption(chosen) {
  if (answered) return;
  const card = cardList[currentIndex];
  const isCorrect = (chosen === card.correct);
  if (isCorrect) score++;

  answersLog.push({
    question: card.question,
    correct: card.options[card.correct],
    student: card.options[chosen],
    isCorrect: isCorrect
  });

  answered = true;

  // Azonnal tovább — nincs visszajelzés
  if (currentIndex < cardList.length - 1) nextCard();
  else showResult();
}

function flipCard() {}

function nextCard() {
  if (currentIndex < cardList.length - 1) {
    currentIndex++;
    renderCard();
  } else {
    showResult();
  }
}

function prevCard() {
  if (currentIndex > 0) {
    currentIndex--;
    renderCard();
  }
}

function shuffleCards() {
  for (let i = cardList.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [cardList[i], cardList[j]] = [cardList[j], cardList[i]];
  }
  currentIndex = 0;
  renderCard();
}

function showResult() {
  document.getElementById('card-screen').style.display = 'none';
  document.getElementById('result-screen').classList.add('active');

  const seen = currentIndex + 1;
  const total = cardList.length;
  const pct = Math.round((seen / total) * 100);

  document.getElementById('result-name').textContent = studentName;
  document.getElementById('result-count').textContent = score;

  let feedback = '';
  if (pct === 100) {
    feedback = 'Végigmentél az összes szón. Szuper munka!';
  } else if (pct >= 60) {
    feedback = 'Szép haladás. Még pár kör, és rögzül!';
  } else {
    feedback = 'Jó kezdés. Térj vissza hamarosan — az ismétlés a kulcs.';
  }
  document.getElementById('result-feedback').textContent = feedback;

  // Send to Make webhook (silently — ignore failures)
  fetch(MAKE_WEBHOOK_URL, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      Student: studentName,
      Quiz: MODULE_META.title,
      Score: seen,
      TotalQuestions: total,
      Level: MODULE_META.level,
      Skill: MODULE_META.skill,
      Percentage: pct,
      CompletedAt: new Date().toISOString()
    })
  }).catch(() => {});
}

function restartFromStart() {
  currentIndex = 0;
  score = 0;
  answersLog.length = 0;
  document.getElementById('result-screen').classList.remove('active');
  document.getElementById('card-screen').style.display = 'flex';
  renderCard();
}

function shuffleAndRestart() {
  shuffleCards();
  score = 0;
  answersLog.length = 0;
  document.getElementById('result-screen').classList.remove('active');
  document.getElementById('card-screen').style.display = 'flex';
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (document.getElementById('result-screen').classList.contains('active')) return;
  if (e.key === 'ArrowRight') nextCard();
  if (e.key === 'ArrowLeft') prevCard();
  if (e.key === ' ') { e.preventDefault(); flipCard(); }
});
</script>
