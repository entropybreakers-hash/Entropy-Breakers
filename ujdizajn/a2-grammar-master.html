<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Grammar Master · A2 | Entropy Breakers</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}

:root{
  --bg:#ffffff;
  --bg2:#faf8f3;
  --bg3:#f0ebe3;
  --cream:#1a1612;
  --cream2:#5a5248;
  --dim:#8a8075;
  --dimmer:#b5aa9a;
  --orange:#c9671f;
  --orange2:#a85418;
  --border:rgba(26,22,18,0.06);
  --border2:rgba(26,22,18,0.12);
}

body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--cream);
  min-height:100vh;
  display:flex;flex-direction:column;
  -webkit-font-smoothing:antialiased;
  line-height:1.5;
}

.accent{color:var(--orange);font-weight:500}

/* ───── NAV ───── */
nav{
  height:56px;padding:0 40px;flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  background:#0a0806;
  border-bottom:1px solid rgba(240,235,227,0.08);
}
.logo{
  font-size:11px;font-weight:500;letter-spacing:.24em;
  text-transform:uppercase;color:#f0ebe3;
  display:flex;align-items:baseline;gap:5px;
  text-decoration:none;
}
.logo .accent{
  color:var(--orange);
  font-weight:600;letter-spacing:.24em;
}
.nav-right{display:flex;align-items:center;gap:20px}
.nav-greeting{
  font-size:11px;letter-spacing:.14em;
  text-transform:uppercase;color:#c8c1b8;
}
.nav-greeting b{color:var(--orange);font-weight:500}
.nav-btn{
  font-size:10px;font-weight:500;letter-spacing:.18em;
  text-transform:uppercase;color:#f0ebe3;
  background:transparent;
  border:1px solid rgba(240,235,227,0.14);
  padding:8px 18px;border-radius:60px;
  cursor:pointer;transition:all .3s;
  font-family:inherit;text-decoration:none;
  display:inline-flex;align-items:center;gap:6px;
}
.nav-btn:hover{border-color:var(--orange);color:var(--orange)}
.nav-btn-arrow{
  font-family:'Inter',sans-serif;
  font-size:16px;font-weight:300;
}

/* ───── MAIN ───── */
main{
  flex:1;display:flex;align-items:center;justify-content:center;
  padding:32px 24px;
}

/* ───── MODULE HEADER (compact) ───── */
.module-frame{
  width:100%;max-width:480px;
  display:flex;flex-direction:column;gap:20px;
}

.module-head{
  text-align:center;
}
.module-badge{
  display:inline-block;
  font-size:10px;font-weight:500;letter-spacing:.24em;
  text-transform:uppercase;color:var(--orange);
  padding:5px 14px;border-radius:60px;
  border:1px solid rgba(201,103,31,0.3);
  background:rgba(201,103,31,0.05);
  margin-bottom:12px;
}
.module-title{
  font-family:'Inter',sans-serif;
  font-size:clamp(26px,4vw,34px);
  font-weight:500;line-height:1.1;
  letter-spacing:-.03em;color:var(--cream);
}
.module-subtitle{
  font-size:12px;color:var(--cream2);
  margin-top:6px;letter-spacing:.02em;
}

/* ───── PROGRESS ───── */
.progress-wrap{max-width:380px;margin:0 auto;width:100%}
.progress-row{
  display:flex;align-items:center;justify-content:space-between;
  font-size:10px;letter-spacing:.2em;text-transform:uppercase;
  color:var(--dim);margin-bottom:8px;
}
.progress-row .category{
  color:var(--cream2);font-weight:500;
  max-width:70%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.progress-track{
  width:100%;height:2px;
  background:var(--border);border-radius:999px;overflow:hidden;
}
.progress-fill{
  height:100%;background:var(--orange);
  transition:width .5s cubic-bezier(.2,.8,.2,1);
}

/* ───── QUIZ CARD ───── */
.quiz-card{
  width:100%;max-width:520px;margin:0 auto;
  background:var(--bg2);
  border:1px solid var(--border2);
  border-radius:6px;
  padding:32px 28px;
}
.quiz-question{
  font-family:'Inter',sans-serif;
  font-size:clamp(17px,2.5vw,22px);
  font-weight:500;line-height:1.35;
  letter-spacing:-.01em;
  color:var(--cream);
  text-align:center;
  margin-bottom:24px;
}
.quiz-options{
  display:flex;flex-direction:column;gap:10px;
}
.quiz-option{
  font-family:'Inter',sans-serif;
  font-size:14px;font-weight:500;
  color:var(--cream);
  background:#ffffff;
  border:1px solid var(--border2);
  border-radius:4px;
  padding:12px 16px;
  cursor:pointer;
  transition:all .2s;
  text-align:left;
  width:100%;
}
.quiz-option:hover:not(:disabled){
  border-color:var(--orange);
  color:var(--orange);
}
.quiz-option:disabled{cursor:default}
.quiz-option.correct{
  background:rgba(45,134,89,0.08);
  border-color:#2d8659;
  color:#2d8659;
}
.quiz-option.wrong{
  background:rgba(183,52,52,0.06);
  border-color:#b73434;
  color:#b73434;
}
.quiz-feedback{
  font-family:'Inter',sans-serif;
  font-size:12px;
  color:var(--cream2);
  line-height:1.45;
  text-align:center;
  margin-top:16px;
  min-height:18px;
}
.quiz-feedback.show{color:var(--orange)}

/* ───── FLIP CARD (legacy) ───── */
.flip-container{
  perspective:1200px;
  width:100%;max-width:380px;
  margin:0 auto;
  height:200px;
  cursor:pointer;
}
.flip-inner{
  position:relative;width:100%;height:100%;
  transition:transform .6s cubic-bezier(.2,.8,.2,1);
  transform-style:preserve-3d;
}
.flip-inner.is-flipped{transform:rotateY(180deg)}

.flip-face{
  position:absolute;inset:0;
  backface-visibility:hidden;
  border-radius:6px;
  padding:24px 22px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;
}
.flip-front{
  background:var(--bg2);
  border:1px solid var(--border2);
}
.flip-back{
  background:var(--bg2);
  border:1px solid var(--border2);
  transform:rotateY(180deg);
}

.face-label{
  font-size:8px;font-weight:500;letter-spacing:.3em;
  text-transform:uppercase;
  margin-bottom:10px;
  color:var(--dim);
}

.face-word{
  font-family:'Inter',sans-serif;
  font-size:clamp(22px,3.5vw,30px);
  font-weight:500;line-height:1.1;
  letter-spacing:-.03em;
  max-width:100%;
  word-wrap:break-word;
}
.flip-front .face-word{color:var(--cream)}
.flip-back .face-word{color:var(--orange)}

.face-example{
  font-family:'Inter',sans-serif;
  font-size:11px;
  max-width:100%;
  line-height:1.45;
  color:var(--cream2);
  position:absolute;
  bottom:14px;left:16px;right:16px;
  padding:0 8px;
}
.face-example::before,.face-example::after{
  content:'"';color:var(--orange);
  font-size:14px;
}

.flip-hint{
  position:absolute;bottom:10px;left:0;right:0;
  font-size:8px;font-weight:500;letter-spacing:.24em;
  text-transform:uppercase;opacity:.4;
  color:var(--dim);
}

/* ───── NAV BUTTONS ───── */
.nav-row{
  display:flex;align-items:center;justify-content:center;
  gap:16px;max-width:380px;margin:0 auto;width:100%;
}
.arrow-btn{
  width:38px;height:38px;flex-shrink:0;
  background:transparent;
  border:1px solid var(--border2);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .3s;
  color:var(--cream);
  font-family:'Inter',sans-serif;
  font-size:16px;font-weight:400;
}
.arrow-btn:hover{
  border-color:var(--orange);
  color:var(--orange);
}
.arrow-btn:disabled{opacity:.3;cursor:not-allowed;pointer-events:none}

.nav-hint{
  flex:1;text-align:center;
  font-size:10px;font-weight:500;letter-spacing:.2em;
  text-transform:uppercase;color:var(--dim);
}

/* ───── ACTION BUTTONS ───── */
.action-row{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
  max-width:380px;margin:0 auto;width:100%;
}
.action-btn{
  padding:12px 18px;
  font-size:10px;font-weight:500;letter-spacing:.2em;
  text-transform:uppercase;
  font-family:inherit;
  border-radius:4px;
  cursor:pointer;transition:all .3s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.action-btn.secondary{
  background:transparent;
  border:1px solid var(--border2);
  color:var(--cream);
}
.action-btn.secondary:hover{
  border-color:var(--orange);color:var(--orange);
}
.action-btn.primary{
  background:var(--orange);
  border:1px solid var(--orange);
  color:#fff;
}
.action-btn.primary:hover{
  background:var(--orange2);border-color:var(--orange2);
}

/* ───── RESULT SCREEN ───── */
.result-screen{
  display:none;text-align:center;width:100%;max-width:560px;
}
.result-screen.active{display:block;animation:fadeUp .6s ease both}
.result-badge{
  display:inline-block;
  font-size:10px;font-weight:500;letter-spacing:.3em;
  text-transform:uppercase;color:var(--orange);
  padding:6px 16px;border-radius:60px;
  border:1px solid rgba(201,103,31,0.3);
  background:rgba(201,103,31,0.05);
  margin-bottom:24px;
}
.result-title{
  font-family:'Inter',sans-serif;
  font-size:clamp(28px,4vw,38px);
  font-weight:500;line-height:1.1;
  letter-spacing:-.03em;color:var(--cream);
  margin-bottom:14px;
}
.result-name{color:var(--orange);font-weight:500}
.result-subtitle{
  font-family:'Inter',sans-serif;
  font-size:15px;color:var(--cream2);
  margin-bottom:32px;line-height:1.5;
}
.result-stats{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:6px;
  padding:32px 24px;margin-bottom:28px;
}
.result-number{
  font-family:'Inter',sans-serif;
  font-size:clamp(60px,10vw,96px);
  font-weight:600;color:var(--orange);
  line-height:1;letter-spacing:-.04em;
}
.result-meta{
  font-size:10px;letter-spacing:.24em;
  text-transform:uppercase;color:var(--dim);
  margin-top:10px;
}
.result-feedback{
  font-family:'Inter',sans-serif;
  font-size:16px;
  color:var(--cream2);margin-top:18px;
  max-width:360px;margin-left:auto;margin-right:auto;
  line-height:1.45;
}

/* ───── FOOTER ───── */
footer{
  background:#0a0806;
  padding:24px 40px;flex-shrink:0;
  border-top:1px solid rgba(240,235,227,0.08);
}
.footer-inner{
  max-width:980px;margin:0 auto;
  display:flex;align-items:center;justify-content:space-between;
  gap:24px;flex-wrap:wrap;
}
.footer-brand{
  font-size:11px;font-weight:500;letter-spacing:.24em;
  text-transform:uppercase;color:#f0ebe3;
  display:flex;align-items:baseline;gap:5px;
}
.footer-brand .accent{
  color:var(--orange);
  font-weight:600;letter-spacing:.24em;
}
.footer-tagline{
  font-family:'Inter',sans-serif;
  font-size:11px;color:#c8c1b8;font-weight:500;
  letter-spacing:.2em;text-transform:uppercase;
}

/* ───── ANIMATIONS ───── */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}
.module-frame.active{animation:fadeUp .5s ease both}

/* ───── MOBILE ───── */
@media (max-width:640px){
  nav{padding:0 20px;height:52px}
  .nav-greeting{display:none}
  main{padding:20px 16px}
  .module-frame{gap:16px}
  .flip-container{height:180px;max-width:320px}
  .flip-face{padding:20px 18px}
  .face-word{font-size:clamp(20px,5vw,26px)}
  .face-example{font-size:11px;margin-top:8px}
  footer{padding:18px 20px}
  .footer-tagline{display:none}
}
</style>
</head>
<body>

<!-- ══════════ NAV ══════════ -->
<nav>
  <a href="index.html" class="logo" id="logo-link">Entropy <span class="accent">Breakers</span></a>

</nav>

<!-- ══════════ MAIN ══════════ -->
<main>

  <!-- KÁRTYA KÉPERNYŐ -->
  <div class="module-frame active" id="card-screen">

    </div>

</main>

<!-- ══════════ FOOTER ══════════ -->
<footer>
  <div class="footer-inner">
    <div class="footer-brand">Entropy <span class="accent">Breakers</span></div>

  </div>
</footer>

<script>
const MAKE_WEBHOOK_URL = "https://hook.eu1.make.com/ww4obw8ghb8h46ti1gi6yoy2qg1db7ad";

const MODULE_META = {
  title: "A2 - Grammar Master",
  level: "A2",
  skill: "Grammar"
};

const CARDS = [
  { cat:"PRESENT SIMPLE", question:"My brother __________ football every Saturday.", options:["plays", "play", "is playing", "played"], correct:0, explanation:"Present Simple: E/3 személyben az ige -s/-es ragot kap rendszeres cselekvésnél." },
  { cat:"PRESENT SIMPLE", question:"__________ she speak French?", options:["Does", "Do", "Is", "Has"], correct:0, explanation:"Present Simple kérdés: E/3-ban 'Does' a segédige, az ige szótári alakban marad." },
  { cat:"PRESENT SIMPLE", question:"I __________ like coffee. I prefer tea.", options:["don't", "doesn't", "isn't", "aren't"], correct:0, explanation:"Present Simple tagadás: I/you/we/they után 'don't' (do not)." },
  { cat:"PRESENT SIMPLE", question:"The sun __________ in the east.", options:["rises", "rise", "is rising", "rose"], correct:0, explanation:"Present Simple: Általánosan igaz tényeknél (tudományos állítás)." },
  { cat:"PRESENT SIMPLE", question:"How often __________ you go to the gym?", options:["do", "does", "are", "have"], correct:0, explanation:"Present Simple kérdés: I/you/we/they alannyal 'do' a segédige." },
  { cat:"PRESENT CONTINUOUS", question:"Listen! The birds __________.", options:["are singing", "sing", "sings", "sang"], correct:0, explanation:"Present Continuous: A 'Listen!' jelzi, hogy a cselekvés most éppen zajlik." },
  { cat:"PRESENT CONTINUOUS", question:"We __________ a new house at the moment.", options:["are building", "build", "builds", "built"], correct:0, explanation:"Present Continuous: 'At the moment' jelzi a folyamatban lévő cselekvést." },
  { cat:"PRESENT CONTINUOUS", question:"She __________ TV right now — she's studying.", options:["isn't watching", "doesn't watch", "not watching", "don't watch"], correct:0, explanation:"Present Continuous tagadás: is/am/are + not + -ing." },
  { cat:"PRESENT CONTINUOUS", question:"Why __________ you wearing a coat? It's warm outside!", options:["are", "do", "is", "does"], correct:0, explanation:"Present Continuous kérdés: are/am/is + alany + -ing." },
  { cat:"PAST SIMPLE", question:"I __________ a great film last night.", options:["watched", "watch", "am watching", "watches"], correct:0, explanation:"Past Simple: 'last night' lezárt múltbeli időpontra utal." },
  { cat:"PAST SIMPLE", question:"She __________ to Paris two years ago.", options:["went", "go", "goes", "has gone"], correct:0, explanation:"Past Simple: A 'go' rendhagyó igének 'went' a múlt ideje. 'Ago' múlt időt jelez." },
  { cat:"PAST SIMPLE", question:"__________ you enjoy the party last Saturday?", options:["Did", "Do", "Were", "Have"], correct:0, explanation:"Past Simple kérdés: 'Did' segédigét használunk, az ige szótári alakban áll." },
  { cat:"PAST SIMPLE", question:"They __________ football yesterday because it was raining.", options:["didn't play", "don't play", "weren't play", "not played"], correct:0, explanation:"Past Simple tagadás: didn't + szótári alak." },
  { cat:"PAST SIMPLE", question:"Where __________ you born?", options:["were", "was", "did", "are"], correct:0, explanation:"Past Simple (to be): 'Where were you born?' — to be múlt ideje: was/were." },
  { cat:"PAST CONTINUOUS", question:"I __________ a book when the phone rang.", options:["was reading", "read", "reads", "am reading"], correct:0, explanation:"Past Continuous: Folyamatban lévő múltbeli cselekvés, amelyet egy másik megszakít." },
  { cat:"PAST CONTINUOUS", question:"At 8 o'clock yesterday, we __________ dinner.", options:["were having", "had", "have had", "are having"], correct:0, explanation:"Past Continuous: Egy múltbeli időpontban zajló cselekvés." },
  { cat:"PRESENT PERFECT", question:"I __________ never eaten sushi.", options:["have", "did", "am", "was"], correct:0, explanation:"Present Perfect: 'Never' az élettapasztalat hiányát fejezi ki." },
  { cat:"PRESENT PERFECT", question:"She __________ already finished her homework.", options:["has", "have", "did", "is"], correct:0, explanation:"Present Perfect: 'Already' jelzi, hogy a cselekvés korábban befejeződött, mint várták." },
  { cat:"PRESENT PERFECT", question:"__________ you ever visited Rome?", options:["Have", "Did", "Do", "Are"], correct:0, explanation:"Present Perfect: Élettapasztalat megkérdezése 'ever' szóval." },
  { cat:"PRESENT PERFECT", question:"I haven't seen him __________ last Monday.", options:["since", "for", "ago", "before"], correct:0, explanation:"Since: Egy konkrét időponttól kezdve (Present Perfect-tel)." },
  { cat:"PRESENT PERFECT", question:"They have lived here __________ ten years.", options:["for", "since", "ago", "during"], correct:0, explanation:"For: Egy időtartamot jelöl (Present Perfect-tel)." },
  { cat:"FUTURE FORMS", question:"Look at those clouds! It __________ rain.", options:["is going to", "will", "rains", "is raining"], correct:0, explanation:"Be going to: Jelenbeli bizonyíték alapján következtetünk a közeli jövőre." },
  { cat:"FUTURE FORMS", question:"I think I __________ stay at home tonight.", options:["will", "am going to", "am", "shall"], correct:0, explanation:"Will: Azonnali döntés vagy jóslat bizonyíték nélkül." },
  { cat:"FUTURE FORMS", question:"We __________ our friends this weekend — it's all planned.", options:["are visiting", "visit", "will visit", "visited"], correct:0, explanation:"Present Continuous jövő jelentéssel: Előre eltervezett cselekvés." },
  { cat:"FUTURE FORMS", question:"The train __________ at 9:15. Don't be late.", options:["leaves", "is leaving", "will leave", "left"], correct:0, explanation:"Present Simple jövő: Menetrend szerinti esemény." },
  { cat:"TO BE", question:"My parents __________ doctors.", options:["are", "is", "be", "am"], correct:0, explanation:"To be (Present Simple): Többes szám → 'are'." },
  { cat:"TO BE", question:"__________ he at home yesterday?", options:["Was", "Were", "Did", "Is"], correct:0, explanation:"To be (Past Simple): E/3 alannyal 'was' a múlt idő." },
  { cat:"TO BE", question:"There __________ a lot of people at the concert.", options:["were", "was", "are", "is"], correct:0, explanation:"There were: Többes szám múltban." },
  { cat:"TO BE", question:"There __________ any milk left in the fridge.", options:["isn't", "aren't", "wasn't", "weren't"], correct:0, explanation:"There isn't any: Megszámlálhatatlan főnév → egyes szám tagadás." },
  { cat:"ARTICLES", question:"She plays __________ piano every evening.", options:["the", "a", "an", "-"], correct:0, explanation:"Hangszerek előtt 'the' névelőt használunk." },
  { cat:"ARTICLES", question:"I saw __________ interesting film last night.", options:["an", "a", "the", "-"], correct:0, explanation:"Határozatlan névelő: Mássalhangzó hangzással kezdődő szó előtt 'a', magánhangzó előtt 'an' ('an interesting')." },

let studentName = '';
let cardList = [...CARDS];
let currentIndex = 0;
let isFlipped = false;

// Read student name from URL
(function() {
  const params = new URLSearchParams(window.location.search);
  const urlName = params.get('name');
  if (urlName) {
    studentName = decodeURIComponent(urlName);
  } else {
    // No name = send them back to login
    window.location.href = 'index.html';
    return;
  }
  document.getElementById('nav-name').textContent = studentName;

  // Preserve name on back link
  const nameParam = '?name=' + encodeURIComponent(studentName);
  document.getElementById('back-link').setAttribute('href', 'index.html' + nameParam);
  document.getElementById('logo-link').setAttribute('href', 'index.html' + nameParam);

  renderCard();
})();

let score = 0;
let answered = false;
const answersLog = [];

function renderCard() {
  const card = cardList[currentIndex];
  const total = cardList.length;

  document.getElementById('counter').textContent = `${currentIndex + 1} / ${total}`;
  document.getElementById('progress-fill').style.width = `${((currentIndex + 1) / total) * 100}%`;
  document.getElementById('cat-label').textContent = card.cat || '—';
  document.getElementById('quiz-question').textContent = card.question;

  const optionsDiv = document.getElementById('quiz-options');
  optionsDiv.innerHTML = '';
  card.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'quiz-option';
    btn.textContent = opt;
    btn.onclick = () => selectOption(i);
    optionsDiv.appendChild(btn);
  });

  document.getElementById('quiz-feedback').textContent = '';
  document.getElementById('quiz-feedback').classList.remove('show');
  answered = false;
}

function selectOption(chosen) {
  if (answered) return;
  const card = cardList[currentIndex];
  const buttons = document.querySelectorAll('.quiz-option');
  buttons.forEach(b => b.disabled = true);

  const isCorrect = (chosen === card.correct);
  if (isCorrect) {
    buttons[chosen].classList.add('correct');
    score++;
  } else {
    buttons[chosen].classList.add('wrong');
    buttons[card.correct].classList.add('correct');
  }

  answersLog.push({
    question: card.question,
    correct: card.options[card.correct],
    student: card.options[chosen],
    isCorrect: isCorrect
  });

  if (card.explanation) {
    const fb = document.getElementById('quiz-feedback');
    fb.textContent = card.explanation;
    fb.classList.add('show');
  }
  answered = true;

  // Automatikusan tovább 1.5 mp múlva
  setTimeout(() => {
    if (currentIndex < cardList.length - 1) nextCard();
    else showResult();
  }, 1800);
}

function flipCard() {}

function nextCard() {
  if (currentIndex < cardList.length - 1) {
    currentIndex++;
    renderCard();
  } else {
    showResult();
  }
}

function prevCard() {
  if (currentIndex > 0) {
    currentIndex--;
    renderCard();
  }
}

function shuffleCards() {
  for (let i = cardList.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [cardList[i], cardList[j]] = [cardList[j], cardList[i]];
  }
  currentIndex = 0;
  renderCard();
}

function showResult() {
  document.getElementById('card-screen').style.display = 'none';
  document.getElementById('result-screen').classList.add('active');

  const seen = currentIndex + 1;
  const total = cardList.length;
  const pct = Math.round((seen / total) * 100);

  document.getElementById('result-name').textContent = studentName;
  document.getElementById('result-count').textContent = score;

  let feedback = '';
  if (pct === 100) {
    feedback = 'Végigmentél az összes szón. Szuper munka!';
  } else if (pct >= 60) {
    feedback = 'Szép haladás. Még pár kör, és rögzül!';
  } else {
    feedback = 'Jó kezdés. Térj vissza hamarosan — az ismétlés a kulcs.';
  }
  document.getElementById('result-feedback').textContent = feedback;

  // Send to Make webhook (silently — ignore failures)
  fetch(MAKE_WEBHOOK_URL, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      Student: studentName,
      Quiz: MODULE_META.title,
      Score: seen,
      TotalQuestions: total,
      Level: MODULE_META.level,
      Skill: MODULE_META.skill,
      Percentage: pct,
      CompletedAt: new Date().toISOString()
    })
  }).catch(() => {});
}

function restartFromStart() {
  currentIndex = 0;
  score = 0;
  answersLog.length = 0;
  document.getElementById('result-screen').classList.remove('active');
  document.getElementById('card-screen').style.display = 'flex';
  renderCard();
}

function shuffleAndRestart() {
  shuffleCards();
  score = 0;
  answersLog.length = 0;
  document.getElementById('result-screen').classList.remove('active');
  document.getElementById('card-screen').style.display = 'flex';
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (document.getElementById('result-screen').classList.contains('active')) return;
  if (e.key === 'ArrowRight') nextCard();
  if (e.key === 'ArrowLeft') prevCard();
  if (e.key === ' ') { e.preventDefault(); flipCard(); }
});
</script>
