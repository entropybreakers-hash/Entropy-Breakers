<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Család · A2 | Entropy Breakers</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}

:root{
  --bg:#ffffff;
  --bg2:#faf8f3;
  --bg3:#f0ebe3;
  --cream:#1a1612;
  --cream2:#5a5248;
  --dim:#8a8075;
  --dimmer:#b5aa9a;
  --orange:#c9671f;
  --orange2:#a85418;
  --border:rgba(26,22,18,0.06);
  --border2:rgba(26,22,18,0.12);
}

body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--cream);
  min-height:100vh;
  display:flex;flex-direction:column;
  -webkit-font-smoothing:antialiased;
  line-height:1.5;
}

.accent{color:var(--orange);font-weight:500}

/* ───── NAV ───── */
nav{
  height:56px;padding:0 40px;flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  background:#0a0806;
  border-bottom:1px solid rgba(240,235,227,0.08);
}
.logo{
  font-size:11px;font-weight:500;letter-spacing:.24em;
  text-transform:uppercase;color:#f0ebe3;
  display:flex;align-items:baseline;gap:5px;
  text-decoration:none;
}
.logo .accent{
  color:var(--orange);
  font-weight:600;letter-spacing:.24em;
}
.nav-right{display:flex;align-items:center;gap:20px}
.nav-greeting{
  font-size:11px;letter-spacing:.14em;
  text-transform:uppercase;color:#c8c1b8;
}
.nav-greeting b{color:var(--orange);font-weight:500}
.nav-btn{
  font-size:10px;font-weight:500;letter-spacing:.18em;
  text-transform:uppercase;color:#f0ebe3;
  background:transparent;
  border:1px solid rgba(240,235,227,0.14);
  padding:8px 18px;border-radius:60px;
  cursor:pointer;transition:all .3s;
  font-family:inherit;text-decoration:none;
  display:inline-flex;align-items:center;gap:6px;
}
.nav-btn:hover{border-color:var(--orange);color:var(--orange)}
.nav-btn-arrow{
  font-family:'Inter',sans-serif;
  font-size:16px;font-weight:300;
}

/* ───── MAIN ───── */
main{
  flex:1;display:flex;align-items:center;justify-content:center;
  padding:32px 24px;
}

/* ───── MODULE HEADER (compact) ───── */
.module-frame{
  width:100%;max-width:480px;
  display:flex;flex-direction:column;gap:20px;
}

.module-head{
  text-align:center;
}
.module-badge{
  display:inline-block;
  font-size:10px;font-weight:500;letter-spacing:.24em;
  text-transform:uppercase;color:var(--orange);
  padding:5px 14px;border-radius:60px;
  border:1px solid rgba(201,103,31,0.3);
  background:rgba(201,103,31,0.05);
  margin-bottom:12px;
}
.module-title{
  font-family:'Inter',sans-serif;
  font-size:clamp(26px,4vw,34px);
  font-weight:500;line-height:1.1;
  letter-spacing:-.03em;color:var(--cream);
}
.module-subtitle{
  font-size:12px;color:var(--cream2);
  margin-top:6px;letter-spacing:.02em;
}

/* ───── PROGRESS ───── */
.progress-wrap{max-width:380px;margin:0 auto;width:100%}
.progress-row{
  display:flex;align-items:center;justify-content:space-between;
  font-size:10px;letter-spacing:.2em;text-transform:uppercase;
  color:var(--dim);margin-bottom:8px;
}
.progress-row .category{
  color:var(--cream2);font-weight:500;
  max-width:70%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.progress-track{
  width:100%;height:2px;
  background:var(--border);border-radius:999px;overflow:hidden;
}
.progress-fill{
  height:100%;background:var(--orange);
  transition:width .5s cubic-bezier(.2,.8,.2,1);
}

/* ───── FLIP CARD ───── */
.flip-container{
  perspective:1200px;
  width:100%;max-width:380px;
  margin:0 auto;
  height:200px;
  cursor:pointer;
}
.flip-inner{
  position:relative;width:100%;height:100%;
  transition:transform .6s cubic-bezier(.2,.8,.2,1);
  transform-style:preserve-3d;
}
.flip-inner.is-flipped{transform:rotateY(180deg)}

.flip-face{
  position:absolute;inset:0;
  backface-visibility:hidden;
  border-radius:6px;
  padding:24px 22px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;
}
.flip-front{
  background:var(--bg2);
  border:1px solid var(--border2);
}
.flip-back{
  background:var(--bg2);
  border:1px solid var(--border2);
  transform:rotateY(180deg);
}

.face-label{
  font-size:8px;font-weight:500;letter-spacing:.3em;
  text-transform:uppercase;
  margin-bottom:10px;
  color:var(--dim);
}

.face-word{
  font-family:'Inter',sans-serif;
  font-size:clamp(22px,3.5vw,30px);
  font-weight:500;line-height:1.1;
  letter-spacing:-.03em;
  max-width:100%;
  word-wrap:break-word;
}
.flip-front .face-word{color:var(--cream)}
.flip-back .face-word{color:var(--orange)}

.face-example{
  font-family:'Inter',sans-serif;
  font-size:11px;
  max-width:100%;
  line-height:1.45;
  color:var(--cream2);
  position:absolute;
  bottom:14px;left:16px;right:16px;
  padding:0 8px;
}
.face-example::before,.face-example::after{
  content:'"';color:var(--orange);
  font-size:14px;
}

.flip-hint{
  position:absolute;bottom:10px;left:0;right:0;
  font-size:8px;font-weight:500;letter-spacing:.24em;
  text-transform:uppercase;opacity:.4;
  color:var(--dim);
}

/* ───── NAV BUTTONS ───── */
.nav-row{
  display:flex;align-items:center;justify-content:center;
  gap:16px;max-width:380px;margin:0 auto;width:100%;
}
.arrow-btn{
  width:38px;height:38px;flex-shrink:0;
  background:transparent;
  border:1px solid var(--border2);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .3s;
  color:var(--cream);
  font-family:'Inter',sans-serif;
  font-size:16px;font-weight:400;
}
.arrow-btn:hover{
  border-color:var(--orange);
  color:var(--orange);
}
.arrow-btn:disabled{opacity:.3;cursor:not-allowed;pointer-events:none}

.nav-hint{
  flex:1;text-align:center;
  font-size:10px;font-weight:500;letter-spacing:.2em;
  text-transform:uppercase;color:var(--dim);
}

/* ───── ACTION BUTTONS ───── */
.action-row{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
  max-width:380px;margin:0 auto;width:100%;
}
.action-btn{
  padding:12px 18px;
  font-size:10px;font-weight:500;letter-spacing:.2em;
  text-transform:uppercase;
  font-family:inherit;
  border-radius:4px;
  cursor:pointer;transition:all .3s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.action-btn.secondary{
  background:transparent;
  border:1px solid var(--border2);
  color:var(--cream);
}
.action-btn.secondary:hover{
  border-color:var(--orange);color:var(--orange);
}
.action-btn.primary{
  background:var(--orange);
  border:1px solid var(--orange);
  color:#fff;
}
.action-btn.primary:hover{
  background:var(--orange2);border-color:var(--orange2);
}

/* ───── RESULT SCREEN ───── */
.result-screen{
  display:none;text-align:center;width:100%;max-width:560px;
}
.result-screen.active{display:block;animation:fadeUp .6s ease both}
.result-badge{
  display:inline-block;
  font-size:10px;font-weight:500;letter-spacing:.3em;
  text-transform:uppercase;color:var(--orange);
  padding:6px 16px;border-radius:60px;
  border:1px solid rgba(201,103,31,0.3);
  background:rgba(201,103,31,0.05);
  margin-bottom:24px;
}
.result-title{
  font-family:'Inter',sans-serif;
  font-size:clamp(28px,4vw,38px);
  font-weight:500;line-height:1.1;
  letter-spacing:-.03em;color:var(--cream);
  margin-bottom:14px;
}
.result-name{color:var(--orange);font-weight:500}
.result-subtitle{
  font-family:'Inter',sans-serif;
  font-size:15px;color:var(--cream2);
  margin-bottom:32px;line-height:1.5;
}
.result-stats{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:6px;
  padding:32px 24px;margin-bottom:28px;
}
.result-number{
  font-family:'Inter',sans-serif;
  font-size:clamp(60px,10vw,96px);
  font-weight:600;color:var(--orange);
  line-height:1;letter-spacing:-.04em;
}
.result-meta{
  font-size:10px;letter-spacing:.24em;
  text-transform:uppercase;color:var(--dim);
  margin-top:10px;
}
.result-feedback{
  font-family:'Inter',sans-serif;
  font-size:16px;
  color:var(--cream2);margin-top:18px;
  max-width:360px;margin-left:auto;margin-right:auto;
  line-height:1.45;
}

/* ───── FOOTER ───── */
footer{
  background:#0a0806;
  padding:24px 40px;flex-shrink:0;
  border-top:1px solid rgba(240,235,227,0.08);
}
.footer-inner{
  max-width:980px;margin:0 auto;
  display:flex;align-items:center;justify-content:space-between;
  gap:24px;flex-wrap:wrap;
}
.footer-brand{
  font-size:11px;font-weight:500;letter-spacing:.24em;
  text-transform:uppercase;color:#f0ebe3;
  display:flex;align-items:baseline;gap:5px;
}
.footer-brand .accent{
  color:var(--orange);
  font-weight:600;letter-spacing:.24em;
}
.footer-tagline{
  font-family:'Inter',sans-serif;
  font-size:11px;color:#c8c1b8;font-weight:500;
  letter-spacing:.2em;text-transform:uppercase;
}

/* ───── ANIMATIONS ───── */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}
.module-frame.active{animation:fadeUp .5s ease both}

/* ───── MOBILE ───── */
@media (max-width:640px){
  nav{padding:0 20px;height:52px}
  .nav-greeting{display:none}
  main{padding:20px 16px}
  .module-frame{gap:16px}
  .flip-container{height:180px;max-width:320px}
  .flip-face{padding:20px 18px}
  .face-word{font-size:clamp(20px,5vw,26px)}
  .face-example{font-size:11px;margin-top:8px}
  footer{padding:18px 20px}
  .footer-tagline{display:none}
}
</style>
</head>
<body>

<!-- ══════════ NAV ══════════ -->
<nav>
  <a href="index.html" class="logo" id="logo-link">Entropy <span class="accent">Breakers</span></a>
  <div class="nav-right">

  </div>
</nav>

<!-- ══════════ MAIN ══════════ -->
<main>

  <!-- KÁRTYA KÉPERNYŐ -->
  <div class="module-frame active" id="card-screen">

    <div class="module-head">
      <h1 class="module-title">Család</h1>
    </div>

    <div class="progress-wrap">
      <div class="progress-row">
        <span class="category" id="cat-label">—</span>
        <span id="counter">1 / 50</span>

      <div class="progress-track">

      </div>

      <div class="flip-inner" id="flip-inner">
        <div class="flip-face flip-front">
          <div class="face-word" id="card-hu">—</div>
        </div>
        <div class="flip-face flip-back">

        </div>
      </div>
    </div>

    <div class="nav-row">
      <button class="arrow-btn" id="prev-btn" onclick="prevCard()" aria-label="Előző">←</button>
      <span class="nav-hint">Kattints a kártyára</span>
      <button class="arrow-btn" id="next-btn" onclick="nextCard()" aria-label="Következő">→</button>
    </div>

    <div class="action-row">
      <button class="action-btn secondary" onclick="shuffleCards()">Keverés</button>
      <button class="action-btn primary" onclick="showResult()">Befejezés</button>
    </div>
  </div>

  <!-- EREDMÉNY KÉPERNYŐ -->
  <div class="result-screen" id="result-screen">
    <div class="result-badge">A2 · Család</div>
    <h2 class="result-title">Szép <span class="accent">munka</span>, <span class="result-name" id="result-name">—</span></h2>
    <p class="result-subtitle">Átnézted a kártyákat.</p>

    <div class="result-stats">
      <div class="result-number" id="result-count">0</div>
      <div class="result-meta">/ 50 szó</div>
      <div class="result-feedback" id="result-feedback">—</div>
    </div>

    <div class="action-row">
      <button class="action-btn secondary" onclick="restartFromStart()">Újra</button>
      <button class="action-btn primary" onclick="shuffleAndRestart()">Új sorrend</button>
    </div>
  </div>

</main>

<!-- ══════════ FOOTER ══════════ -->
<footer>
  <div class="footer-inner">
    <div class="footer-brand">Entropy <span class="accent">Breakers</span></div>
    <div class="footer-tagline">Gyakorlás · Ismétlés · <span class="accent">Fejlődés</span></div>
  </div>
</footer>

<script>
const MAKE_WEBHOOK_URL = "https://hook.eu1.make.com/ww4obw8ghb8h46ti1gi6yoy2qg1db7ad";

const MODULE_META = {
  title: "A2 Vocabulary - Family & Relationships",
  level: "A2",
  skill: "Vocabulary"
};

const CARDS = [
  { cat:"Család", hu:"Anya", en:"Mother", example:"My mother makes the best soup in the world." },
  { cat:"Család", hu:"Apa", en:"Father", example:"My father works in an office." },
  { cat:"Család", hu:"Testvér (fiú)", en:"Brother", example:"My brother is two years older than me." },
  { cat:"Család", hu:"Testvér (lány)", en:"Sister", example:"My sister lives in another city." },
  { cat:"Család", hu:"Nagymama", en:"Grandmother", example:"My grandmother tells great stories." },
  { cat:"Család", hu:"Nagyapa", en:"Grandfather", example:"My grandfather was a teacher." },
  { cat:"Család", hu:"Nagynéni", en:"Aunt", example:"My aunt lives next door to us." },
  { cat:"Család", hu:"Nagybácsi", en:"Uncle", example:"My uncle always brings presents." },
  { cat:"Család", hu:"Unokatestvér", en:"Cousin", example:"I have five cousins on my mother\'s side." },
  { cat:"Család", hu:"Unoka", en:"Grandchild", example:"They have three grandchildren." },
  { cat:"Kapcsolatok", hu:"Barát / Barátnő", en:"Friend", example:"She is my best friend from school." },
  { cat:"Kapcsolatok", hu:"Legjobb barát", en:"Best friend", example:"We have been best friends for ten years." },
  { cat:"Kapcsolatok", hu:"Pár / Társ", en:"Partner", example:"My partner and I met at university." },
  { cat:"Kapcsolatok", hu:"Férj", en:"Husband", example:"Her husband cooks dinner every evening." },
  { cat:"Kapcsolatok", hu:"Feleség", en:"Wife", example:"His wife is a doctor." },
  { cat:"Kapcsolatok", hu:"Szomszéd", en:"Neighbour", example:"Our neighbours are very friendly." },
  { cat:"Kapcsolatok", hu:"Ismerős", en:"Acquaintance", example:"He is just an acquaintance, not a close friend." },
  { cat:"Kapcsolatok", hu:"Kolléga", en:"Colleague", example:"I have lunch with my colleagues every day." },
  { cat:"Kapcsolatok", hu:"Osztálytárs", en:"Classmate", example:"My classmates are very supportive." },
  { cat:"Kapcsolati igék", hu:"Szeret", en:"Love", example:"I love spending time with my family." },
  { cat:"Kapcsolati igék", hu:"Gondoskodik", en:"Take care of", example:"She takes care of her elderly parents." },
  { cat:"Kapcsolati igék", hu:"Segít", en:"Help", example:"My brother always helps me when I need it." },
  { cat:"Kapcsolati igék", hu:"Megoszt", en:"Share", example:"We share everything in our family." },
  { cat:"Kapcsolati igék", hu:"Veszekedik", en:"Argue", example:"Brothers and sisters sometimes argue." },
  { cat:"Kapcsolati igék", hu:"Kibékül", en:"Make up", example:"They argued but made up the next day." },
  { cat:"Kapcsolati igék", hu:"Megbeszél", en:"Discuss", example:"We always discuss problems together." },
  { cat:"Kapcsolati igék", hu:"Látogat", en:"Visit", example:"We visit my grandparents every Sunday." },
  { cat:"Kapcsolati igék", hu:"Hiányol", en:"Miss", example:"I really miss my family when I\'m away." },
  { cat:"Kapcsolati igék", hu:"Büszke valamire", en:"Be proud of", example:"My parents are proud of my results." },
  { cat:"Otthon & élet", hu:"Egyedül él", en:"Live alone", example:"She lives alone in a small flat." },
  { cat:"Otthon & élet", hu:"Együtt él", en:"Live together", example:"They have been living together for three years." },
  { cat:"Otthon & élet", hu:"Összeköltözik", en:"Move in together", example:"They decided to move in together last year." },
  { cat:"Otthon & élet", hu:"Gyerek", en:"Child / Children", example:"They have two children." },
  { cat:"Otthon & élet", hu:"Egyke", en:"Only child", example:"She is an only child so she has no siblings." },
  { cat:"Leírás", hu:"Kedves", en:"Kind", example:"She is the kindest person I know." },
  { cat:"Leírás", hu:"Gondoskodó", en:"Caring", example:"He is a very caring father." },
  { cat:"Leírás", hu:"Szórakoztató", en:"Fun", example:"My cousin is so fun to be around." },
  { cat:"Leírás", hu:"Megbízható", en:"Reliable", example:"A reliable friend is always there for you." },
  { cat:"Leírás", hu:"Türelmes", en:"Patient", example:"You need to be very patient with young children." },
  { cat:"Alkalmak", hu:"Születésnap", en:"Birthday", example:"We always celebrate birthdays as a family." },
  { cat:"Alkalmak", hu:"Esküvő", en:"Wedding", example:"Their wedding was a beautiful ceremony." },
  { cat:"Alkalmak", hu:"Évforduló", en:"Anniversary", example:"It is their twentieth wedding anniversary today." },
  { cat:"Alkalmak", hu:"Karácsony", en:"Christmas", example:"We spend Christmas with the whole family." },
  { cat:"Alkalmak", hu:"Újév", en:"New Year", example:"We watch fireworks on New Year\'s Eve." },
  { cat:"Alkalmak", hu:"Ünnepel", en:"Celebrate", example:"Let\'s celebrate together!" },
  { cat:"Alkalmak", hu:"Ajándék", en:"Gift / Present", example:"She gave me a wonderful birthday gift." },
  { cat:"Alkalmak", hu:"Meglepetés", en:"Surprise", example:"We organised a surprise party for her." },
  { cat:"Alkalmak", hu:"Meghívó", en:"Invitation", example:"I received a wedding invitation last week." },
  { cat:"Alkalmak", hu:"Üdvözlőlap", en:"Greeting card", example:"I always send a greeting card on birthdays." },
];

let studentName = '';
let cardList = [...CARDS];
let currentIndex = 0;
let isFlipped = false;

// Read student name from URL
(function() {
  const params = new URLSearchParams(window.location.search);
  const urlName = params.get('name');
  if (urlName) {
    studentName = decodeURIComponent(urlName);
  } else {
    // No name = send them back to login
    window.location.href = 'index.html';
    return;
  }
  document.getElementById('nav-name').textContent = studentName;

  // Preserve name on back link, and include level so dashboard returns to same section
  const nameParam = '?name=' + encodeURIComponent(studentName);
  const backParam = nameParam + '&level=a2';
  document.getElementById('back-link').setAttribute('href', 'index.html' + backParam);
  document.getElementById('logo-link').setAttribute('href', 'index.html' + nameParam);

  renderCard();
})();

function renderCard() {
  const card = cardList[currentIndex];
  const total = cardList.length;

  document.getElementById('counter').textContent = `${currentIndex + 1} / ${total}`;
  document.getElementById('progress-fill').style.width = `${((currentIndex + 1) / total) * 100}%`;
  document.getElementById('cat-label').textContent = card.cat;
  document.getElementById('card-hu').textContent = card.hu;
  document.getElementById('card-en').textContent = card.en;
  document.getElementById('card-example').textContent = card.example;

  // Un-flip on new card
  isFlipped = false;
  document.getElementById('flip-inner').classList.remove('is-flipped');

  // Disable prev on first card
  document.getElementById('prev-btn').disabled = currentIndex === 0;
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('flip-inner').classList.toggle('is-flipped', isFlipped);
}

function nextCard() {
  if (currentIndex < cardList.length - 1) {
    currentIndex++;
    renderCard();
  } else {
    showResult();
  }
}

function prevCard() {
  if (currentIndex > 0) {
    currentIndex--;
    renderCard();
  }
}

function shuffleCards() {
  for (let i = cardList.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [cardList[i], cardList[j]] = [cardList[j], cardList[i]];
  }
  currentIndex = 0;
  renderCard();
}

function showResult() {
  document.getElementById('card-screen').style.display = 'none';
  document.getElementById('result-screen').classList.add('active');

  const seen = currentIndex + 1;
  const total = cardList.length;
  const pct = Math.round((seen / total) * 100);

  document.getElementById('result-name').textContent = studentName;
  document.getElementById('result-count').textContent = seen;

  let feedback = '';
  if (pct === 100) {
    feedback = 'Végigmentél az összes szón. Szuper munka!';
  } else if (pct >= 60) {
    feedback = 'Szép haladás. Még pár kör, és rögzül!';
  } else {
    feedback = 'Jó kezdés. Térj vissza hamarosan — az ismétlés a kulcs.';
  }
  document.getElementById('result-feedback').textContent = feedback;

  // Send to Make webhook (silently — ignore failures)
  fetch(MAKE_WEBHOOK_URL, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      Student: studentName,
      Quiz: MODULE_META.title,
      Score: seen,
      TotalQuestions: total,
      Level: MODULE_META.level,
      Skill: MODULE_META.skill,
      Percentage: pct,
      CompletedAt: new Date().toISOString()
    })
  }).catch(() => {});
}

function restartFromStart() {
  currentIndex = 0;
  document.getElementById('result-screen').classList.remove('active');
  document.getElementById('card-screen').style.display = 'flex';
  renderCard();
}

function shuffleAndRestart() {
  shuffleCards();
  document.getElementById('result-screen').classList.remove('active');
  document.getElementById('card-screen').style.display = 'flex';
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (document.getElementById('result-screen').classList.contains('active')) return;
  if (e.key === 'ArrowRight') nextCard();
  if (e.key === 'ArrowLeft') prevCard();
  if (e.key === ' ') { e.preventDefault(); flipCard(); }
});
</script>

</body>
</html>
