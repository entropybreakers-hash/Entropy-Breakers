let studentName="",cardList=[...CARDS],currentIndex=0,isFlipped=false;
function startApp(){const i=document.getElementById('student-name');const n=i.value.trim();if(n.length<3){alert("Kérlek írj be legalább 3 karaktert!");i.focus();return;}studentName=n;currentIndex=0;document.getElementById('start-screen').classList.add('hidden');document.getElementById('card-screen').classList.remove('hidden');renderCard();}
document.getElementById('student-name').addEventListener('keypress',e=>{if(e.key==='Enter')startApp();});
function renderCard(){const c=cardList[currentIndex];const t=cardList.length;document.getElementById('card-counter').innerText=`${currentIndex+1} / ${t}`;document.getElementById('progress-fill').style.width=`${((currentIndex+1)/t)*100}%`;document.getElementById('cat-label').innerText=c.cat;document.getElementById('front-cat').innerText=c.cat;document.getElementById('back-cat').innerText=c.cat;document.getElementById('card-hu').innerText=c.hu;document.getElementById('card-en').innerText=c.en;document.getElementById('card-example').innerText=`"${c.example}"`;isFlipped=false;document.getElementById('flip-inner').classList.remove('is-flipped');}
function flipCard(){isFlipped=!isFlipped;document.getElementById('flip-inner').classList.toggle('is-flipped',isFlipped);}
function nextCard(){if(currentIndex<cardList.length-1){currentIndex++;renderCard();}else showResult();}
function prevCard(){if(currentIndex>0){currentIndex--;renderCard();}}
function shuffleCards(){for(let i=cardList.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[cardList[i],cardList[j]]=[cardList[j],cardList[i]];}currentIndex=0;renderCard();}
function showResult(){document.getElementById('card-screen').classList.add('hidden');document.getElementById('result-screen').classList.remove('hidden');document.getElementById('display-name').innerText=studentName;document.getElementById('seen-count').innerText=currentIndex+1;const pct=Math.round(((currentIndex+1)/cardList.length)*100);document.getElementById('feedback-msg').innerText=pct===100?"Zseniális! Az összes szót megtanultad! ✈️":pct>=60?"Szép haladás! Folytasd!":"Jó kezdés! Ismételj és magabiztos leszel!";fetch(MAKE_WEBHOOK_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({Student:studentName,Quiz:"B2 Vocabulary - Global Issues & Travel",Score:currentIndex+1,TotalQuestions:cardList.length,Level:"B2",Skill:"Vocabulary",Percentage:pct,CompletedAt:new Date().toISOString()})}).catch(()=>{});}
function restartFromStart(){currentIndex=0;document.getElementById('result-screen').classList.add('hidden');document.getElementById('card-screen').classList.remove('hidden');renderCard();}
function shuffleAndRestart(){shuffleCards();document.getElementById('result-screen').classList.add('hidden');document.getElementById('card-screen').classList.remove('hidden');}
function adminAccess(){if(prompt("Jelszó:")==="bettina2026")alert("Az eredmények a Make → Airtable rendszerben mentődnek.");}
document.addEventListener('keydown',e=>{if(document.getElementById('card-screen').classList.contains('hidden'))return;if(e.key==='ArrowRight')nextCard();if(e.key==='ArrowLeft')prevCard();if(e.key===' '){e.preventDefault();flipCard();}});
</script>

<script>

        setTimeout(function(){

});
