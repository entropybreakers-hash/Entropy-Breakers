.floor-glow{position:absolute;bottom:0;left:0;right:0;height:40%;background:radial-gradient(ellipse 80% 60% at 50% 100%,rgba(16,185,129,0.28) 0%,transparent 70%);filter:blur(20px)}

.hu-word{font-family:'Exo 2',sans-serif;font-size:1.6rem;font-weight:900;color:#fff;margin-bottom:18px}
.forms-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}

</style>
</head>

<div class="bg-wrap"><div class="mesh"></div><div class="light-rays"></div><div class="grid-bg"></div><div class="floor-glow"></div></div>

  <div id="s-card">

      <button class="btn-main" onclick="nextCard()">Next &#8594;</button>
    </div>
    <button class="btn-shuffle" onclick="shuffleAndRestart()">&#8645; Shuffle</button>
  </div>

  <!-- RESULT -->
  <div id="s-result">
    <div class="result-icon">&#9989;</div>
    <div class="result-title">Well done!</div>
    <div class="result-sub" id="r-sub">You reviewed all the verbs</div>
    <div class="result-panel">
      <div class="result-count" id="r-count">60</div>
      <div class="result-denom">verbs reviewed</div>
      <div class="result-msg">Review again to memorise them all!</div>
    </div>
    <div class="nav-row">
      <button class="btn-ghost" onclick="restartFromStart()">&#8635; Restart</button>
      <button class="btn-main" onclick="shuffleAndRestart()">&#8645; Shuffle</button>
    </div>
  </div>
</div>

let studentName="", selectedFilter="ALL", cardList=[], currentIndex=0, isFlipped=false;

function show(id){document.getElementById(id).classList.remove('hidden');}
function hide(id){document.getElementById(id).classList.add('hidden');}

function setFilter(f){
    selectedFilter=f;
    ['ALL','IRREGULAR','REGULAR'].forEach(k=>document.getElementById('f-'+k).classList.toggle('on',k===f));
}

function startApp(){
    const name=document.getElementById('student-name').value.trim();
    if (name.length < 2) { input.focus(); return; }
    studentName=name;
    cardList=selectedFilter==='ALL'?[...ALL_CARDS]:ALL_CARDS.filter(c=>c.type===selectedFilter);
    shuffle(cardList);
    currentIndex=0;
    hide('s-start');show('s-cards');
    renderCard();
}

document.getElementById('student-name').addEventListener('keypress',e=>{if(e.key==='Enter')startApp();});

function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}}

function renderCard(){
    const c=cardList[currentIndex];
    const total=cardList.length;
    const irr=c.type==='IRREGULAR';
    document.getElementById('q-counter').innerText=(currentIndex+1)+' / '+total;
    document.getElementById('prog').style.width=(((currentIndex+1)/total)*100)+'%';
    document.getElementById('cat-label').innerText=irr?'🔴 Szabálytalan':'🟢 Szabályos';
    document.getElementById('card-hu').innerText=c.hu;
    document.getElementById('c-v1').innerText=c.v1;
    document.getElementById('c-v2').innerText=c.v2;
    document.getElementById('c-v3').innerText=c.v3;
    document.getElementById('c-ex').innerText='"'+c.ex+'"';
    const bc=irr?'badge b-irr':'badge b-reg';
    const bt=irr?'🔴 Szabálytalan':'🟢 Szabályos';
    document.getElementById('badge-f').className=bc;
    document.getElementById('badge-f').innerText=bt;
    document.getElementById('badge-b').className=bc;
    document.getElementById('badge-b').innerText=bt;
    isFlipped=false;
    document.getElementById('flip-inner').classList.remove('flipped');
}

function flipCard() {
    isFlipped = !isFlipped;
    document.getElementById('flip-inner').classList.toggle('is-flipped', isFlipped);
}
function nextCard(){if(currentIndex<cardList.length-1){currentIndex++;renderCard();}else showResult();}
function prevCard(){if(currentIndex>0){currentIndex--;renderCard();}}
function shuffleCards(){shuffle(cardList);currentIndex=0;renderCard();}

function showResult(){
    hide('s-cards');show('s-result');
    const total=cardList.length;
    const pct=Math.round(((currentIndex+1)/total)*100);
    const fl=selectedFilter==='ALL'?'Mind':selectedFilter==='IRREGULAR'?'Szabálytalan':'Szabályos';
    document.getElementById('r-name').innerText=studentName;
    document.getElementById('r-seen').innerText=currentIndex+1;
    document.getElementById('r-total').innerText='/ '+total+' ige';
    document.getElementById('r-filter').innerText=fl;
    document.getElementById('r-msg').innerText=pct===100?"Zseniális! Az összes igét átmenté! ⚡":pct>=60?"Szép haladás! Folytasd!":"Jó kezdés! Ismételj és magabiztos leszel!";
    fetch(MAKE_WEBHOOK_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({Student:studentName,Quiz:"Essential Verbs ("+fl+")",Score:currentIndex+1,TotalQuestions:total,Level:"A2-B2",Skill:"Vocabulary",Percentage:pct,CompletedAt:new Date().toISOString()})}).catch(()=>{});
}

function restartFromStart(){currentIndex=0;hide('s-result');show('s-cards');renderCard();}
function shuffleAndRestart(){shuffle(cardList);currentIndex=0;hide('s-result');show('s-cards');renderCard();}
function adminAccess(){if(prompt("Jelszó:")==="bettina2026")alert("Az eredmények a Make → Airtable rendszerben mentődnek.");}

document.addEventListener('keydown',e=>{
    if(!document.getElementById('s-cards').classList.contains('hidden')){
        if(e.key==='ArrowRight')nextCard();
        else if(e.key==='ArrowLeft')prevCard();
        else if(e.key===' '){e.preventDefault();flipCard();}
    }
});

</script>

<script>

// ═══ ENTROPY BREAKERS — DEFINITIVE AUTO-START ═══
(function() {
  var p = new URLSearchParams(window.location.search);
  var n = p.get('name');
  if (!n || n.length < 1) return;
  var name = decodeURIComponent(n);
  window.__eb_student_name = name;

  function doStart() {
    // 1. Fill all possible name inputs
    var inputIds = ['student-name','name-input','nameInput','studentName','player-name'];
    for (var i = 0; i < inputIds.length; i++) {
      var el = document.getElementById(inputIds[i]);
      if (el) el.value = name;
    }

    // 2. Set global studentName variable if it exists
    try { if (typeof studentName !== 'undefined') studentName = name; } catch(e) {}
    try { if (typeof window.studentName !== 'undefined') window.studentName = name; } catch(e) {}

    // 3. Hide start screen
    var startEl = document.getElementById('start-screen');
    if (startEl) startEl.classList.add('hidden');

    // 4. Call whichever start function exists
    var fns = ['startApp','checkName','startQuiz','startTest','start','startTraining','startPlatform'];
    for (var j = 0; j < fns.length; j++) {
      if (typeof window[fns[j]] === 'function') {
        try { window[fns[j]](); } catch(e) {}
        break;
      }
    }
  }

  // Run after full page load
  if (document.readyState === 'complete') {
    setTimeout(doStart, 100);
  } else {
    window.addEventListener('load', function() { setTimeout(doStart, 100); });
  }
})();

</script>
