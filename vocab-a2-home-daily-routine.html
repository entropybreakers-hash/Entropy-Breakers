<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A2 Home & Daily Routine | Entropy Breakers 🚀</title>
    <script src="https://cdn.tailwindcss.com">
    window.addEventListener("load", startApp);
</script>
    <style>
        :root { --neon-mint: #2dd4bf; --neon-indigo: #6366f1; --glass-bg: rgba(255,255,255,0.04); --card-border: rgba(45,212,191,0.16); }
        * { box-sizing: border-box; }
        body { background: radial-gradient(circle at 15% 15%, rgba(45,212,191,0.12), transparent 40%), radial-gradient(circle at 85% 85%, rgba(99,102,241,0.12), transparent 40%), #020617; font-family: -apple-system, system-ui, sans-serif; color: #f1f5f9; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; margin: 0; }
        .cyber-shell { background: rgba(2,6,23,0.88); backdrop-filter: blur(16px); border: 1px solid var(--card-border); box-shadow: 0 0 30px rgba(45,212,191,0.08); border-radius: 32px; width: 100%; max-width: 560px; overflow: hidden; }
        .mint-glow-text { color: var(--neon-mint); text-shadow: 0 0 14px rgba(45,212,191,0.6); }
        .aurora-title { background: linear-gradient(135deg, #fff 35%, var(--neon-mint) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass-panel { background: var(--glass-bg); border: 1px solid rgba(255,255,255,0.06); border-radius: 24px; }
        .input-field { width: 100%; padding: 18px 20px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.04); color: white; font-weight: 700; text-align: center; outline: none; transition: all 0.25s ease; font-size: 1rem; }
        .input-field::placeholder { color: #94a3b8; }
        .input-field:focus { border-color: var(--neon-mint); box-shadow: 0 0 20px rgba(45,212,191,0.15); background: rgba(255,255,255,0.06); }
        .primary-btn { background: linear-gradient(135deg, #0d9488 0%, #4f46e5 100%); box-shadow: 0 0 20px rgba(45,212,191,0.22); border: 1px solid rgba(255,255,255,0.14); transition: all 0.25s ease; cursor: pointer; }
        .primary-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .nav-btn { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); border-radius: 50%; width: 56px; height: 56px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s ease; flex-shrink: 0; }
        .nav-btn:hover { background: rgba(45,212,191,0.12); border-color: var(--neon-mint); }
        .nav-btn:active { transform: scale(0.94); }
        .progress-track { width: 100%; height: 8px; background: rgba(255,255,255,0.08); border-radius: 999px; overflow: hidden; }
        .progress-bar-inner { height: 100%; background: linear-gradient(90deg, var(--neon-mint), var(--neon-indigo)); transition: width 0.45s ease; }
        .animate-slide { animation: slideIn 0.35s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        .flip-container { perspective: 1200px; width: 100%; height: 260px; cursor: pointer; }
        .flip-inner { position: relative; width: 100%; height: 100%; transition: transform 0.55s cubic-bezier(0.4,0,0.2,1); transform-style: preserve-3d; }
        .flip-inner.is-flipped { transform: rotateY(180deg); }
        .flip-front, .flip-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 24px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 28px 24px; text-align: center; }
        .flip-front { background: rgba(255,255,255,0.04); border: 1px solid rgba(45,212,191,0.2); }
        .flip-back { background: linear-gradient(135deg, rgba(13,148,136,0.22), rgba(79,70,229,0.22)); border: 1px solid rgba(45,212,191,0.3); transform: rotateY(180deg); }
        .cat-pill { display: inline-flex; align-items: center; background: rgba(45,212,191,0.12); border: 1px solid rgba(45,212,191,0.25); color: #5eead4; border-radius: 999px; padding: 4px 12px; font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 12px; }
        .en-word { font-size: 2rem; font-weight: 900; color: white; margin-bottom: 8px; }
        .example { font-size: 0.78rem; color: #94a3b8; font-style: italic; line-height: 1.4; }
        .flip-hint { position: absolute; bottom: 12px; right: 16px; font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; opacity: 0.3; }
        .result-card { background: linear-gradient(135deg, rgba(13,148,136,0.18), rgba(79,70,229,0.18)); border: 1px solid rgba(45,212,191,0.16); border-radius: 32px; }
    </style>
</head>
<body>
<div id="app" class="cyber-shell p-6 md:p-10">

    <!-- START -->
    <!-- CARD SCREEN -->
    <div id="card-screen" class="animate-slide">
        <header class="flex justify-between items-center mb-5">
            <div class="glass-panel px-4 py-2 text-[10px] font-black uppercase text-teal-300 tracking-widest"><span id="cat-label">-</span></div>
            <div class="glass-panel px-4 py-2 text-[10px] font-black uppercase text-slate-300 tracking-widest"><span id="card-counter">1 / 50</span></div>
        </header>
        <div class="progress-track mb-5"><div id="progress-fill" class="progress-bar-inner" style="width:0%"></div></div>

        <div class="flip-container mb-5" onclick="flipCard()">
            <div class="flip-inner" id="flip-inner">
                <div class="flip-front">
                    <div class="cat-pill" id="front-cat">-</div>
                    <p class="text-slate-400 text-[10px] font-black uppercase tracking-widest mb-3">Magyar</p>
                    <h2 id="card-hu" class="text-3xl font-black text-white leading-snug">-</h2>
                    <span class="flip-hint text-slate-500">Koppints →</span>
                </div>
                <div class="flip-back">
                    <div class="cat-pill" id="back-cat">-</div>
                    <p class="text-teal-300 text-[10px] font-black uppercase tracking-widest mb-2">Angol</p>
                    <div id="card-en" class="en-word">-</div>
                    <p id="card-example" class="example">-</p>
                    <span class="flip-hint text-teal-400">← Vissza</span>
                </div>
            </div>
        </div>

        <div class="flex items-center justify-between gap-4 mb-5">
            <button class="nav-btn" onclick="prevCard()"><svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
            <p class="flex-1 text-center text-slate-500 text-[10px] font-black uppercase tracking-widest">Koppints a fordításért</p>
            <button class="nav-btn" onclick="nextCard()"><svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        </div>
        <div class="grid grid-cols-2 gap-3">
            <button onclick="shuffleCards()" class="py-4 glass-panel text-slate-300 font-black text-xs uppercase tracking-widest hover:bg-white/10 transition rounded-2xl">🔀 Keverés</button>
            <button onclick="showResult()" class="py-4 primary-btn text-white font-black text-xs uppercase tracking-widest rounded-2xl">✅ Kész!</button>
        </div>
    </div>

    <!-- RESULT -->
    <div id="result-screen" class="hidden text-center animate-slide">
        <div class="text-6xl mb-6">🏠</div>
        <h2 class="text-3xl font-black text-white mb-2 uppercase">Szép munka!</h2>
        <p class="text-slate-400 font-medium mb-8"><span id="display-name" class="mint-glow-text"></span>, átmenté a kártyákat!</p>
        <div class="result-card p-8 mb-8">
            <div class="text-teal-300 font-black uppercase text-xs mb-2 tracking-widest">🟢 A2 · Home & Daily Routine</div>
            <div class="text-7xl font-black text-white" id="seen-count">0</div>
            <div class="text-slate-400 text-sm mt-1">/ 50 szó</div>
            <div id="feedback-msg" class="mt-4 text-teal-200 font-bold italic text-sm">-</div>
        </div>
        <div class="grid grid-cols-2 gap-3">
            <button onclick="restartFromStart()" class="py-5 bg-white/5 text-slate-300 rounded-2xl font-black uppercase tracking-widest hover:bg-white/10 transition text-xs">🔄 Újrakezdés</button>
            <button onclick="shuffleAndRestart()" class="py-5 primary-btn text-white rounded-2xl font-black uppercase tracking-widest text-xs">🔀 Új sorrend</button>
        </div>
    </div>
</div>

<script>
    const MAKE_WEBHOOK_URL = "https://hook.eu1.make.com/ww4obw8ghb8h46ti1gi6yoy2qg1db7ad";

    // cat = topic tag, hu = Hungarian word, en = English word, example = sentence using the word
    const CARDS = [
        // 🏠 ROOMS & FURNITURE
        { cat:"🏠 Szobák", hu:"Konyha", en:"Kitchen", example:"I make breakfast in the kitchen every morning." },
        { cat:"🏠 Szobák", hu:"Hálószoba", en:"Bedroom", example:"My bedroom is on the first floor." },
        { cat:"🏠 Szobák", hu:"Fürdőszoba", en:"Bathroom", example:"I brush my teeth in the bathroom." },
        { cat:"🏠 Szobák", hu:"Nappali", en:"Living room", example:"We watch TV in the living room." },
        { cat:"🏠 Szobák", hu:"Étkező", en:"Dining room", example:"We eat dinner in the dining room." },
        { cat:"🛋️ Bútorok", hu:"Kanapé", en:"Sofa / Couch", example:"I sit on the sofa and read a book." },
        { cat:"🛋️ Bútorok", hu:"Szekrény", en:"Wardrobe", example:"My clothes are in the wardrobe." },
        { cat:"🛋️ Bútorok", hu:"Polc", en:"Shelf", example:"I put my books on the shelf." },
        { cat:"🛋️ Bútorok", hu:"Mosógép", en:"Washing machine", example:"I use the washing machine twice a week." },
        { cat:"🛋️ Bútorok", hu:"Hűtőszekrény", en:"Fridge", example:"The milk is in the fridge." },

        // ⏰ DAILY ROUTINE
        { cat:"⏰ Napi rutin", hu:"Felébred", en:"Wake up", example:"I wake up at 7 o'clock every day." },
        { cat:"⏰ Napi rutin", hu:"Megreggelizik", en:"Have breakfast", example:"I have breakfast before going to work." },
        { cat:"⏰ Napi rutin", hu:"Zuhanyozik", en:"Take a shower", example:"I take a shower every morning." },
        { cat:"⏰ Napi rutin", hu:"Fogat mos", en:"Brush teeth", example:"I brush my teeth after every meal." },
        { cat:"⏰ Napi rutin", hu:"Felöltözik", en:"Get dressed", example:"I get dressed quickly in the morning." },
        { cat:"⏰ Napi rutin", hu:"Munkába megy", en:"Go to work", example:"I go to work by bus." },
        { cat:"⏰ Napi rutin", hu:"Ebédel", en:"Have lunch", example:"I have lunch at one o'clock." },
        { cat:"⏰ Napi rutin", hu:"Hazajön", en:"Come home", example:"I come home at six in the evening." },
        { cat:"⏰ Napi rutin", hu:"Vacsorázik", en:"Have dinner", example:"We have dinner together as a family." },
        { cat:"⏰ Napi rutin", hu:"Lefekszik aludni", en:"Go to bed", example:"I go to bed at ten o'clock." },

        // 🧹 HOUSEWORK
        { cat:"🧹 Házimunka", hu:"Takarít", en:"Clean", example:"I clean the house every Saturday." },
        { cat:"🧹 Házimunka", hu:"Porszívózik", en:"Vacuum", example:"I vacuum the carpet once a week." },
        { cat:"🧹 Házimunka", hu:"Mosogat", en:"Wash the dishes", example:"I wash the dishes after dinner." },
        { cat:"🧹 Házimunka", hu:"Főz", en:"Cook", example:"I cook dinner every evening." },
        { cat:"🧹 Házimunka", hu:"Bevásárol", en:"Do the shopping", example:"I do the shopping on Fridays." },
        { cat:"🧹 Házimunka", hu:"Mosást végez", en:"Do the laundry", example:"I do the laundry on Sundays." },
        { cat:"🧹 Házimunka", hu:"Locsol", en:"Water the plants", example:"I water the plants every two days." },
        { cat:"🧹 Házimunka", hu:"Szemetet visz ki", en:"Take out the rubbish", example:"Please take out the rubbish tonight." },

        // 🌆 PLACES AT HOME
        { cat:"🏡 Otthon", hu:"Kert", en:"Garden", example:"We have a small garden behind the house." },
        { cat:"🏡 Otthon", hu:"Erkély", en:"Balcony", example:"I drink coffee on the balcony." },
        { cat:"🏡 Otthon", hu:"Előszoba", en:"Hallway", example:"Leave your shoes in the hallway." },
        { cat:"🏡 Otthon", hu:"Pince", en:"Basement", example:"We store old boxes in the basement." },
        { cat:"🏡 Otthon", hu:"Tetőtér", en:"Attic", example:"My old toys are in the attic." },
        { cat:"🏡 Otthon", hu:"Garázs", en:"Garage", example:"My dad keeps his car in the garage." },

        // ⏱️ TIME EXPRESSIONS
        { cat:"⏱️ Idő", hu:"Reggel", en:"In the morning", example:"I exercise in the morning before work." },
        { cat:"⏱️ Idő", hu:"Délben", en:"At noon / At lunchtime", example:"I eat a sandwich at noon." },
        { cat:"⏱️ Idő", hu:"Délután", en:"In the afternoon", example:"I feel sleepy in the afternoon." },
        { cat:"⏱️ Idő", hu:"Este", en:"In the evening", example:"I relax in the evening." },
        { cat:"⏱️ Idő", hu:"Éjjel", en:"At night", example:"I sleep eight hours at night." },
        { cat:"⏱️ Idő", hu:"Minden nap", en:"Every day", example:"I drink coffee every day." },
        { cat:"⏱️ Idő", hu:"Hétvégén", en:"At the weekend", example:"I visit my parents at the weekend." },
        { cat:"⏱️ Idő", hu:"Általában", en:"Usually", example:"I usually wake up at seven." },
        { cat:"⏱️ Idő", hu:"Néha", en:"Sometimes", example:"I sometimes cook Italian food." },
        { cat:"⏱️ Idő", hu:"Soha", en:"Never", example:"I never skip breakfast." },

        // 🔌 HOUSEHOLD ITEMS
        { cat:"🔌 Eszközök", hu:"Lámpa", en:"Lamp", example:"Turn on the lamp, it's dark in here." },
        { cat:"🔌 Eszközök", hu:"Kapcsoló", en:"Light switch", example:"The light switch is next to the door." },
        { cat:"🔌 Eszközök", hu:"Ablak", en:"Window", example:"Please open the window — it's hot." },
        { cat:"🔌 Eszközök", hu:"Ajtó", en:"Door", example:"Please close the door when you leave." },
        { cat:"🔌 Eszközök", hu:"Kulcs", en:"Key", example:"Don't forget your key!" },
        { cat:"🔌 Eszközök", hu:"Riasztó", en:"Alarm clock", example:"My alarm clock rings at 6:30." },
    ];

    let studentName = "";
    // Read student name from URL ?name=...
    const urlParams = new URLSearchParams(window.location.search);
    studentName = decodeURIComponent(urlParams.get('name') || 'Student');
    let cardList = [...CARDS];
    let currentIndex = 0;
    let isFlipped = false;

    function startApp() {
        
        
        
        
        currentIndex = 0;
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('card-screen').classList.remove('hidden');
        renderCard();
    }

     });

    function renderCard() {
        const card = cardList[currentIndex];
        const total = cardList.length;
        document.getElementById('card-counter').innerText = `${currentIndex + 1} / ${total}`;
        document.getElementById('progress-fill').style.width = `${((currentIndex + 1) / total) * 100}%`;
        document.getElementById('cat-label').innerText = card.cat;
        document.getElementById('front-cat').innerText = card.cat;
        document.getElementById('back-cat').innerText = card.cat;
        document.getElementById('card-hu').innerText = card.hu;
        document.getElementById('card-en').innerText = card.en;
        document.getElementById('card-example').innerText = `"${card.example}"`;
        isFlipped = false;
        document.getElementById('flip-inner').classList.remove('is-flipped');
    }

    function flipCard() {
        isFlipped = !isFlipped;
        document.getElementById('flip-inner').classList.toggle('is-flipped', isFlipped);
    }

    function nextCard() {
        if (currentIndex < cardList.length - 1) { currentIndex++; renderCard(); }
        else showResult();
    }

    function prevCard() {
        if (currentIndex > 0) { currentIndex--; renderCard(); }
    }

    function shuffleCards() {
        for (let i = cardList.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [cardList[i], cardList[j]] = [cardList[j], cardList[i]];
        }
        currentIndex = 0; renderCard();
    }

    function showResult() {
        document.getElementById('card-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('display-name').innerText = studentName;
        document.getElementById('seen-count').innerText = currentIndex + 1;
        const pct = Math.round(((currentIndex + 1) / cardList.length) * 100);
        document.getElementById('feedback-msg').innerText = pct === 100
            ? "Zseniális! Az összes otthoni szót megtanultad! 🏠"
            : pct >= 60 ? "Szép haladás! Folytasd a tanulást!"
            : "Jó kezdés! Ismételj és magabiztos leszel!";
        fetch(MAKE_WEBHOOK_URL, { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({ Student: studentName, Quiz:"A2 Vocabulary - Home & Daily Routine", Score: currentIndex+1, TotalQuestions: cardList.length, Level:"A2", Skill:"Vocabulary", Percentage: pct, CompletedAt: new Date().toISOString() }) }).catch(()=>{});
    }

    function restartFromStart() {
        currentIndex = 0;
        document.getElementById('result-screen').classList.add('hidden');
        document.getElementById('card-screen').classList.remove('hidden');
        renderCard();
    }

    function shuffleAndRestart() {
        shuffleCards();
        document.getElementById('result-screen').classList.add('hidden');
        document.getElementById('card-screen').classList.remove('hidden');
    }

    function adminAccess() {
        if (prompt("Jelszó:") === "bettina2026") alert("Az eredmények a Make → Airtable rendszerben mentődnek.");
    }

    document.addEventListener('keydown', e => {
        if (document.getElementById('card-screen').classList.contains('hidden')) return;
        if (e.key === 'ArrowRight') nextCard();
        if (e.key === 'ArrowLeft') prevCard();
        if (e.key === ' ') { e.preventDefault(); flipCard(); }
    });
</script>
</body>
</html>
