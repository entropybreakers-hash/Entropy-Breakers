<script>
    // ── API KEY STORED SAFELY IN MAKE.COM — NOT HERE ──
    const MAKE_WEBHOOK_URL = "https://hook.eu1.make.com/ww4obw8ghb8h46ti1gi6yoy2qg1db7ad";
    const QUIZ_NAME = "B2 Grammar Master";
    const QUIZ_LEVEL = "B2";
    const QUIZ_SKILL = "Grammar";

    const quizData = [
        // ── INVERSIONS ──
        { q: "Never _______ such a beautiful sunset before.", options: ["had I seen", "I had seen", "I saw", "did I see"], correct: 0, exp: "Inverzió: 'Never' mondatkezdő tagadószó után fordított szórend (segédige + alany) kötelező." },
        { q: "Hardly _______ sat down when the phone rang.", options: ["had she", "she had", "did she", "she"], correct: 0, exp: "Inverzió: 'Hardly...when' — a múlt befejezett idő inverzióval jelenik meg." },
        { q: "Not until midnight _______ the noise stop.", options: ["did", "was", "had", "would"], correct: 0, exp: "Inverzió: 'Not until' után a segédige megelőzi az alanyt." },
        { q: "No sooner _______ left than it began to snow.", options: ["had they", "they had", "did they", "were they"], correct: 0, exp: "Inverzió: 'No sooner...than' — Past Perfect inverzióval a 'no sooner' klózban." },
        { q: "Little _______ that she was being watched.", options: ["did she know", "she knew", "she did know", "knew she"], correct: 0, exp: "Inverzió: 'Little' negatív értelmű határozó után segédige + alany sorrend." },
        { q: "Scarcely _______ finished eating when the guests arrived.", options: ["had we", "we had", "did we", "were we"], correct: 0, exp: "Inverzió: 'Scarcely...when' — Past Perfect inverzióval." },
        { q: "Under no circumstances _______ leave the building unattended.", options: ["should you", "you should", "you must", "must"], correct: 0, exp: "Inverzió: 'Under no circumstances' után kötelező a fordított szórend." },
        // ── CONDITIONALS ──
        { q: "If I _______ more carefully, I wouldn't have made that mistake.", options: ["had read", "read", "would read", "have read"], correct: 0, exp: "3. feltételes: If + Past Perfect → would have + V3." },
        { q: "Were _______ to resign, the whole project would collapse.", options: ["he", "him", "his", "himself"], correct: 0, exp: "2. feltételes inverzióval: 'Were he to...' = If he were to resign..." },
        { q: "Had they _______ earlier, they would have caught the train.", options: ["left", "leave", "been leaving", "to leave"], correct: 0, exp: "3. feltételes inverzióval: 'Had they left' = If they had left." },
        { q: "Supposing you _______ offered the job, would you take it?", options: ["were", "are", "had been", "would be"], correct: 0, exp: "Supposing + Past Simple: képzeletbeli jelenbeli helyzet." },
        { q: "I would sooner _______ alone than go with them.", options: ["go", "to go", "going", "gone"], correct: 0, exp: "Would sooner + bare infinitive: inkább azt tenné." },
        // ── WISH / IF ONLY ──
        { q: "I wish I _______ my temper in that meeting.", options: ["hadn't lost", "didn't lose", "haven't lost", "wouldn't lose"], correct: 0, exp: "Wish + Past Perfect: múltbeli sajnálkozás — a 'lost' előtt had tagadva." },
        { q: "If only she _______ harder at school.", options: ["had worked", "worked", "has worked", "would work"], correct: 0, exp: "If only + Past Perfect: erős múltbeli megbánás." },
        { q: "I wish you _______ make so much noise.", options: ["wouldn't", "won't", "don't", "didn't"], correct: 0, exp: "Wish + would: bosszúságot fejez ki valaki viselkedésével kapcsolatban." },
        // ── MIXED SUBJUNCTIVE / IT'S TIME ──
        { q: "It's high time the government _______ action on climate change.", options: ["took", "takes", "has taken", "take"], correct: 0, exp: "It's high time + Past Simple: sürgető, megkésett cselekvés jelzése." },
        { q: "The committee recommended that the policy _______ reviewed.", options: ["be", "is", "was", "should be"], correct: 0, exp: "Kötőmód (subjunctive): recommend that + alap ige (be, not is)." },
        { q: "It is vital that every delegate _______ present.", options: ["be", "is", "will be", "was"], correct: 0, exp: "Kötőmód: vital that + szótári alak (be), nem 'is'." },
        // ── PASSIVE ADVANCED ──
        { q: "The suspect is believed _______ the country.", options: ["to have left", "to leave", "leaving", "have left"], correct: 0, exp: "Personal passive: is believed + to have + V3 (befejezett infinitív)." },
        { q: "The results were said _______ impressive.", options: ["to be", "being", "be", "to have been"], correct: 0, exp: "Personal passive: were said + to be (egyidejű cselekvés)." },
        { q: "The building is reported _______ in the fire.", options: ["to have been destroyed", "to be destroyed", "being destroyed", "to destroy"], correct: 0, exp: "Personal passive: to have been + V3 — passzív befejezett infinitív." },
        { q: "He is known _______ a highly influential figure.", options: ["to be", "being", "as being", "to have been"], correct: 0, exp: "Personal passive: is known + to be (általánosan tudott tény)." },
        // ── REPORTED SPEECH ADVANCED ──
        { q: "She warned me _______ touch the wet paint.", options: ["not to", "to not", "not", "don't"], correct: 0, exp: "Reported warning: warn + object + not to + infinitive." },
        { q: "He denied _______ the documents.", options: ["having forged", "to forge", "forging", "forge"], correct: 0, exp: "Deny + -ing (tagadja, hogy tette): 'having forged' hangsúlyozza a befejezettséget." },
        { q: "They urged the president _______ the treaty.", options: ["to sign", "signing", "sign", "signed"], correct: 0, exp: "Urge + object + to infinitive." },
        // ── GERUNDS & INFINITIVES (ADVANCED) ──
        { q: "I regret _______ you that your application was unsuccessful.", options: ["to inform", "informing", "inform", "to informing"], correct: 0, exp: "Regret + to-infinitive: sajnálattal közölni valamit (formális). Regret + -ing = sajnálja, amit tett." },
        { q: "She stopped _______ to catch her breath.", options: ["to run", "running", "run", "having run"], correct: 0, exp: "Stop + to-infinitive: azért áll meg, hogy tegyen valamit. Stop + -ing: abbahagyja a cselekvést." },
        { q: "I remember _______ that film years ago — it was brilliant.", options: ["seeing", "to see", "seen", "having seen"], correct: 0, exp: "Remember + -ing: visszaemlékszik a múltban történt eseményre." },
        { q: "He went on _______ despite the interruptions.", options: ["speaking", "to speak", "speak", "spoken"], correct: 0, exp: "Go on + -ing: folytatja ugyanazt a cselekvést." },
        { q: "Try _______ the document in a different folder.", options: ["saving", "to save", "save", "saved"], correct: 0, exp: "Try + -ing: kísérletezik, kipróbál valamit (lehet, hogy segít)." },
        { q: "I meant _______ you, but I completely forgot.", options: ["to call", "calling", "call", "to calling"], correct: 0, exp: "Mean + to-infinitive: szándékában volt valamit tenni." },
        // ── MODALS ADVANCED ──
        { q: "She _______ have passed — she studied for months.", options: ["must", "should", "could", "might"], correct: 0, exp: "Must have + V3: logikai következtetés a múltra (szinte biztos)." },
        { q: "You _______ have booked earlier — everything is sold out.", options: ["should", "must", "could", "might"], correct: 0, exp: "Should have + V3: múltbeli mulasztás — lett volna szabad megtennie." },
        { q: "He _______ have taken the wrong train — he knows this route well.", options: ["can't", "mustn't", "shouldn't", "wouldn't"], correct: 0, exp: "Can't have + V3: múltra vonatkozó határozott tagadó következtetés." },
        { q: "I _______ have finished earlier, but I got distracted.", options: ["could", "must", "should", "would"], correct: 0, exp: "Could have + V3: múltbeli lehetőség, amellyel nem élt." },
        { q: "They _______ have arrived by now — the flight landed two hours ago.", options: ["ought to", "must", "should", "might"], correct: 0, exp: "Ought to have + V3: elvárás a múltra vonatkozóan (kellett volna már)." },
        // ── CLEFT SENTENCES ──
        { q: "It was the finance team _______ spotted the error.", options: ["that", "who", "which", "what"], correct: 0, exp: "Kiemelő szerkezet (cleft): It was + főnév + that/who." },
        { q: "What I find most challenging _______ public speaking.", options: ["is", "are", "was", "being"], correct: 0, exp: "Kiemelő szerkezet: 'What I find...' + egyes szám (is), mert a főnévi klóz az alany." },
        // ── RELATIVE CLAUSES ADVANCED ──
        { q: "The report, _______ findings were controversial, was widely discussed.", options: ["whose", "which", "that", "its"], correct: 0, exp: "Nem megszorító vonatkozói mellékmondat: whose + főnév (birtok jelölése)." },
        { q: "He gave a speech, _______ impressed everyone in the room.", options: ["which", "that", "what", "who"], correct: 0, exp: "Nem megszorító vonatkozói mellékmondat: 'which' utal az egész előző mondatra." },
        { q: "The era _______ we are living is full of uncertainty.", options: ["in which", "in that", "which", "that"], correct: 0, exp: "Előljárós vonatkozói mellékmondat: 'in which' = when (formálisabb)." },
        // ── MIXED ADVANCED STRUCTURES ──
        { q: "He acted as though he _______ the owner of the place.", options: ["were", "is", "was being", "had been"], correct: 0, exp: "As though + Past Simple subjunctive: képzeletbeli (valótlan) jelen helyzet." },
        { q: "The project will be completed, _______ the funding is approved.", options: ["provided that", "despite", "even though", "unless"], correct: 0, exp: "Provided that: feltéve, hogy (feltételes összekötő szó)." },
        { q: "Much _______ I admire her work, I can't agree with her conclusions.", options: ["as", "though", "however", "despite"], correct: 0, exp: "Much as: Noha nagyon... (engedményes szerkezet)." },
        { q: "The proposal met with _______ approval.", options: ["widespread", "wide", "broadly", "extending"], correct: 0, exp: "Kollokáció: 'widespread approval' (széleskörű jóváhagyás) a természetes kifejezés." },
        { q: "It was _______ a complex issue that no simple solution existed.", options: ["such", "so", "too", "very"], correct: 0, exp: "Such + (a/an) + melléknév + főnév. ('so' csak mellékneveket/határozószavakat módosíthat)." },
        { q: "She is _______ to have been involved in the scandal.", options: ["alleged", "said", "known", "reported"], correct: 0, exp: "Alleged: állítólag (nincs bizonyítva) — 'alleged to have' a tipikus szerkezet." },
        // ── DISCOURSE MARKERS / LINKING ──
        { q: "The experiment failed. _______, valuable data was collected.", options: ["Nevertheless", "Therefore", "Consequently", "Moreover"], correct: 0, exp: "Nevertheless: ennek ellenére — ellentétet fejez ki, nem következményt." },
        { q: "The team worked all night; _______, the deadline was missed.", options: ["nonetheless", "even so", "yet", "however"], correct: 0, exp: "Nonetheless / Even so: ennek ellenére (pontosítás: 'nonetheless' formálisabb)." },
        { q: "_______ its high cost, the treatment proved extremely effective.", options: ["Despite", "Although", "Even though", "However"], correct: 0, exp: "Despite + főnév/gerund (nem teljes mondat). Although/Even though teljes mondatot vezet be." },
        // ── FUTURE FORMS ADVANCED ──
        { q: "By the time she retires, she _______ for the company for 35 years.", options: ["will have been working", "will be working", "will have worked", "has worked"], correct: 0, exp: "Future Perfect Continuous: egy jövőbeli időpontig tartó, folyamatos cselekvés hangsúlyozása." },
        { q: "The conference _______ to have attracted over 5,000 delegates.", options: ["is expected", "expects", "was expected", "will expect"], correct: 0, exp: "Personal passive + to-infinitive: jövőbeli elvárás kifejezése." },
        // ── EMPHASIS / FRONTING ──
        { q: "Only after the meeting _______ the full impact of the decision.", options: ["did they realise", "they realised", "they did realise", "realised they"], correct: 0, exp: "Inverzió: 'Only after...' mondat közepén helyezett tagadó értelmű határozó után." },
        { q: "Not once _______ to admit his mistake.", options: ["did he try", "he tried", "he did try", "tried he"], correct: 0, exp: "Inverzió: 'Not once' határozó után fordított szórend kötelező." },
        // ── MIXED GRAMMAR ──
        { q: "I would rather the meeting _______ postponed.", options: ["were", "was", "be", "is"], correct: 0, exp: "I'd rather + alany + Past Simple subjunctive (were): múltra és jelenre egyaránt vonatkozhat." },
        { q: "_______ she may be talented, her attitude is a problem.", options: ["However", "Whatever", "Whenever", "Wherever"], correct: 0, exp: "However + melléknév: 'Bármilyen tehetséges is...' — engedményes mellékmondat." },
        { q: "He is thought _______ left the country.", options: ["to have", "to be", "having", "as having"], correct: 0, exp: "Personal passive + perfect infinitive: is thought to have + V3 (befejezett múlt)." },
        { q: "The findings were so unexpected _______ the researchers repeated the experiment.", options: ["that", "as", "which", "so"], correct: 0, exp: "So + melléknév + that: következményes szerkezet (so...that)." },
        { q: "She tends _______ everything at the last minute.", options: ["to leave", "leaving", "leave", "left"], correct: 0, exp: "Tend + to-infinitive: hajlamos valamit tenni." },
        { q: "The acquisition of a second language is thought _______ cognitive flexibility.", options: ["to enhance", "enhancing", "enhance", "to enhancing"], correct: 0, exp: "Personal passive + to-infinitive: is thought to + szótári alak." }
    ];

    let studentName = "";
    let score = 0;
    let currentIndex = 0;
    let currentList = [];
    let answered = false;

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function checkName() {
        const input = document.getElementById('student-name');
        const name = input.value.trim();
        if (name.length < 3) { alert("Kérlek írj be legalább 3 karaktert a névhez."); input.focus(); return; }
        studentName = name;
        currentList = [...quizData];
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('quiz-ui').classList.remove('hidden');
        loadQuestion();
    }

    document.getElementById('student-name').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') checkName();
    });

    function loadQuestion() {
        answered = false;
        const qData = currentList[currentIndex];
        document.getElementById('q-counter').innerText = `${currentIndex + 1} / ${currentList.length}`;
        document.getElementById('progress-fill').style.width = `${(currentIndex / currentList.length) * 100}%`;
        document.getElementById('question-text').innerText = qData.q;
        document.getElementById('explanation-box').classList.add('hidden');

        let optionsWithMeta = qData.options.map((opt, idx) => ({ text: opt, isCorrect: idx === qData.correct }));
        shuffleArray(optionsWithMeta);

        const container = document.getElementById('options-container');
        container.innerHTML = '';
        optionsWithMeta.forEach((opt) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn animate-slide';
            btn.innerText = opt.text;
            btn.onclick = () => handleAnswer(opt.isCorrect, btn);
            container.appendChild(btn);
        });
    }

    function handleAnswer(isCorrect, clickedBtn) {
        if (answered) return;
        answered = true;
        const qData = currentList[currentIndex];
        const btns = document.querySelectorAll('.option-btn');
        btns.forEach((btn) => { btn.disabled = true; });

        if (isCorrect) {
            score++;
            clickedBtn.classList.add('correct');
            document.getElementById('answer-status').innerText = "Helyes! ✓";
            document.getElementById('answer-status').className = "text-sm font-black uppercase tracking-widest mb-2 text-emerald-400";
        } else {
            clickedBtn.classList.add('wrong');
            btns.forEach(btn => { if (btn.innerText === qData.options[qData.correct]) btn.classList.add('correct'); });
            document.getElementById('answer-status').innerText = "Helytelen. ✗";
            document.getElementById('answer-status').className = "text-sm font-black uppercase tracking-widest mb-2 text-rose-400";
        }

        document.getElementById('live-score').innerText = score;
        speakEnglish(quizData[currentQ] && quizData[currentQ].correct ? quizData[currentQ].correct : ""); document.getElementById('answer-explanation').innerText = qData.exp;
        document.getElementById('explanation-box').classList.remove('hidden');
    }

    function nextQuestion() {
        currentIndex++;
        if (currentIndex < currentList.length) loadQuestion();
        else finishQuiz();
    }

    async function finishQuiz() {
        document.getElementById('quiz-ui').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('display-name').innerText = studentName;
        document.getElementById('final-score').innerText = score;
        document.getElementById('progress-fill').style.width = '100%';

        const percent = Math.round((score / quizData.length) * 100);
        document.getElementById('result-percent-text').innerText = `${percent}%`;
        document.getElementById('result-progress-fill').style.width = `${percent}%`;
        document.getElementById('feedback-rating').innerText = "⚡ AI elemzés folyamatban...";

        try {
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 30000);

            const response = await fetch(MAKE_WEBHOOK_URL, {
                signal: controller.signal,
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    Student: studentName,
                    Quiz: QUIZ_NAME,
                    Score: score,
                    TotalQuestions: quizData.length,
                    Level: QUIZ_LEVEL,
                    Skill: QUIZ_SKILL,
                    Percentage: percent,
                    CompletedAt: new Date().toISOString()
                })
            });

            clearTimeout(timeout);
            const text = await response.text();
            document.getElementById('feedback-rating').innerText = text || "Szép munka! Folytasd a gyakorlást!";

        } catch (e) {
            console.error("Error:", e);
            document.getElementById('feedback-rating').innerText =
                percent >= 80 ? "Zseniális! Valódi B2 szint!" :
                percent >= 60 ? "Szép munka, de gyakorolj még!" :
                "Ne add fel, próbáld újra!";
        }
    }

    function adminAccess() {
        if (prompt("Jelszó:") === "bettina2026") {
            alert("Az eredmények a Make → Airtable rendszerben mentődnek.");
        }
    }

    function restartQuiz() {
        studentName = ""; score = 0; currentIndex = 0; currentList = []; answered = false;
        document.getElementById('student-name').value = "";
        document.getElementById('live-score').innerText = "0";
        document.getElementById('q-counter').innerText = `1 / ${quizData.length}`;
        document.getElementById('progress-fill').style.width = "0%";
        document.getElementById('result-progress-fill').style.width = "0%";
        document.getElementById('result-percent-text').innerText = "0%";
        document.getElementById('final-score').innerText = "0";
        document.getElementById('feedback-rating').innerText = "-";
        document.getElementById('display-name').innerText = "";
        document.getElementById('question-text').innerText = "-";
        document.getElementById('options-container').innerHTML = "";
        document.getElementById('explanation-box').classList.add('hidden');
        document.getElementById('result-screen').classList.add('hidden');
        document.getElementById('quiz-ui').classList.add('hidden');
        document.getElementById('start-screen').classList.remove('hidden');
    }
</script>


<script>
// ═══ ENTROPY BREAKERS — DEFINITIVE AUTO-START ═══
(function() {
  var p = new URLSearchParams(window.location.search);
  var n = p.get('name');
  if (!n || n.length < 1) return;
  var name = decodeURIComponent(n);
  window.__eb_student_name = name;

  function doStart() {
    // 1. Fill all possible name inputs
    var inputIds = ['student-name','name-input','nameInput','studentName','player-name'];
    for (var i = 0; i < inputIds.length; i++) {
      var el = document.getElementById(inputIds[i]);
      if (el) el.value = name;
    }

    // 2. Set global studentName variable if it exists
    try { if (typeof studentName !== 'undefined') studentName = name; } catch(e) {}
    try { if (typeof window.studentName !== 'undefined') window.studentName = name; } catch(e) {}

    // 3. Hide start screen
    var startEl = document.getElementById('start-screen');
    if (startEl) startEl.classList.add('hidden');

    // 4. Call whichever start function exists
    var fns = ['startApp','checkName','startQuiz','startTest','start','startTraining','startPlatform'];
    for (var j = 0; j < fns.length; j++) {
      if (typeof window[fns[j]] === 'function') {
        try { window[fns[j]](); } catch(e) {}
        break;
      }
    }
  }

  // Run after full page load
  if (document.readyState === 'complete') {
    setTimeout(doStart, 100);
  } else {
    window.addEventListener('load', function() { setTimeout(doStart, 100); });
  }
})();
</script>

<script>
function speakEnglish(text) {
    if (!text) return;
    const clean = text.replace(/\(.*?\)/g,'').replace(/["\']/g,'').trim();
    if (!clean) return;
    // ElevenLabs — Charlotte voice
    fetch('https://api.elevenlabs.io/v1/text-to-speech/XB0fDUnXU5powFXDhCwa', {
        method: 'POST',
        headers: {
            'xi-api-key': 'sk_64910ef40b3275ba1d86e96cfe3b947d498aaacda971163b',
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            text: clean,
            model_id: 'eleven_multilingual_v2',
            voice_settings: { stability: 0.5, similarity_boost: 0.75, style: 0.3, use_speaker_boost: true }
        })
    })
    .then(r => r.arrayBuffer())
    .then(buf => {
        const blob = new Blob([buf], {type: 'audio/mpeg'});
        const url = URL.createObjectURL(blob);
        const audio = new Audio(url);
        audio.play();
        audio.onended = () => URL.revokeObjectURL(url);
    })
    .catch(() => {
        // Fallback to browser voice if ElevenLabs fails
        if ('speechSynthesis' in window) {
            speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(clean);
            u.lang = 'en-GB'; u.rate = 0.9;
            speechSynthesis.speak(u);
        }
    });
}
</script>
