<script>
// ═══ ENTROPY BREAKERS — DEFINITIVE AUTO-START ═══
(function() {
  var p = new URLSearchParams(window.location.search);
  var n = p.get('name');
  if (!n || n.length < 1) return;
  var name = decodeURIComponent(n);
  window.__eb_student_name = name;

  function doStart() {
    // 1. Fill all possible name inputs
    var inputIds = ['student-name','name-input','nameInput','studentName','player-name'];
    for (var i = 0; i < inputIds.length; i++) {
      var el = document.getElementById(inputIds[i]);
      if (el) el.value = name;
    }

    // 2. Set global studentName variable if it exists
    try { if (typeof studentName !== 'undefined') studentName = name; } catch(e) {}
    try { if (typeof window.studentName !== 'undefined') window.studentName = name; } catch(e) {}

    // 3. Hide start screen
    var startEl = document.getElementById('start-screen');
    if (startEl) startEl.classList.add('hidden');

    // 4. Call whichever start function exists
    var fns = ['startApp','checkName','startQuiz','startTest','start','startTraining','startPlatform'];
    for (var j = 0; j < fns.length; j++) {
      if (typeof window[fns[j]] === 'function') {
        try { window[fns[j]](); } catch(e) {}
        break;
      }
    }
  }

  // Run after full page load
  if (document.readyState === 'complete') {
    setTimeout(doStart, 100);
  } else {
    window.addEventListener('load', function() { setTimeout(doStart, 100); });
  }
})();
</script>

<script>
function speakEnglish(text) {
    if (!text || !('speechSynthesis' in window)) return;
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-GB'; u.rate = 0.82; u.pitch = 1;
    const voices = speechSynthesis.getVoices();
    const v = voices.find(v => v.lang.startsWith('en-GB')) || voices.find(v => v.lang.startsWith('en'));
    if (v) u.voice = v;
    speechSynthesis.speak(u);
}
</script>
