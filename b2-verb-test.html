<div id="app" class="cyber-shell p-6 md:p-12 relative overflow-hidden">

        </div>

        </div>

<script>
    // ── API KEY STORED SAFELY IN MAKE.COM — NOT HERE ──
    const MAKE_WEBHOOK_URL = "https://hook.eu1.make.com/ww4obw8ghb8h46ti1gi6yoy2qg1db7ad";
    const QUIZ_NAME = "B2 Verb Test";
    const QUIZ_LEVEL = "B2";
    const QUIZ_SKILL = "Vocabulary";

    const VERB_DATA = [
        { en: "Receive", hu: "Megkap" }, { en: "Provide", hu: "Biztosít" }, { en: "Request", hu: "Kér" }, { en: "Require", hu: "Megkövetel" }, { en: "Purchase", hu: "Vásárol" },
        { en: "Assist", hu: "Segít" }, { en: "Select", hu: "Kiválaszt" }, { en: "Inform", hu: "Tájékoztat" }, { en: "Reduce", hu: "Csökkent" }, { en: "Increase", hu: "Növel" },
        { en: "Participate", hu: "Részt vesz" }, { en: "Maintain", hu: "Fenntart" }, { en: "Achieve", hu: "Elér" }, { en: "Consider", hu: "Megfontol" }, { en: "Contribute", hu: "Hozzájárul" },
        { en: "Determine", hu: "Meghatároz" }, { en: "Encourage", hu: "Bátorít" }, { en: "Involve", hu: "Bevon" }, { en: "Persuade", hu: "Meggyőz" }, { en: "Prevent", hu: "Megakadályoz" },
        { en: "Recommend", hu: "Ajánl" }, { en: "Replace", hu: "Kicserél" }, { en: "Suffer", hu: "Szenved" }, { en: "Consist of", hu: "Áll valamiből" }, { en: "Establish", hu: "Létrehoz" },
        { en: "Abandon", hu: "Elhagy" }, { en: "Accuse", hu: "Vádol" }, { en: "Affect", hu: "Befolyásol" }, { en: "Appear", hu: "Úgy tűnik" }, { en: "Appreciate", hu: "Értékel" },
        { en: "Approach", hu: "Megközelít" }, { en: "Approve", hu: "Jóváhagy" }, { en: "Attempt", hu: "Megkísérel" }, { en: "Avoid", hu: "Elkerül" }, { en: "Benefit", hu: "Hasznot húz" },
        { en: "Complain", hu: "Panaszkodik" }, { en: "Confirm", hu: "Megerősít" }, { en: "Convince", hu: "Meggyőz" }, { en: "Deny", hu: "Tagad" }, { en: "Deserve", hu: "Megérdemel" },
        { en: "Disappoint", hu: "Csalódást okoz" }, { en: "Emphasize", hu: "Hangsúlyoz" }, { en: "Enable", hu: "Lehetővé tesz" }, { en: "Examine", hu: "Megvizsgál" }, { en: "Expect", hu: "Elvár" },
        { en: "Improve", hu: "Javít" }, { en: "Observe", hu: "Megfigyel" }, { en: "Succeed", hu: "Sikerül" }, { en: "Manage", hu: "Kezel/Irányít" }, { en: "Suggest", hu: "Javasol" }
    ];

    let studentName = "";
    let currentIndex = 0;
    let score = 0;
    let errors = 0;
    let wrongWords = [];
    let testList = [...VERB_DATA].sort(() => Math.random() - 0.5);

    function checkName() {
        const input = document.getElementById('student-name');
        const name = input.value.trim();
        if (name.length < 3) { alert("Please enter your name."); input.focus(); return; }
        studentName = name;
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('test-ui').classList.remove('hidden');
        loadWord();
    }

    document.getElementById('student-name').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') checkName();
    });

    function loadWord() {
        const word = testList[currentIndex];
        document.getElementById('q-counter').innerText = `${currentIndex + 1} / ${testList.length}`;
        document.getElementById('progress-fill').style.width = `${(currentIndex / testList.length) * 100}%`;
        document.getElementById('hu-word').innerText = word.hu;
        document.getElementById('en-input').value = "";
        document.getElementById('en-input').focus();
        document.getElementById('instant-feedback').classList.add('hidden');
    }

    function handleSubmit() {
        const input = document.getElementById('en-input').value.trim().toLowerCase();
        const correct = testList[currentIndex].en.toLowerCase();
        const feedback = document.getElementById('instant-feedback');
        if (input === "") return;

        if (input === correct) {
            score++;
            feedback.innerText = "Correct! ✓";
            feedback.className = "mt-6 p-4 rounded-2xl text-center font-bold text-sm feedback-good";
        } else {
            errors++;
            document.getElementById('error-counter').innerText = errors;
            wrongWords.push({ hu: testList[currentIndex].hu, en: testList[currentIndex].en, typed: input });
            feedback.innerText = `Incorrect! A jó válasz: ${testList[currentIndex].en}`;
            feedback.className = "mt-6 p-4 rounded-2xl text-center font-bold text-sm feedback-bad";
        }

        feedback.classList.remove('hidden');
        document.getElementById('submit-btn').disabled = true;

        setTimeout(() => {
            document.getElementById('submit-btn').disabled = false;
            currentIndex++;
            if (currentIndex < testList.length) loadWord();
            else finishTest();
        }, 1200);
    }

    document.getElementById('en-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleSubmit();
    });

    async function finishTest() {
        document.getElementById('test-ui').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('display-name').innerText = studentName;
        document.getElementById('final-score').innerText = score;
        document.getElementById('progress-fill').style.width = '100%';

        const percent = Math.round((score / testList.length) * 100);
        document.getElementById('result-percent-text').innerText = `${percent}%`;
        document.getElementById('result-progress-fill').style.width = `${percent}%`;
        document.getElementById('final-feedback').innerText = "⚡ AI elemzés folyamatban...";

        if (wrongWords.length > 0) {
            document.getElementById('wrong-container').classList.remove('hidden');
            const list = document.getElementById('wrong-list');
            list.innerHTML = "";
            wrongWords.forEach(w => {
                list.innerHTML += `
                    <div class="wrong-list-item">
                        <strong>${w.hu}</strong><br>
                        <span class="opacity-60">Gépelted: ${w.typed} |</span>
                        <span class="text-teal-300 font-bold"> Correct: ${w.en}</span>
                    </div>
                `;
            });
        }

        try {
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 30000);

            const response = await fetch(MAKE_WEBHOOK_URL, {
                signal: controller.signal,
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    Student: studentName,
                    Quiz: QUIZ_NAME,
                    Score: score,
                    TotalQuestions: testList.length,
                    Level: QUIZ_LEVEL,
                    Skill: QUIZ_SKILL,
                    Errors: errors,
                    WrongWords: JSON.stringify(wrongWords.map(w => w.en)),
                    Percentage: percent,
                    CompletedAt: new Date().toISOString()
                })
            });

            clearTimeout(timeout);
            const text = await response.text();
            document.getElementById('final-feedback').innerText = text || "Well done! Folytasd a gyakorlást!";

        } catch (e) {
            console.error("Error:", e);
            document.getElementById('final-feedback').innerText =
                percent >= 90 ? "Tökéletes! Valódi B2 szókincs! 🌟" :
                percent >= 70 ? "Szuper! Magabiztos tudás! ✨" :
                "Ne add fel, próbáld újra!";
        }
    }

    function adminAccess() {
        if (prompt("Jelszó:") === "bettina2026") {
            alert("Az eredmények a Make → Airtable rendszerben mentődnek.");
        }
    }

    function restartQuiz() {
        studentName = ""; currentIndex = 0; score = 0; errors = 0; wrongWords = [];
        testList = [...VERB_DATA].sort(() => Math.random() - 0.5);

        document.getElementById('student-name').value = "";
        document.getElementById('en-input').value = "";
        document.getElementById('q-counter').innerText = `1 / ${testList.length}`;
        document.getElementById('error-counter').innerText = "0";
        document.getElementById('progress-fill').style.width = "0%";
        document.getElementById('result-progress-fill').style.width = "0%";
        document.getElementById('result-percent-text').innerText = "0%";
        document.getElementById('final-score').innerText = "0";
        document.getElementById('final-feedback').innerText = "-";
        document.getElementById('display-name').innerText = "";
        document.getElementById('hu-word').innerText = "-";
        document.getElementById('wrong-list').innerHTML = "";
        document.getElementById('wrong-container').classList.add('hidden');
        document.getElementById('instant-feedback').classList.add('hidden');
        document.getElementById('submit-btn').disabled = false;
        document.getElementById('result-screen').classList.add('hidden');
        document.getElementById('test-ui').classList.add('hidden');
        document.getElementById('start-screen').classList.remove('hidden');
    }
</script>


<script>
// ═══ ENTROPY BREAKERS — DEFINITIVE AUTO-START ═══
(function() {
  var p = new URLSearchParams(window.location.search);
  var n = p.get('name');
  if (!n || n.length < 1) return;
  var name = decodeURIComponent(n);
  window.__eb_student_name = name;

  function doStart() {
    // 1. Fill all possible name inputs
    var inputIds = ['student-name','name-input','nameInput','studentName','player-name'];
    for (var i = 0; i < inputIds.length; i++) {
      var el = document.getElementById(inputIds[i]);
      if (el) el.value = name;
    }

    // 2. Set global studentName variable if it exists
    try { if (typeof studentName !== 'undefined') studentName = name; } catch(e) {}
    try { if (typeof window.studentName !== 'undefined') window.studentName = name; } catch(e) {}

    // 3. Hide start screen
    var startEl = document.getElementById('start-screen');
    if (startEl) startEl.classList.add('hidden');

    // 4. Call whichever start function exists
    var fns = ['startApp','checkName','startQuiz','startTest','start','startTraining','startPlatform'];
    for (var j = 0; j < fns.length; j++) {
      if (typeof window[fns[j]] === 'function') {
        try { window[fns[j]](); } catch(e) {}
        break;
      }
    }
  }

  // Run after full page load
  if (document.readyState === 'complete') {
    setTimeout(doStart, 100);
  } else {
    window.addEventListener('load', function() { setTimeout(doStart, 100); });
  }
})();
</script>

<script>
function speakEnglish(text) {
    if (!text) return;
    var clean = text.replace(/[(][^)]*[)]/g,'').replace(/[^a-zA-Z0-9 \-\'.,!?]/g,'').trim();
    if (!clean || clean.length < 1) return;
    fetch('https://api.elevenlabs.io/v1/text-to-speech/XB0fDUnXU5powFXDhCwa', {
        method: 'POST',
        headers: {
            'xi-api-key': 'sk_64910ef40b3275ba1d86e96cfe3b947d498aaacda971163b',
            'Content-Type': 'application/json',
            'Accept': 'audio/mpeg'
        },
        body: JSON.stringify({
            text: clean,
            model_id: 'eleven_multilingual_v2',
            voice_settings: { stability: 0.5, similarity_boost: 0.8 }
        })
    })
    .then(function(r) { if (!r.ok) throw new Error('err'); return r.arrayBuffer(); })
    .then(function(buf) {
        var blob = new Blob([buf], {type: 'audio/mpeg'});
        var url = URL.createObjectURL(blob);
        var audio = new Audio(url);
        audio.play();
        audio.onended = function() { URL.revokeObjectURL(url); };
    })
    .catch(function() {
        if ('speechSynthesis' in window) {
            speechSynthesis.cancel();
            var u = new SpeechSynthesisUtterance(clean);
            u.lang = 'en-GB'; u.rate = 0.9;
            speechSynthesis.speak(u);
        }
    });
}
</script>
