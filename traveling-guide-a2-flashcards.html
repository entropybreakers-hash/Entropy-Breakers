    <style>
        
        * { box-sizing: border-box; }
        body {
            background:#020F09;
            font-family:'Manrope',sans-serif;
            color: #f1f5f9; min-height: 100vh; display: flex;
            align-items: center; justify-content: center; padding: 20px; margin: 0;
        }
        .cyber-shell { background: rgba(2,6,23,0.88); backdrop-filter: blur(16px); border: 1px solid var(--card-border); box-shadow: 0 0 30px rgba(45,212,191,0.08); border-radius: 32px; width: 100%; max-width: 560px; overflow: hidden; }
        .mint-glow-text { color: var(--neon-mint); text-shadow: 0 0 14px rgba(45,212,191,0.6); }
        .aurora-title { background: linear-gradient(135deg, #fff 35%, var(--neon-mint) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass-panel { background: var(--glass-bg); border: 1px solid rgba(255,255,255,0.06); border-radius: 24px; }
        .input-field { width: 100%; padding: 18px 20px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.04); color: white; font-weight: 700; text-align: center; outline: none; transition: all 0.25s ease; font-size: 1rem; }
        .input-field::placeholder { color: #94a3b8; }
        .input-field:focus { border-color: var(--neon-mint); box-shadow: 0 0 20px rgba(45,212,191,0.15); background: rgba(255,255,255,0.06); }
        .primary-btn { background: linear-gradient(135deg, #0d9488 0%, #4f46e5 100%); box-shadow: 0 0 20px rgba(45,212,191,0.22); border: 1px solid rgba(255,255,255,0.14); transition: all 0.25s ease; cursor: pointer; }
        .primary-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .nav-btn { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); border-radius: 50%; width: 56px; height: 56px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s ease; flex-shrink: 0; }
        .nav-btn:hover { background: rgba(45,212,191,0.12); border-color: var(--neon-mint); }
        .nav-btn:active { transform: scale(0.94); }
        .progress-track { width: 100%; height: 8px; background: rgba(255,255,255,0.08); border-radius: 999px; overflow: hidden; }
        .progress-bar-inner { height: 100%; background: linear-gradient(90deg, var(--neon-mint), var(--neon-indigo)); transition: width 0.45s ease; }
        .animate-slide { animation: slideIn 0.35s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

        /* FLIP CARD */
        .flip-container { perspective: 1200px; width: 100%; height: 260px; cursor: pointer; }
        .flip-inner { position: relative; width: 100%; height: 100%; transition: transform 0.55s cubic-bezier(0.4,0,0.2,1); transform-style: preserve-3d; }
        .flip-inner.is-flipped { transform: rotateY(180deg); }
        .flip-front, .flip-back {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 24px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 28px 24px; text-align: center;
        }
        .flip-front {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(99,102,241,0.25);
            box-shadow: 0 0 20px rgba(99,102,241,0.08);
        }
        .flip-back {
            background: linear-gradient(135deg, rgba(13,148,136,0.2), rgba(79,70,229,0.2));
            border: 1px solid rgba(45,212,191,0.25);
            box-shadow: 0 0 20px rgba(45,212,191,0.1);
            transform: rotateY(180deg);
        }
        .cat-pill {
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(99,102,241,0.15); border: 1px solid rgba(99,102,241,0.3);
            color: #a5b4fc; border-radius: 999px; padding: 4px 12px;
            font-size: 0.68rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.1em; margin-bottom: 14px;
        }
        .flip-hint {
            position: absolute; bottom: 12px; right: 16px;
            font-size: 0.62rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.1em; opacity: 0.35; color: #94a3b8;
        }
        .result-card { background: linear-gradient(135deg, rgba(13,148,136,0.18), rgba(79,70,229,0.18)); border: 1px solid rgba(45,212,191,0.16); border-radius: 32px; }
    
    /* ── LEVEL COLOUR THEME ── */
    :root {
        --accent:    #10B981;
        --accent-l:  #34D399;
        --accent-ll: #6EE7B7;
        --border-hi: rgba(16,185,129,0.30);
        --border-lo: rgba(16,185,129,0.15);
    }
    .orb-theme-1 { background: radial-gradient(circle, rgba(16,185,129,0.55), transparent 70%) !important; }
    .orb-theme-2 { background: radial-gradient(circle, rgba(52,211,153,0.40), transparent 70%) !important; }
    .orb-theme-3 { background: radial-gradient(circle, rgba(6,214,160,0.18), transparent 70%) !important; }
    
    
/* ═══ PREMIUM THEME OVERRIDE ═══ */
body{background:#020F09 !important;font-family:'Manrope',sans-serif !important}
.bg-wrap{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.mesh{position:absolute;inset:0;background:radial-gradient(ellipse 120% 80% at 50% -10%,rgba(6,78,59,0.95) 0%,rgba(4,120,87,0.65) 25%,transparent 60%),
    radial-gradient(ellipse 80% 60% at 0% 50%,rgba(16,185,129,0.45) 0%,transparent 55%),
    radial-gradient(ellipse 80% 60% at 100% 50%,rgba(52,211,153,0.35) 0%,transparent 55%),
    radial-gradient(ellipse 60% 40% at 50% 100%,rgba(16,185,129,0.30) 0%,transparent 60%),

.light-rays{position:absolute;inset:0;
  background:conic-gradient(from 270deg at 50% -5%,
    transparent 0deg,rgba(16,185,129,0.08) 8deg,transparent 16deg,
    rgba(52,211,153,0.06) 24deg,transparent 32deg,rgba(110,231,183,0.07) 40deg,
    transparent 48deg,rgba(16,185,129,0.08) 56deg,transparent 64deg,

  mask-image:linear-gradient(to bottom,black 0%,transparent 70%)}
.grid-bg{position:absolute;inset:0;
  background-image:linear-gradient(rgba(52,211,153,0.07) 1px,transparent 1px),linear-gradient(90deg,rgba(52,211,153,0.07) 1px,transparent 1px);
  background-size:48px 48px;
  mask-image:radial-gradient(ellipse 90% 90% at 50% 30%,black 10%,transparent 80%)}
.floor-glow{position:absolute;bottom:0;left:0;right:0;height:40%;

.primary-btn,.cta-btn,.start-btn,.enter-btn,.btn-main{

.input-field:focus,.name-input:focus,.answer-input:focus,#en-input:focus,#student-name:focus{

/* TITLE TEXT */
.aurora-title,.hero-title{
  font-family:'Exo 2',sans-serif !important;font-weight:900 !important;letter-spacing:-.02em !important;

  -webkit-background-clip:text !important;-webkit-text-fill-color:transparent !important}

/* CAT LABELS / TAGS */
.cat-pill,.eb-badge,.level-chip,.badge{color:#10B981 !important;
  background:rgba(16,185,129,0.10) !important;border-color:rgba(16,185,129,0.25) !important}

.nav-btn{background:rgba(255,255,255,0.04) !important;border:1px solid rgba(16,185,129,0.30) !important;backdrop-filter:blur(8px) !important}

/* RESULT PANEL */
.result-card,.result-panel,.cyber-shell,.glass-panel{

/* TYPOGRAPHY */
body,p,span,div,button{font-family:'Manrope',sans-serif}

.speak-card-btn:hover { background: rgba(255,255,255,0.14); color: #fff; transform: scale(1.05); }

            </div>
        </div>

                <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <div class="flex-1 text-center">
                <p class="text-slate-500 text-[10px] font-black uppercase tracking-widest">Koppints a kártyára a fordításért</p>
            </div>
            <button class="nav-btn" onclick="nextCard()">
                <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
        </div>

        <!-- Shuffle + Finish -->
        <div class="grid grid-cols-2 gap-3">

            <button onclick="showResult()" class="py-4 primary-btn text-white font-black text-xs uppercase tracking-widest rounded-2xl">
                ✅ Done

        </div>
    </div>

    <!-- RESULT SCREEN -->
    <div id="result-screen" class="hidden text-center animate-slide">
        <div class="text-6xl mb-6">🌍</div>

        <div class="grid grid-cols-2 gap-3">

            <button onclick="shuffleAndRestart()" class="py-5 primary-btn text-white rounded-2xl font-black uppercase tracking-widest text-xs">
                🔀 Új sorrend
            </button>
        </div>
    </div>
</div>

    let studentName = "";
    let currentIndex = 0;
    let isFlipped = false;
    let cardList = [...CARDS];

    function startApp() {
        const input = document.getElementById('student-name');
    const name = (window.__eb_student_name || input.value.trim());
    if (name.length < 2) { input.focus(); return; }
        studentName = name;
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('card-screen').classList.remove('hidden');
        renderCard();
    }

    document.getElementById('student-name').addEventListener('keypress', e => {
        if (e.key === 'Enter') startApp();
    });

    function renderCard() {
        const card = cardList[currentIndex];
        const total = cardList.length;
        const progress = ((currentIndex + 1) / total) * 100;

        document.getElementById('card-counter').innerText = `${currentIndex + 1} / ${total}`;
        document.getElementById('progress-fill').style.width = `${progress}%`;
        document.getElementById('cat-label').innerText = card.cat;
        document.getElementById('front-cat').innerText = card.cat;
        document.getElementById('back-cat').innerText = card.cat;
        document.getElementById('card-hu').innerText = card.hu;
        document.getElementById('card-en').innerText = card.en;
        document.getElementById('card-tip').innerText = card.tip;

        // Reset flip
        isFlipped = false;
        document.getElementById('flip-inner').classList.remove('is-flipped');
    }

    function flipCard() {
    isFlipped = !isFlipped;
    document.getElementById('flip-inner').classList.toggle('is-flipped', isFlipped);
}

    function nextCard() {
        if (currentIndex < cardList.length - 1) {
            currentIndex++;
            renderCard();
        } else {
            showResult();
        }
    }

    function prevCard() {
        if (currentIndex > 0) {
            currentIndex--;
            renderCard();
        }
    }

    function shuffleCards() {
        for (let i = cardList.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [cardList[i], cardList[j]] = [cardList[j], cardList[i]];
        }
        currentIndex = 0;
        renderCard();
    }

    function showResult() {
        document.getElementById('card-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('display-name').innerText = studentName;
        document.getElementById('seen-count').innerText = currentIndex + 1;

        const pct = Math.round(((currentIndex + 1) / cardList.length) * 100);
        const msg = pct === 100
            ? "Zseniális! Mind a 60 kártyát átmenté! Készen állsz az utazásra! ✈️"
            : pct >= 60
            ? "Szép haladás! Folytasd, hamarosan készen leszel!"
            : "Jó kezdés! Gyakorolj még és magabiztos leszel!";
        document.getElementById('feedback-msg').innerText = msg;

        // Send to Make.com
        fetch(MAKE_WEBHOOK_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                Student: studentName,
                Quiz: "A2 Travelling Guide",
                Score: currentIndex + 1,
                TotalQuestions: cardList.length,
                Level: "A2",
                Skill: "Speaking",
                Percentage: pct,
                CompletedAt: new Date().toISOString()
            })
        }).catch(e => console.error("Webhook error:", e));
    }

    function restartFromStart() {
        currentIndex = 0;
        cardList = [...CARDS];
        document.getElementById('result-screen').classList.add('hidden');
        document.getElementById('card-screen').classList.remove('hidden');
        renderCard();
    }

    function shuffleAndRestart() {
        cardList = [...CARDS];
        shuffleCards();
        document.getElementById('result-screen').classList.add('hidden');
        document.getElementById('card-screen').classList.remove('hidden');
        renderCard();
    }

    function adminAccess() {
        if (prompt("Jelszó:") === "bettina2026") {
            alert("Az eredmények a Make → Airtable rendszerben mentődnek.");
        }
    }
</script>


<script>
// ═══ ENTROPY BREAKERS — DEFINITIVE AUTO-START ═══
(function() {
  var p = new URLSearchParams(window.location.search);
  var n = p.get('name');
  if (!n || n.length < 1) return;
  var name = decodeURIComponent(n);
  window.__eb_student_name = name;

  function doStart() {
    // 1. Fill all possible name inputs
    var inputIds = ['student-name','name-input','nameInput','studentName','player-name'];
    for (var i = 0; i < inputIds.length; i++) {
      var el = document.getElementById(inputIds[i]);
      if (el) el.value = name;
    }

    // 2. Set global studentName variable if it exists
    try { if (typeof studentName !== 'undefined') studentName = name; } catch(e) {}
    try { if (typeof window.studentName !== 'undefined') window.studentName = name; } catch(e) {}

    // 3. Hide start screen
    var startEl = document.getElementById('start-screen');
    if (startEl) startEl.classList.add('hidden');

    // 4. Call whichever start function exists
    var fns = ['startApp','checkName','startQuiz','startTest','start','startTraining','startPlatform'];
    for (var j = 0; j < fns.length; j++) {
      if (typeof window[fns[j]] === 'function') {
        try { window[fns[j]](); } catch(e) {}
        break;
      }
    }
  }

  // Run after full page load
  if (document.readyState === 'complete') {
    setTimeout(doStart, 100);
  } else {
    window.addEventListener('load', function() { setTimeout(doStart, 100); });
  }
})();
</script>
