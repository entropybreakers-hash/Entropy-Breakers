                <div class="flip-front">
                    <div class="cat-pill" id="front-cat">-</div>
                    <h2 id="card-hu" class="text-lg font-black text-white leading-snug">-</h2>
                    <span class="flip-hint">Koppints →</span>
                </div>
                <div class="flip-back">
                    <div class="back-cat-pill" id="back-cat">-</div>

                    <h2 id="card-en" class="text-lg font-black text-white leading-snug mb-2">-</h2>
                    <p id="card-tip" class="text-slate-400 text-xs font-medium leading-relaxed">-</p>
                    <span class="flip-hint" style="color:#5eead4;">← Vissza</span>
                </div>
            </div>
        </div>

        <div class="flex items-center justify-between gap-4 mb-5">
            <button class="nav-btn" onclick="prevCard()"><svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
            <p class="flex-1 text-center text-slate-500 text-[10px] font-black uppercase tracking-widest">Koppints a fordításért</p>
            <button class="nav-btn" onclick="nextCard()"><svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        </div>

        <div class="grid grid-cols-2 gap-3">
            <button onclick="shuffleCards()" class="py-4 glass-panel text-slate-300 font-black text-xs uppercase tracking-widest hover:bg-white/10 transition rounded-2xl">🔀 Keverés</button>
            <button onclick="showResult()" class="py-4 primary-btn text-white font-black text-xs uppercase tracking-widest rounded-2xl">✅ Kész!</button>
        </div>
    </div>

    <!-- RESULT SCREEN -->
    <div id="result-screen" class="hidden text-center animate-slide">
        <div class="text-6xl mb-6">🌍</div>
        <h2 class="text-3xl font-black text-white mb-2 uppercase">Szép munka!</h2>
        <p class="text-slate-400 font-medium mb-8"><span id="display-name" class="mint-glow-text"></span>, átmenté a kártyákat!</p>
        <div class="result-card p-8 mb-8">

            <div class="text-7xl font-black text-white" id="seen-count">0</div>
            <div class="text-slate-400 text-sm mt-1">/ 60 szituáció</div>
            <div id="feedback-msg" class="mt-4 text-teal-200 font-bold italic text-sm">-</div>
        </div>
        <div class="grid grid-cols-2 gap-3">
            <button onclick="restartFromStart()" class="py-5 bg-white/5 text-slate-300 rounded-2xl font-black uppercase tracking-widest hover:bg-white/10 transition text-xs">🔄 Újrakezdés</button>
            <button onclick="shuffleAndRestart()" class="py-5 primary-btn text-white rounded-2xl font-black uppercase tracking-widest text-xs">🔀 Új sorrend</button>
        </div>
    </div>
</div>

        { cat:"🆘 Vészhelyzet", hu:"Konzulátusi segítséget kérsz.",                              en:"I need to contact my country's consulate. There has been an emergency.",  tip:"Consulate = konzulátus. Embassy = nagykövetség. Consular assistance = konzuli segítség." },
        { cat:"🆘 Vészhelyzet", hu:"Autóbalesetben sérülés történt, biztosítót értesítesz.",    en:"There has been a road accident involving injuries. I need to notify my insurer.", tip:"Involving injuries = sérüléssel járó. Notify = értesít. Incident report = eseményjelentés." },
        { cat:"🆘 Vészhelyzet", hu:"Természeti katasztrófa esetén evakuálsz.",                   en:"Due to the natural disaster, we have been advised to evacuate the area.", tip:"Natural disaster = természeti katasztrófa. Shelter = menedék. Red Cross = Vöröskereszt." },
        { cat:"🆘 Vészhelyzet", hu:"Jogi segítséget kérsz letartóztatás esetén.",               en:"I require legal representation. I would like to contact a lawyer immediately.", tip:"Legal representation = jogi képviselet. Lawyer = ügyvéd. Rights = jogok." },
        { cat:"🆘 Vészhelyzet", hu:"Sürgős hazautazáshoz segítséget kérsz.",                    en:"I need to arrange emergency repatriation. Who can assist me?",            tip:"Repatriation = hazaszállítás. Travel insurance helpline = biztosítói segélyhívó." },

        { cat:"🗺️ Városnézés",  hu:"Privát idegenvezetőt akarsz foglalni.",                      en:"I'd like to arrange a private guided tour with an expert in local history.", tip:"Private = privát. Expert = szakértő. Bespoke = személyre szabott." },
        { cat:"🗺️ Városnézés",  hu:"Kulturális eseményre jegyet kérsz.",                         en:"Are there any tickets still available for tonight's cultural performance?", tip:"Performance = előadás. Sold out = elfogyott. Box office = jegypénztár." },
        { cat:"🗺️ Városnézés",  hu:"Hagyományos kézműves piacot keresel.",                      en:"Could you recommend an authentic local craft market in the area?",        tip:"Authentic = valódi, hagyományos. Craft market = kézműves piac. Artisan = kézműves." },
        { cat:"🗺️ Városnézés",  hu:"Kulturális érzékenységről kérdezel templomban.",             en:"Are there any dress code requirements or cultural sensitivities I should be aware of?", tip:"Dress code = öltözési szabályok. Cover up = takarja el." },
        { cat:"🗺️ Városnézés",  hu:"Engedélyezett-e drón használata.",                          en:"Is drone photography permitted in this area? Are there any restrictions?", tip:"Drone = drón. Permitted = engedélyezett. No-fly zone = repüléstilalmi zóna." },
        { cat:"🗺️ Városnézés",  hu:"Helyi gasztronómiai túrát keresel.",                        en:"Do you organise food and drink tours focusing on local gastronomy?",       tip:"Gastronomy = gasztronómia. Food tour = gasztro túra. Wine tasting = borkóstoló." }
    ];

    let studentName = "";
    let cardList = [...CARDS];
    let currentIndex = 0;
    let isFlipped = false;

    function startApp() {
        const input = document.getElementById('student-name');
        const name = input.value.trim();
        if (name.length < 3) { alert("Kérlek írj be legalább 3 karaktert!"); input.focus(); return; }
        studentName = name;
        currentIndex = 0;
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('card-screen').classList.remove('hidden');
        renderCard();
    }

    document.getElementById('student-name').addEventListener('keypress', e => { if (e.key === 'Enter') startApp(); });

    function renderCard() {
        const card = cardList[currentIndex];
        const total = cardList.length;
        document.getElementById('card-counter').innerText = `${currentIndex + 1} / ${total}`;
        document.getElementById('progress-fill').style.width = `${((currentIndex + 1) / total) * 100}%`;
        document.getElementById('cat-label').innerText = card.cat;
        document.getElementById('front-cat').innerText = card.cat;
        document.getElementById('back-cat').innerText = card.cat;
        document.getElementById('card-hu').innerText = card.hu;
        document.getElementById('card-en').innerText = card.en;
        document.getElementById('card-tip').innerText = card.tip;
        isFlipped = false;
        document.getElementById('flip-inner').classList.remove('is-flipped');
    }

    function flipCard() {
        isFlipped = !isFlipped;
        document.getElementById('flip-inner').classList.toggle('is-flipped', isFlipped);
    }

    function nextCard() {
        if (currentIndex < cardList.length - 1) { currentIndex++; renderCard(); }
        else showResult();
    }

    function prevCard() {
        if (currentIndex > 0) { currentIndex--; renderCard(); }
    }

    function shuffleCards() {
        for (let i = cardList.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [cardList[i], cardList[j]] = [cardList[j], cardList[i]];
        }
        currentIndex = 0; renderCard();
    }

    function showResult() {
        document.getElementById('card-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('display-name').innerText = studentName;
        document.getElementById('seen-count').innerText = currentIndex + 1;
        const pct = Math.round(((currentIndex + 1) / cardList.length) * 100);
        document.getElementById('feedback-msg').innerText = pct === 100
            ? "Zseniális! Mind a 60 B2 kártyát átmenté! Valódi haladó szint! ✈️"
            : pct >= 60 ? "Szép haladás! Folytasd, hamarosan készen leszel!"
            : "Jó kezdés! Ismételj még és magabiztos leszel!";
        fetch(MAKE_WEBHOOK_URL, { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({ Student: studentName, Quiz:"Traveling Guide B2 Flashcards", Score: currentIndex+1, TotalQuestions: cardList.length, Level:"B2", Skill:"Speaking", Percentage: pct, CompletedAt: new Date().toISOString() }) }).catch(()=>{});
    }

    function restartFromStart() {
        currentIndex = 0;
        document.getElementById('result-screen').classList.add('hidden');
        document.getElementById('card-screen').classList.remove('hidden');
        renderCard();
    }

    function shuffleAndRestart() {
        shuffleCards();
        document.getElementById('result-screen').classList.add('hidden');
        document.getElementById('card-screen').classList.remove('hidden');
    }

    function adminAccess() {
        if (prompt("Jelszó:") === "bettina2026") alert("Az eredmények a Make → Airtable rendszerben mentődnek.");
    }

    document.addEventListener('keydown', e => {
        if (document.getElementById('card-screen').classList.contains('hidden')) return;
        if (e.key === 'ArrowRight') nextCard();
        if (e.key === 'ArrowLeft') prevCard();
        if (e.key === ' ') { e.preventDefault(); flipCard(); }
    });
</script>

<script>
// EB Auto-start: read name from URL and skip login screen
window.addEventListener('load', function() {
    if (window.__eb_student_name) {
        var inputs = ['student-name','name-input','nameInput','studentName'];
        for (var i=0; i<inputs.length; i++) {
            var el = document.getElementById(inputs[i]);
            if (el) { el.value = window.__eb_student_name; break; }
        }
        setTimeout(function(){
            if (typeof startApp === 'function') startApp();
            else if (typeof startQuiz === 'function') startQuiz();
            else if (typeof start === 'function') start();
            else if (typeof startTest === 'function') startTest();
        }, 80);
    }
});
</script>
