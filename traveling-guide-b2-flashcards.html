    <style>
        
        * { box-sizing: border-box; }
        body { background:#020F09; font-family:'Manrope',sans-serif; color: #f1f5f9; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; margin: 0; }
        .cyber-shell { background: rgba(2,6,23,0.88); backdrop-filter: blur(16px); border: 1px solid var(--card-border); box-shadow: 0 0 30px rgba(45,212,191,0.08); border-radius: 32px; width: 100%; max-width: 560px; overflow: hidden; }
        .mint-glow-text { color: var(--neon-mint); text-shadow: 0 0 14px rgba(45,212,191,0.6); }
        .aurora-title { background: linear-gradient(135deg, #fff 35%, var(--neon-mint) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass-panel { background: var(--glass-bg); border: 1px solid rgba(255,255,255,0.06); border-radius: 24px; }
        .input-field { width: 100%; padding: 18px 20px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.04); color: white; font-weight: 700; text-align: center; outline: none; transition: all 0.25s ease; font-size: 1rem; }
        .input-field::placeholder { color: #94a3b8; }
        .input-field:focus { border-color: var(--neon-mint); box-shadow: 0 0 20px rgba(45,212,191,0.15); background: rgba(255,255,255,0.06); }
        .primary-btn { background: linear-gradient(135deg, #0d9488 0%, #4f46e5 100%); box-shadow: 0 0 20px rgba(45,212,191,0.22); border: 1px solid rgba(255,255,255,0.14); transition: all 0.25s ease; cursor: pointer; }
        .primary-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .nav-btn { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); border-radius: 50%; width: 56px; height: 56px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s ease; flex-shrink: 0; }
        .nav-btn:hover { background: rgba(45,212,191,0.12); border-color: var(--neon-mint); }
        .nav-btn:active { transform: scale(0.94); }
        .progress-track { width: 100%; height: 8px; background: rgba(255,255,255,0.08); border-radius: 999px; overflow: hidden; }
        .progress-bar-inner { height: 100%; background: linear-gradient(90deg, var(--neon-mint), var(--neon-indigo)); transition: width 0.45s ease; }
        .animate-slide { animation: slideIn 0.35s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        .flip-container { perspective: 1200px; width: 100%; height: 270px; cursor: pointer; }
        .flip-inner { position: relative; width: 100%; height: 100%; transition: transform 0.55s cubic-bezier(0.4,0,0.2,1); transform-style: preserve-3d; }
        .flip-inner.is-flipped { transform: rotateY(180deg); }
        .flip-front, .flip-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 24px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px 22px; text-align: center; }
        .flip-front { background: rgba(255,255,255,0.04); border: 1px solid rgba(234,179,8,0.25); box-shadow: 0 0 20px rgba(234,179,8,0.06); }
        .flip-back { background: linear-gradient(135deg, rgba(13,148,136,0.2), rgba(79,70,229,0.2)); border: 1px solid rgba(45,212,191,0.25); box-shadow: 0 0 20px rgba(45,212,191,0.1); transform: rotateY(180deg); }
        .cat-pill { display: inline-flex; align-items: center; background: rgba(234,179,8,0.12); border: 1px solid rgba(234,179,8,0.25); color: #fde047; border-radius: 999px; padding: 4px 12px; font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 12px; }
        .back-cat-pill { display: inline-flex; align-items: center; background: rgba(45,212,191,0.15); border: 1px solid rgba(45,212,191,0.3); color: #5eead4; border-radius: 999px; padding: 4px 12px; font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 12px; }
        .flip-hint { position: absolute; bottom: 12px; right: 16px; font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; opacity: 0.35; color: #94a3b8; }
        .result-card { background: linear-gradient(135deg, rgba(13,148,136,0.18), rgba(79,70,229,0.18)); border: 1px solid rgba(45,212,191,0.16); border-radius: 32px; }

/* ═══ PREMIUM THEME OVERRIDE ═══ */
body{background:#0D0520 !important;font-family:'Manrope',sans-serif !important}
.bg-wrap{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.mesh{position:absolute;inset:0;background:radial-gradient(ellipse 120% 80% at 50% -10%,rgba(109,40,217,0.95) 0%,rgba(88,28,180,0.65) 25%,transparent 60%),
    radial-gradient(ellipse 80% 60% at 0% 50%,rgba(59,130,246,0.50) 0%,transparent 55%),
    radial-gradient(ellipse 80% 60% at 100% 50%,rgba(147,51,234,0.45) 0%,transparent 55%),
    radial-gradient(ellipse 60% 40% at 50% 100%,rgba(168,85,247,0.35) 0%,transparent 60%),
    #0D0520}
.light-rays{position:absolute;inset:0;
  background:conic-gradient(from 270deg at 50% -5%,
    transparent 0deg,rgba(59,130,246,0.08) 8deg,transparent 16deg,
    rgba(96,165,250,0.06) 24deg,transparent 32deg,rgba(147,197,253,0.07) 40deg,
    transparent 48deg,rgba(59,130,246,0.08) 56deg,transparent 64deg,
    rgba(96,165,250,0.06) 72deg,transparent 80deg,transparent 180deg);
  mask-image:linear-gradient(to bottom,black 0%,transparent 70%)}
.grid-bg{position:absolute;inset:0;
  background-image:linear-gradient(rgba(167,139,250,0.07) 1px,transparent 1px),linear-gradient(90deg,rgba(167,139,250,0.07) 1px,transparent 1px);
  background-size:48px 48px;
  mask-image:radial-gradient(ellipse 90% 90% at 50% 30%,black 10%,transparent 80%)}
.floor-glow{position:absolute;bottom:0;left:0;right:0;height:40%;
  background:radial-gradient(ellipse 80% 60% at 50% 100%,rgba(109,40,217,0.30) 0%,transparent 70%);
  filter:blur(20px)}
.noise{position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E")}

/* HEADER */
.eb-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;position:relative;z-index:1}
.eb-logo{font-family:'Exo 2',sans-serif !important;font-size:.88rem;font-weight:800;text-transform:uppercase;
  background:linear-gradient(135deg,#fff 40%,#C4B5FD) !important;
  -webkit-background-clip:text !important;-webkit-text-fill-color:transparent !important}
.eb-badge{font-family:'Exo 2',sans-serif;font-size:.58rem;font-weight:700;letter-spacing:.18em;
  text-transform:uppercase;color:#8B5CF6;background:rgba(139,92,246,0.10);
  border:1px solid rgba(139,92,246,0.25);border-radius:100px;padding:5px 14px}

/* START SCREEN */
#start-screen{position:relative;z-index:1}
.start-icon-wrap{position:relative;display:inline-block;margin-bottom:22px}
.start-icon-glow{position:absolute;inset:-10px;border-radius:32px;
  background:radial-gradient(circle,rgba(124,58,237,0.55) 0%,transparent 70%);
  filter:blur(14px);z-index:-1}
.start-icon{width:76px !important;height:76px !important;border-radius:22px !important;
  background:linear-gradient(135deg,#6D28D9CC,#8B5CF688) !important;
  border:1px solid rgba(168,85,247,0.35) !important;
  box-shadow:0 0 40px rgba(124,58,237,0.55),0 8px 32px rgba(0,0,0,0.4) !important;
  backdrop-filter:blur(12px)}

/* PROGRESS & CARDS */
.prog-track,.progress-track{height:3px !important;background:rgba(255,255,255,0.07) !important;border-radius:999px !important;overflow:hidden !important}
.prog-fill,.progress-bar-inner{height:100% !important;background:linear-gradient(90deg,#6D28D9,#8B5CF6,#A78BFA) !important;
  border-radius:999px !important;box-shadow:0 0 10px rgba(139,92,246,0.7) !important;
  transition:width .55s cubic-bezier(.4,0,.2,1) !important}

/* FLIP CARD */
.flip-front{background:linear-gradient(145deg,rgba(255,255,255,0.07),rgba(255,255,255,0.02)) !important;
  border:1px solid rgba(168,85,247,0.35) !important;backdrop-filter:blur(20px) !important;
  box-shadow:0 16px 48px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.07) !important}
.flip-back{background:linear-gradient(145deg,rgba(109,40,217,0.45),rgba(60,20,120,0.55)) !important;
  border:1px solid rgba(168,85,247,0.35) !important;backdrop-filter:blur(20px) !important;
  box-shadow:0 16px 48px rgba(0,0,0,0.5),0 0 60px rgba(139,92,246,0.15) !important}

/* BUTTONS */
.primary-btn,.cta-btn,.start-btn,.enter-btn,.btn-main{
  background:linear-gradient(135deg,#6D28D9,#8B5CF6) !important;
  box-shadow:0 0 0 1px rgba(139,92,246,0.15),0 0 40px rgba(124,58,237,0.55),0 8px 24px rgba(0,0,0,0.4) !important;
  border:none !important;font-family:'Exo 2',sans-serif !important;
  font-weight:700 !important;letter-spacing:.08em !important;text-transform:uppercase !important}
.primary-btn:hover,.cta-btn:hover,.btn-main:hover{
  box-shadow:0 0 0 1px rgba(168,85,247,0.35),0 0 60px rgba(109,40,217,0.6),0 12px 32px rgba(0,0,0,0.4) !important;
  transform:translateY(-2px) !important}

/* INPUT */
.input-field,.name-input,.answer-input,#en-input,#student-name,#name-input{
  background:rgba(255,255,255,0.05) !important;
  border:1px solid rgba(168,85,247,0.35) !important;
  border-radius:14px !important;color:#fff !important;
  font-family:'Manrope',sans-serif !important;transition:all .25s !important}
.input-field:focus,.name-input:focus,.answer-input:focus,#en-input:focus,#student-name:focus{
  border-color:#8B5CF6 !important;
  box-shadow:0 0 0 3px rgba(139,92,246,0.10),0 0 24px rgba(139,92,246,0.15) !important;
  background:rgba(255,255,255,0.08) !important}

/* TITLE TEXT */
.aurora-title,.hero-title,h1{
  font-family:'Exo 2',sans-serif !important;font-weight:900 !important;letter-spacing:-.02em !important;
  background:linear-gradient(135deg,#fff 20%,#A78BFA 65%,#C4B5FD) !important;
  -webkit-background-clip:text !important;-webkit-text-fill-color:transparent !important}

/* CAT LABELS / TAGS */
.cat-pill,.eb-badge,.level-chip,.badge{color:#8B5CF6 !important;
  background:rgba(139,92,246,0.10) !important;border-color:rgba(139,92,246,0.25) !important}

/* NAV BUTTONS */
.nav-btn{background:rgba(255,255,255,0.04) !important;border:1px solid rgba(168,85,247,0.35) !important;backdrop-filter:blur(8px) !important}
.nav-btn:hover{background:rgba(139,92,246,0.10) !important;border-color:#8B5CF6 !important;box-shadow:0 0 18px rgba(139,92,246,0.15) !important}

/* RESULT PANEL */
.result-card,.result-panel,.cyber-shell,.glass-panel{
  background:rgba(255,255,255,0.04) !important;
  border:1px solid rgba(168,85,247,0.35) !important;backdrop-filter:blur(20px) !important;
  box-shadow:0 8px 40px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.06) !important}

/* GHOST BUTTON */
.btn-ghost,.secondary-btn,.nav-btn-text{
  background:rgba(255,255,255,0.04) !important;
  border:1px solid rgba(168,85,247,0.35) !important;
  color:rgba(255,255,255,0.45) !important;font-family:'Manrope',sans-serif !important}
.btn-ghost:hover,.secondary-btn:hover{border-color:#8B5CF6 !important;color:#A78BFA !important}

/* TYPOGRAPHY */
body,p,span,div,button{font-family:'Manrope',sans-serif}
h1,h2,h3,.title,.heading{font-family:'Exo 2',sans-serif !important}

    let studentName = "";
    let cardList = [...CARDS];
    let currentIndex = 0;
    let isFlipped = false;

    function startApp() {
        const input = document.getElementById('student-name');
        const name = input.value.trim();
        if (name.length < 3) { alert("Please enter at least 2 characters!"); input.focus(); return; }
        studentName = name;
        currentIndex = 0;
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('card-screen').classList.remove('hidden');
        renderCard();
    }

    document.getElementById('student-name').addEventListener('keypress', e => { if (e.key === 'Enter') startApp(); });

    function renderCard() {
        const card = cardList[currentIndex];
        const total = cardList.length;
        document.getElementById('card-counter').innerText = `${currentIndex + 1} / ${total}`;
        document.getElementById('progress-fill').style.width = `${((currentIndex + 1) / total) * 100}%`;
        document.getElementById('cat-label').innerText = card.cat;
        document.getElementById('front-cat').innerText = card.cat;
        document.getElementById('back-cat').innerText = card.cat;
        document.getElementById('card-hu').innerText = card.hu;
        document.getElementById('card-en').innerText = card.en;
        document.getElementById('card-tip').innerText = card.tip;
        isFlipped = false;
        document.getElementById('flip-inner').classList.remove('is-flipped');
    }

    function flipCard() {
        isFlipped = !isFlipped;
        document.getElementById('flip-inner').classList.toggle('is-flipped', isFlipped);
    
    if (isFlipped) { var w = document.getElementById("card-en"); if(w) speakEnglish(w.innerText); 
    if (isFlipped) { var w = document.getElementById("card-en"); if(w) speakEnglish(w.innerText); }
}
}

    function nextCard() {
        if (currentIndex < cardList.length - 1) { currentIndex++; renderCard(); }
        else showResult();
    }

    function prevCard() {
        if (currentIndex > 0) { currentIndex--; renderCard(); }
    }

    function shuffleCards() {
        for (let i = cardList.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [cardList[i], cardList[j]] = [cardList[j], cardList[i]];
        }
        currentIndex = 0; renderCard();
    }

    function showResult() {
        document.getElementById('card-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('display-name').innerText = studentName;
        document.getElementById('seen-count').innerText = currentIndex + 1;
        const pct = Math.round(((currentIndex + 1) / cardList.length) * 100);
        document.getElementById('feedback-msg').innerText = pct === 100
            ? "Zseniális! Mind a 60 B1 kártyát átmenté! ✈️"
            : pct >= 60 ? "Szép haladás! Folytasd a tanulást!"
            : "Jó kezdés! Ismételj még és magabiztos leszel!";
        fetch(MAKE_WEBHOOK_URL, { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({ Student: studentName, Quiz:"B2 Travelling Guide", Score: currentIndex+1, TotalQuestions: cardList.length, Level:"B1", Skill:"Speaking", Percentage: pct, CompletedAt: new Date().toISOString() }) }).catch(()=>{});
    }

    function restartFromStart() {
        currentIndex = 0;
        document.getElementById('result-screen').classList.add('hidden');
        document.getElementById('card-screen').classList.remove('hidden');
        renderCard();
    }

    function shuffleAndRestart() {
        shuffleCards();
        document.getElementById('result-screen').classList.add('hidden');
        document.getElementById('card-screen').classList.remove('hidden');
    }

    function adminAccess() {
        if (prompt("Jelszó:") === "bettina2026") alert("Az eredmények a Make → Airtable rendszerben mentődnek.");
    }

    document.addEventListener('keydown', e => {
        if (document.getElementById('card-screen').classList.contains('hidden')) return;
        if (e.key === 'ArrowRight') nextCard();
        if (e.key === 'ArrowLeft') prevCard();
        if (e.key === ' ') { e.preventDefault(); flipCard(); }
    });
</script>


<script>

(function() {
  var p = new URLSearchParams(window.location.search);
  var n = p.get('name');
  if (!n || n.length < 1) return;
  var name = decodeURIComponent(n);
  window.__eb_student_name = name;

  function doStart() {
    // 1. Fill all possible name inputs
    var inputIds = ['student-name','name-input','nameInput','studentName','player-name'];
    for (var i = 0; i < inputIds.length; i++) {
      var el = document.getElementById(inputIds[i]);
      if (el) el.value = name;
    }

    // 2. Set global studentName variable if it exists
    try { if (typeof studentName !== 'undefined') studentName = name; } catch(e) {}
    try { if (typeof window.studentName !== 'undefined') window.studentName = name; } catch(e) {}

    // 3. Hide start screen
    var startEl = document.getElementById('start-screen');
    if (startEl) startEl.classList.add('hidden');

    // 4. Call whichever start function exists
    var fns = ['startApp','checkName','startQuiz','startTest','start','startTraining','startPlatform'];
    for (var j = 0; j < fns.length; j++) {
      if (typeof window[fns[j]] === 'function') {
        try { window[fns[j]](); } catch(e) {}
        break;
      }
    }
  }

  // Run after full page load
  if (document.readyState === 'complete') {
    setTimeout(doStart, 100);
  } else {
    window.addEventListener('load', function() { setTimeout(doStart, 100); });
  }
})();
</script>

<script>
function speakEnglish(text) {
    if (!text) return;
    var clean = text.replace(/[(][^)]*[)]/g,'').replace(/[^a-zA-Z0-9 \-\'.,!?]/g,'').trim();
    if (!clean || clean.length < 1) return;
    fetch('https://api.elevenlabs.io/v1/text-to-speech/XB0fDUnXU5powFXDhCwa', {
        method: 'POST',
        headers: {
            'xi-api-key': 'sk_64910ef40b3275ba1d86e96cfe3b947d498aaacda971163b',
            'Content-Type': 'application/json',
            'Accept': 'audio/mpeg'
        },
        body: JSON.stringify({
            text: clean,
            model_id: 'eleven_multilingual_v2',
            voice_settings: { stability: 0.5, similarity_boost: 0.8 }
        })
    })
    .then(function(r) { if (!r.ok) throw new Error('err'); return r.arrayBuffer(); })
    .then(function(buf) {
        var blob = new Blob([buf], {type: 'audio/mpeg'});
        var url = URL.createObjectURL(blob);
        var audio = new Audio(url);
        audio.play();
        audio.onended = function() { URL.revokeObjectURL(url); };
    })
    .catch(function() {
        if ('speechSynthesis' in window) {
            speechSynthesis.cancel();
            var u = new SpeechSynthesisUtterance(clean);
            u.lang = 'en-GB'; u.rate = 0.9;
            speechSynthesis.speak(u);
        }
    });
}
</script>
