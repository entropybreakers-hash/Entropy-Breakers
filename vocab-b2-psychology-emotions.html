            <button class="nav-btn" onclick="nextCard()"><svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        </div>
        <div class="grid grid-cols-2 gap-3">
            <button onclick="shuffleCards()" class="py-4 glass-panel text-slate-300 font-black text-xs uppercase tracking-widest hover:bg-white/10 transition rounded-2xl">🔀 Keverés</button>
            <button onclick="showResult()" class="py-4 primary-btn text-white font-black text-xs uppercase tracking-widest rounded-2xl">✅ Kész!</button>
        </div>
    </div>

    <!-- RESULT -->

        <div class="text-6xl mb-6">🧠</div>

        <div class="result-card p-8 mb-8">
            <div class="text-purple-300 font-black uppercase text-xs mb-2 tracking-widest">🟣 B2 · Psychology & Emotions</div>
            <div class="text-7xl font-black text-white" id="seen-count">0</div>
            <div class="text-slate-400 text-sm mt-1">/ 50 szó</div>
            <div id="feedback-msg" class="mt-4 text-purple-200 font-bold italic text-sm">-</div>
        </div>
        <div class="grid grid-cols-2 gap-3">
            <button onclick="restartFromStart()" class="py-5 bg-white/5 text-slate-300 rounded-2xl font-black uppercase tracking-widest hover:bg-white/10 transition text-xs">🔄 Újrakezdés</button>
            <button onclick="shuffleAndRestart()" class="py-5 primary-btn text-white rounded-2xl font-black uppercase tracking-widest text-xs">🔀 Új sorrend</button>
        </div>
    </div>
</div>

<script>
    const MAKE_WEBHOOK_URL = "https://hook.eu1.make.com/ww4obw8ghb8h46ti1gi6yoy2qg1db7ad";

    const CARDS = [
        // 😊 POSITIVE EMOTIONS
        { cat:"😊 Pozitív érzések", hu:"Elégedettség", en:"Satisfaction", example:"She felt great satisfaction after finishing the project." },
        { cat:"😊 Pozitív érzések", hu:"Lelkesedés", en:"Enthusiasm", example:"He approached the new job with great enthusiasm." },
        { cat:"😊 Pozitív érzések", hu:"Hála", en:"Gratitude", example:"She expressed her gratitude with a heartfelt letter." },
        { cat:"😊 Pozitív érzések", hu:"Büszkeség", en:"Pride", example:"His parents felt enormous pride at his graduation." },
        { cat:"😊 Pozitív érzések", hu:"Megkönnyebbülés", en:"Relief", example:"I felt a wave of relief when I heard the good news." },
        { cat:"😊 Pozitív érzések", hu:"Öröm", en:"Joy", example:"The children's laughter was pure joy to hear." },
        { cat:"😊 Pozitív érzések", hu:"Remény", en:"Hope", example:"Despite the setback, she held onto hope." },
        { cat:"😊 Pozitív érzések", hu:"Inspiráció", en:"Inspiration", example:"His story was a source of inspiration for many." },

        // 😟 NEGATIVE EMOTIONS
        { cat:"😟 Negatív érzések", hu:"Szorongás", en:"Anxiety", example:"She experienced severe anxiety before the exam." },
        { cat:"😟 Negatív érzések", hu:"Frusztráció", en:"Frustration", example:"He expressed his frustration by walking out of the meeting." },
        { cat:"😟 Negatív érzések", hu:"Szégyen", en:"Shame", example:"He felt deep shame after lying to his friend." },
        { cat:"😟 Negatív érzések", hu:"Bűntudat", en:"Guilt", example:"She was overwhelmed by guilt after the argument." },
        { cat:"😟 Negatív érzések", hu:"Féltékenység", en:"Jealousy", example:"His jealousy damaged the friendship over time." },
        { cat:"😟 Negatív érzések", hu:"Elkeseredés", en:"Despair", example:"After the loss, he fell into despair." },
        { cat:"😟 Negatív érzések", hu:"Magány", en:"Loneliness", example:"Moving to a new city brought a deep sense of loneliness." },
        { cat:"😟 Negatív érzések", hu:"Düh", en:"Rage", example:"She struggled to control her rage during the argument." },

        // 🧠 MENTAL STATES
        { cat:"🧠 Mentális állapot", hu:"Kiégés", en:"Burnout", example:"After months of overworking, she experienced burnout." },
        { cat:"🧠 Mentális állapot", hu:"Reziliencia", en:"Resilience", example:"Resilience is the ability to recover from difficult experiences." },
        { cat:"🧠 Mentális állapot", hu:"Öntudatosság", en:"Self-awareness", example:"Self-awareness is key to personal growth." },
        { cat:"🧠 Mentális állapot", hu:"Motiváció", en:"Motivation", example:"He lacked the motivation to complete the task." },
        { cat:"🧠 Mentális állapot", hu:"Koncentráció", en:"Focus / Concentration", example:"Meditation can improve your focus significantly." },
        { cat:"🧠 Mentális állapot", hu:"Stressz", en:"Stress", example:"Chronic stress can have a serious impact on health." },
        { cat:"🧠 Mentális állapot", hu:"Mentális egészség", en:"Mental health", example:"Mental health is just as important as physical health." },
        { cat:"🧠 Mentális állapot", hu:"Tudatosság / Éberség", en:"Mindfulness", example:"She practises mindfulness to reduce daily stress." },

        // 🤝 SOCIAL EMOTIONS
        { cat:"🤝 Társas érzések", hu:"Empátia", en:"Empathy", example:"Good leaders show empathy towards their team members." },
        { cat:"🤝 Társas érzések", hu:"Bizalom", en:"Trust", example:"Trust is the foundation of any healthy relationship." },
        { cat:"🤝 Társas érzések", hu:"Elutasítás", en:"Rejection", example:"Fear of rejection stops many people from taking risks." },
        { cat:"🤝 Társas érzések", hu:"Elfogadás", en:"Acceptance", example:"Finding acceptance among peers is vital for teenagers." },
        { cat:"🤝 Társas érzések", hu:"Kötődés", en:"Attachment", example:"Strong emotional attachment forms in early childhood." },
        { cat:"🤝 Társas érzések", hu:"Irigység", en:"Envy", example:"Envy is destructive if it is not managed well." },

        // 🔬 PSYCHOLOGY CONCEPTS
        { cat:"🔬 Pszichológia", hu:"Viselkedés", en:"Behaviour", example:"His behaviour changed significantly after the therapy." },
        { cat:"🔬 Pszichológia", hu:"Ösztön", en:"Instinct", example:"The instinct to protect one's children is very powerful." },
        { cat:"🔬 Pszichológia", hu:"Tudatalatti", en:"Subconscious", example:"Many of our decisions are driven by the subconscious." },
        { cat:"🔬 Pszichológia", hu:"Megküzdési stratégia", en:"Coping mechanism", example:"Exercise is a healthy coping mechanism for stress." },
        { cat:"🔬 Pszichológia", hu:"Önbecsülés", en:"Self-esteem", example:"Low self-esteem can affect performance at work." },
        { cat:"🔬 Pszichológia", hu:"Énkép", en:"Self-image", example:"A positive self-image contributes to overall wellbeing." },
        { cat:"🔬 Pszichológia", hu:"Előítélet", en:"Bias / Prejudice", example:"We all carry unconscious bias to some degree." },
        { cat:"🔬 Pszichológia", hu:"Trauma", en:"Trauma", example:"Childhood trauma can affect adult relationships." },

        // 💬 DESCRIBING PEOPLE
        { cat:"💬 Jellemzés", hu:"Introvertált", en:"Introverted", example:"She is introverted and prefers small gatherings." },
        { cat:"💬 Jellemzés", hu:"Extrovertált", en:"Extroverted", example:"He is extroverted and thrives in social situations." },
        { cat:"💬 Jellemzés", hu:"Empatikus", en:"Empathetic", example:"Being empathetic makes you a better communicator." },
        { cat:"💬 Jellemzés", hu:"Impulzív", en:"Impulsive", example:"His impulsive decisions often led to problems." },
        { cat:"💬 Jellemzés", hu:"Kitartó", en:"Persistent", example:"She was persistent in pursuing her goals despite setbacks." },
        { cat:"💬 Jellemzés", hu:"Sérülékeny", en:"Vulnerable", example:"He felt vulnerable after opening up about his feelings." },
        { cat:"💬 Jellemzés", hu:"Önbizalommal teli", en:"Self-confident", example:"A self-confident person speaks clearly and calmly." },
        { cat:"💬 Jellemzés", hu:"Érzelmileg intelligens", en:"Emotionally intelligent", example:"Emotionally intelligent people handle conflict well." },

        // 🌱 GROWTH & WELLBEING
        { cat:"🌱 Fejlődés", hu:"Önfejlesztés", en:"Self-improvement", example:"He reads books on self-improvement every month." },
        { cat:"🌱 Fejlődés", hu:"Jóllét", en:"Wellbeing", example:"Work-life balance is essential for long-term wellbeing." },
        { cat:"🌱 Fejlődés", hu:"Növekedési szemlélet", en:"Growth mindset", example:"A growth mindset means believing you can improve with effort." },
        { cat:"🌱 Fejlődés", hu:"Öngondoskodás", en:"Self-care", example:"Regular self-care is essential for maintaining mental balance." },
    ];

    let studentName = "";
    let cardList = [...CARDS];
    let currentIndex = 0;
    let isFlipped = false;

    function startApp() {
        const input = document.getElementById('student-name');
        const name = input.value.trim();
        if (name.length < 3) { alert("Kérlek írj be legalább 3 karaktert!"); input.focus(); return; }
        studentName = name;
        currentIndex = 0;
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('card-screen').classList.remove('hidden');
        renderCard();
    }

    document.getElementById('student-name').addEventListener('keypress', e => { if (e.key === 'Enter') startApp(); });

    function renderCard() {
        const card = cardList[currentIndex];
        const total = cardList.length;
        document.getElementById('card-counter').innerText = `${currentIndex + 1} / ${total}`;
        document.getElementById('progress-fill').style.width = `${((currentIndex + 1) / total) * 100}%`;
        document.getElementById('cat-label').innerText = card.cat;
        document.getElementById('front-cat').innerText = card.cat;
        document.getElementById('back-cat').innerText = card.cat;
        document.getElementById('card-hu').innerText = card.hu;
        document.getElementById('card-en').innerText = card.en;
        document.getElementById('card-example').innerText = `"${card.example}"`;
        isFlipped = false;
        document.getElementById('flip-inner').classList.remove('is-flipped');
    }

    function flipCard() {
        isFlipped = !isFlipped;
        document.getElementById('flip-inner').classList.toggle('is-flipped', isFlipped);
    }

    function nextCard() {
        if (currentIndex < cardList.length - 1) { currentIndex++; renderCard(); }
        else showResult();
    }

    function prevCard() {
        if (currentIndex > 0) { currentIndex--; renderCard(); }
    }

    function shuffleCards() {
        for (let i = cardList.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [cardList[i], cardList[j]] = [cardList[j], cardList[i]];
        }
        currentIndex = 0; renderCard();
    }

    function showResult() {
        document.getElementById('card-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('display-name').innerText = studentName;
        document.getElementById('seen-count').innerText = currentIndex + 1;
        const pct = Math.round(((currentIndex + 1) / cardList.length) * 100);
        document.getElementById('feedback-msg').innerText = pct === 100
            ? "Zseniális! Az összes pszichológiai szót megtanultad! 🧠"
            : pct >= 60 ? "Szép haladás! Folytasd a tanulást!"
            : "Jó kezdés! Ismételj és magabiztos leszel!";
        fetch(MAKE_WEBHOOK_URL, { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({ Student: studentName, Quiz:"B2 Vocabulary - Psychology & Emotions", Score: currentIndex+1, TotalQuestions: cardList.length, Level:"B2", Skill:"Vocabulary", Percentage: pct, CompletedAt: new Date().toISOString() }) }).catch(()=>{});
    }

    function restartFromStart() {
        currentIndex = 0;
        document.getElementById('result-screen').classList.add('hidden');
        document.getElementById('card-screen').classList.remove('hidden');
        renderCard();
    }

    function shuffleAndRestart() {
        shuffleCards();
        document.getElementById('result-screen').classList.add('hidden');
        document.getElementById('card-screen').classList.remove('hidden');
    }

    function adminAccess() {
        if (prompt("Jelszó:") === "bettina2026") alert("Az eredmények a Make → Airtable rendszerben mentődnek.");
    }

    document.addEventListener('keydown', e => {
        if (document.getElementById('card-screen').classList.contains('hidden')) return;
        if (e.key === 'ArrowRight') nextCard();
        if (e.key === 'ArrowLeft') prevCard();
        if (e.key === ' ') { e.preventDefault(); flipCard(); }
    });
</script>

<script>
// EB Auto-start: read name from URL and skip login screen
window.addEventListener('load', function() {
    if (window.__eb_student_name) {
        var inputs = ['student-name','name-input','nameInput','studentName'];
        for (var i=0; i<inputs.length; i++) {
            var el = document.getElementById(inputs[i]);
            if (el) { el.value = window.__eb_student_name; break; }
        }
        setTimeout(function(){
            if (typeof startApp === 'function') startApp();
            else if (typeof startQuiz === 'function') startQuiz();
            else if (typeof start === 'function') start();
            else if (typeof startTest === 'function') startTest();
        }, 80);
    }
});
</script>
