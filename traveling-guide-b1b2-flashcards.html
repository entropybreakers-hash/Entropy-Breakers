<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Traveling Guide B1+B2 | Entropy Breakers 🚀</title>
    <script src="https://cdn.tailwindcss.com">
    window.addEventListener("load", startApp);

    <style>
        :root {
            --neon-mint: #2dd4bf;
            --neon-indigo: #6366f1;
            --bg-dark: #020617;
            --glass-bg: rgba(255,255,255,0.04);
            --card-border: rgba(45,212,191,0.16);
        }
        * { box-sizing: border-box; }
        body {
            background: radial-gradient(circle at 15% 15%, rgba(45,212,191,0.12), transparent 40%),
                        radial-gradient(circle at 85% 85%, rgba(99,102,241,0.12), transparent 40%), #020617;
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #f1f5f9; min-height: 100vh; display: flex;
            align-items: center; justify-content: center; padding: 20px; margin: 0;
        }
        .cyber-shell { background: rgba(2,6,23,0.88); backdrop-filter: blur(16px); border: 1px solid var(--card-border); box-shadow: 0 0 30px rgba(45,212,191,0.08); border-radius: 32px; width: 100%; max-width: 560px; overflow: hidden; }
        .mint-glow-text { color: var(--neon-mint); text-shadow: 0 0 14px rgba(45,212,191,0.6); }
        .aurora-title { background: linear-gradient(135deg, #fff 35%, var(--neon-mint) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass-panel { background: var(--glass-bg); border: 1px solid rgba(255,255,255,0.06); border-radius: 24px; }
        .input-field { width: 100%; padding: 18px 20px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.04); color: white; font-weight: 700; text-align: center; outline: none; transition: all 0.25s ease; font-size: 1rem; }
        .input-field::placeholder { color: #94a3b8; }
        .input-field:focus { border-color: var(--neon-mint); box-shadow: 0 0 20px rgba(45,212,191,0.15); background: rgba(255,255,255,0.06); }
        .primary-btn { background: linear-gradient(135deg, #0d9488 0%, #4f46e5 100%); box-shadow: 0 0 20px rgba(45,212,191,0.22); border: 1px solid rgba(255,255,255,0.14); transition: all 0.25s ease; cursor: pointer; }
        .primary-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .level-btn { padding: 12px; border-radius: 14px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); font-size: 0.8rem; font-weight: 700; transition: all 0.2s ease; text-align: center; color: #cbd5e1; cursor: pointer; }
        .level-btn.selected { background: linear-gradient(135deg, #0d9488 0%, #4f46e5 100%); color: white; border-color: rgba(255,255,255,0.14); box-shadow: 0 4px 12px rgba(79,70,229,0.3); }
        .nav-btn { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); border-radius: 50%; width: 56px; height: 56px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s ease; flex-shrink: 0; }
        .nav-btn:hover { background: rgba(45,212,191,0.12); border-color: var(--neon-mint); }
        .nav-btn:active { transform: scale(0.94); }
        .progress-track { width: 100%; height: 8px; background: rgba(255,255,255,0.08); border-radius: 999px; overflow: hidden; }
        .progress-bar-inner { height: 100%; background: linear-gradient(90deg, var(--neon-mint), var(--neon-indigo)); transition: width 0.45s ease; }
        .animate-slide { animation: slideIn 0.35s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        .flip-container { perspective: 1200px; width: 100%; height: 270px; cursor: pointer; }
        .flip-inner { position: relative; width: 100%; height: 100%; transition: transform 0.55s cubic-bezier(0.4,0,0.2,1); transform-style: preserve-3d; }
        .flip-inner.is-flipped { transform: rotateY(180deg); }
        .flip-front, .flip-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 24px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px 22px; text-align: center; }
        .flip-front { background: rgba(255,255,255,0.04); border: 1px solid rgba(99,102,241,0.25); box-shadow: 0 0 20px rgba(99,102,241,0.08); }
        .flip-back { background: linear-gradient(135deg, rgba(13,148,136,0.2), rgba(79,70,229,0.2)); border: 1px solid rgba(45,212,191,0.25); box-shadow: 0 0 20px rgba(45,212,191,0.1); transform: rotateY(180deg); }
        .cat-pill { display: inline-flex; align-items: center; gap: 6px; background: rgba(99,102,241,0.15); border: 1px solid rgba(99,102,241,0.3); color: #a5b4fc; border-radius: 999px; padding: 4px 12px; font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 12px; }
        .level-badge { display: inline-block; border-radius: 6px; padding: 2px 8px; font-size: 0.62rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
        .b1-badge { background: rgba(234,179,8,0.15); border: 1px solid rgba(234,179,8,0.3); color: #fde047; }
        .b2-badge { background: rgba(168,85,247,0.15); border: 1px solid rgba(168,85,247,0.3); color: #d8b4fe; }
        .flip-hint { position: absolute; bottom: 12px; right: 16px; font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; opacity: 0.35; color: #94a3b8; }
        .result-card { background: linear-gradient(135deg, rgba(13,148,136,0.18), rgba(79,70,229,0.18)); border: 1px solid rgba(45,212,191,0.16); border-radius: 32px; }
    </style>
</head>
<body>

<div id="app" class="cyber-shell p-6 md:p-10">

    <!-- START SCREEN -->
    <!-- FLASHCARD SCREEN -->
    <div id="card-screen" class="animate-slide">
        <header class="flex justify-between items-center mb-5">
            <div class="glass-panel px-4 py-2 text-[10px] font-black uppercase text-teal-300 tracking-widest">
                <span id="cat-label">-</span>
            </div>
            <div class="glass-panel px-4 py-2 text-[10px] font-black uppercase text-slate-300 tracking-widest">
                <span id="card-counter">1 / 120</span>
            </div>
        </header>
        <div class="progress-track mb-5"><div id="progress-fill" class="progress-bar-inner" style="width:0%"></div></div>

        <div class="flip-container mb-5" onclick="flipCard()">
            <div class="flip-inner" id="flip-inner">
                <div class="flip-front">
                    <div id="front-level-badge" class="level-badge b1-badge">B1</div>
                    <div class="cat-pill" id="front-cat">-</div>
                    <p class="text-slate-400 text-[10px] font-black uppercase tracking-widest mb-2">Magyar szituáció</p>
                    <h2 id="card-hu" class="text-lg font-black text-white leading-snug">-</h2>
                    <span class="flip-hint">Koppints →</span>
                </div>
                <div class="flip-back">
                    <div id="back-level-badge" class="level-badge b1-badge">B1</div>
                    <div class="cat-pill" style="background:rgba(45,212,191,0.15);border-color:rgba(45,212,191,0.3);color:#5eead4;" id="back-cat">-</div>
                    <p class="text-teal-300 text-[10px] font-black uppercase tracking-widest mb-2">Angol kifejezés</p>
                    <h2 id="card-en" class="text-lg font-black text-white leading-snug mb-2">-</h2>
                    <p id="card-tip" class="text-slate-400 text-xs font-medium leading-relaxed">-</p>
                    <span class="flip-hint" style="color:#5eead4;">← Vissza</span>
                </div>
            </div>
        </div>

        <div class="flex items-center justify-between gap-4 mb-5">
            <button class="nav-btn" onclick="prevCard()">
                <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <p class="flex-1 text-center text-slate-500 text-[10px] font-black uppercase tracking-widest">Koppints a fordításért</p>
            <button class="nav-btn" onclick="nextCard()">
                <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
        </div>

        <div class="grid grid-cols-2 gap-3">
            <button onclick="shuffleCards()" class="py-4 glass-panel text-slate-300 font-black text-xs uppercase tracking-widest hover:bg-white/10 transition rounded-2xl">🔀 Keverés</button>
            <button onclick="showResult()" class="py-4 primary-btn text-white font-black text-xs uppercase tracking-widest rounded-2xl">✅ Kész!</button>
        </div>
    </div>

    <!-- RESULT SCREEN -->
    <div id="result-screen" class="hidden text-center animate-slide">
        <div class="text-6xl mb-6">🌍</div>
        <h2 class="text-3xl font-black text-white mb-2 uppercase">Szép munka!</h2>
        <p class="text-slate-400 font-medium mb-8"><span id="display-name" class="mint-glow-text"></span>, átmenté a kártyákat!</p>
        <div class="result-card p-8 mb-8">
            <div class="text-teal-300 font-black uppercase text-xs mb-2 tracking-widest">Megtanult kártyák</div>
            <div class="text-7xl font-black text-white" id="seen-count">0</div>
            <div id="result-total" class="text-slate-400 text-sm mt-1">/ 120 szituáció</div>
            <div id="feedback-msg" class="mt-4 text-teal-200 font-bold italic text-sm">-</div>
        </div>
        <div class="grid grid-cols-2 gap-3">
            <button onclick="restartFromStart()" class="py-5 bg-white/5 text-slate-300 rounded-2xl font-black uppercase tracking-widest hover:bg-white/10 transition text-xs">🔄 Újrakezdés</button>
            <button onclick="shuffleAndRestart()" class="py-5 primary-btn text-white rounded-2xl font-black uppercase tracking-widest text-xs">🔀 Új sorrend</button>
        </div>
    </div>
</div>

<script>
    // ── API KEY STORED SAFELY IN MAKE.COM — NOT HERE ──
    const MAKE_WEBHOOK_URL = "https://hook.eu1.make.com/ww4obw8ghb8h46ti1gi6yoy2qg1db7ad";

    const ALL_CARDS = [

        // ══════════════════════════════════════════
        // ✈️ AIRPORT — B1 (6) + B2 (6)
        // ══════════════════════════════════════════
        { level:"B1", cat:"✈️ Reptér", hu:"Megkérdezed, késik-e a londoni járat.", en:"Is the flight to London delayed?", tip:"Delayed = késik. On time = menetrend szerint. Cancelled = törölve." },
        { level:"B1", cat:"✈️ Reptér", hu:"A csomagod túl nehéz, ezt jelzed.", en:"My luggage is overweight.", tip:"Overweight = túlsúlyos. Excess baggage fee = túlsúly díj." },
        { level:"B1", cat:"✈️ Reptér", hu:"Segítséget kérsz a kapu megtalálásához.", en:"Could you tell me how to get to gate 12?", tip:"Could you tell me...? = Meg tudná mondani...? Udvariasabb forma." },
        { level:"B1", cat:"✈️ Reptér", hu:"Elveszett a csomagod, bejelented.", en:"I'd like to report a missing suitcase.", tip:"Report = bejelent. Missing = hiányzó. Lost luggage desk = elveszett poggyász pult." },
        { level:"B1", cat:"✈️ Reptér", hu:"Megkérdezed, mennyi az átszállási idő.", en:"How long is the layover?", tip:"Layover = átszállási idő. Connecting flight = csatlakozó járat." },
        { level:"B1", cat:"✈️ Reptér", hu:"A beszállókártyádat kéred.", en:"Can I have my boarding pass, please?", tip:"Boarding pass = beszállókártya. Gate closes = kapu bezár." },

        { level:"B2", cat:"✈️ Reptér", hu:"Lekéstél egy csatlakozást, kompenzációt kérsz.", en:"What compensation am I entitled to for the missed connection?", tip:"Entitled to = jogosult vmire. Compensation = kártérítés. EU261 védi az utasokat." },
        { level:"B2", cat:"✈️ Reptér", hu:"Sérült a poggyászod, hivatalos panaszt teszel.", en:"I'd like to file a formal complaint about my damaged luggage.", tip:"File a complaint = panaszt tesz. Damaged = sérült. PIR form = kár bejelentő lap." },
        { level:"B2", cat:"✈️ Reptér", hu:"Túlfoglalt a járat, átútvonalazást kérsz.", en:"What are the alternative re-routing options available?", tip:"Re-routing = átirányítás. Overbooking = túlfoglalás. Bumped = kiszorítva." },
        { level:"B2", cat:"✈️ Reptér", hu:"ÁFA visszatérítést keresel.", en:"Where is the VAT refund office?", tip:"VAT refund = ÁFA visszatérítés. Tax-free = adómentes. Customs stamp = vámpecsét." },
        { level:"B2", cat:"✈️ Reptér", hu:"Megkérdezed, jogosult vagy-e a VIP váróteremre.", en:"Is my ticket valid for lounge access?", tip:"Lounge = VIP váróterem. Priority pass = prioritás kártya. Business class = üzleti osztály." },
        { level:"B2", cat:"✈️ Reptér", hu:"Mérföldjeiddel szeretnél felfrissíteni.", en:"I'd like to use my frequent flyer miles to upgrade.", tip:"Frequent flyer miles = törzsutasmérföldek. Upgrade = magasabb osztályra vált." },

        // ══════════════════════════════════════════
        // 🍽️ RESTAURANT — B1 (6) + B2 (6)
        // ══════════════════════════════════════════
        { level:"B1", cat:"🍽️ Étterem", hu:"Asztalt foglalsz estére.", en:"I'd like to book a table for 8 PM, please.", tip:"Book a table = asztalt foglal. For two = két személyre. Indoor/outdoor = belül/kint." },
        { level:"B1", cat:"🍽️ Étterem", hu:"Külön szeretnétek fizetni.", en:"We'd like to pay separately, please.", tip:"Separately = külön. Split the bill = felosztja a számlát." },
        { level:"B1", cat:"🍽️ Étterem", hu:"Megkérdezed, mi a napi ajánlat.", en:"What are today's specials?", tip:"Specials = napi ajánlatok. Chef's recommendation = séf ajánlása." },
        { level:"B1", cat:"🍽️ Étterem", hu:"Jelzed, hogy allergiás vagy diókra.", en:"I'm allergic to nuts. Does this contain any?", tip:"Allergic to = allergiás vmire. Contains = tartalmaz. Gluten-free = gluténmentes." },
        { level:"B1", cat:"🍽️ Étterem", hu:"Ajánlást kérsz az étteremtől.", en:"What would you recommend from the menu?", tip:"Recommend = ajánl. Signature dish = jellegzetes fogás. Local speciality = helyi specialitás." },
        { level:"B1", cat:"🍽️ Étterem", hu:"Köret cserét kérsz.", en:"Could I have rice instead of chips, please?", tip:"Instead of = helyett. Side dish = köret. Chips = hasábburgonya (UK). Fries = sült krumpli (US)." },

        { level:"B2", cat:"🍽️ Étterem", hu:"Összetevő helyettesítést kérsz allergia miatt.", en:"Would it be possible to substitute this ingredient due to an allergy?", tip:"Substitute = helyettesít. Ingredient = összetevő. Cross-contamination = keresztszennyeződés." },
        { level:"B2", cat:"🍽️ Étterem", hu:"A steak túlsültnek tűnik, ezt jelzed.", en:"I'm afraid this steak appears to be overcooked.", tip:"Overcooked = túlsült. Medium rare = közepesen átsütve. Well done = jól átsütve." },
        { level:"B2", cat:"🍽️ Étterem", hu:"Megkérdezed, van-e dugódíj ha saját bort hozol.", en:"Is there a corkage fee if we bring our own bottle?", tip:"Corkage fee = dugódíj. BYO = Bring Your Own = hozz magaddal bort." },
        { level:"B2", cat:"🍽️ Étterem", hu:"Autentikus helyet keresel, ahol a helyiek esznek.", en:"Could you recommend somewhere off the beaten track?", tip:"Off the beaten track = turistáktól távolabb. Authentic = autentikus. Locals = helyiek." },
        { level:"B2", cat:"🍽️ Étterem", hu:"Megdicséred a szakácsot.", en:"Compliments to the chef — the meal was absolutely exquisite.", tip:"Compliments to the chef = üdvözlet a szakácsnak. Exquisite = kivételes, remek." },
        { level:"B2", cat:"🍽️ Étterem", hu:"Megkérdezed, helyben fogták-e a halat.", en:"Is the seafood locally sourced and fresh?", tip:"Locally sourced = helyi forrásból. Seasonal = szezonális. Sustainable = fenntartható." },

        // ══════════════════════════════════════════
        // 🏨 HOTEL — B1 (6) + B2 (6)
        // ══════════════════════════════════════════
        { level:"B1", cat:"🏨 Szálloda", hu:"Megkérdezed, hol van a reggeliző.", en:"Could you tell me where the breakfast room is?", tip:"Could you tell me...? = Meg tudná mondani? Udvariasabb mint 'Where is...?'" },
        { level:"B1", cat:"🏨 Szálloda", hu:"Késői kijelentkezést kérsz.", en:"Is it possible to have a late check-out?", tip:"Late check-out = késői kijelentkezés. Usually costs extra. Check-out time = kijelentkezési idő." },
        { level:"B1", cat:"🏨 Szálloda", hu:"Zajos a szobád, cserét kérsz.", en:"My room is very noisy. Could I possibly change rooms?", tip:"Noisy = zajos. Could I possibly...? = Esetleg lehetséges...? Nagyon udvarias kérés." },
        { level:"B1", cat:"🏨 Szálloda", hu:"Ébresztő hívást kérsz.", en:"I'd like to request a wake-up call at 7 AM, please.", tip:"Wake-up call = ébresztő hívás. Alternatively: set an alarm = állíts be ébresztőt." },
        { level:"B1", cat:"🏨 Szálloda", hu:"Csomagmegőrzést kérsz kijelentkezés után.", en:"Can I leave my luggage here after check-out?", tip:"Luggage storage = csomagmegőrzés. Left luggage = leadott csomag." },
        { level:"B1", cat:"🏨 Szálloda", hu:"Közeli éttermet kérsz ajánlani.", en:"Could you recommend a good restaurant nearby?", tip:"Nearby = a közelben. Within walking distance = gyalog elérhető közelségben." },

        { level:"B2", cat:"🏨 Szálloda", hu:"Késői kijelentkezést szeretnél szervezni.", en:"Would it be possible to arrange a late check-out until 2 PM?", tip:"Arrange = megszervez. Subject to availability = szabad kapacitástól függően." },
        { level:"B2", cat:"🏨 Szálloda", hu:"Zajos a szomszédos szoba, jelzed.", en:"There seems to be considerable noise coming from the adjacent room.", tip:"Adjacent = szomszédos. Considerable = jelentős. Could you look into this? = Meg tudná vizsgálni?" },
        { level:"B2", cat:"🏨 Szálloda", hu:"Eltérést találtál a számlán a minibár kapcsán.", en:"There appears to be a discrepancy on my bill regarding the minibar charges.", tip:"Discrepancy = eltérés. Itemised bill = tételes számla. Dispute = vitatja." },
        { level:"B2", cat:"🏨 Szálloda", hu:"Megkérdezed a reptéri transzfer gyakoriságát.", en:"How frequent is the airport shuttle service?", tip:"Shuttle = transzfer busz. Frequency = gyakoriság. Timetable = menetrend." },
        { level:"B2", cat:"🏨 Szálloda", hu:"Megkérdezed, van-e edzőterem a helyszínen.", en:"Are there any fitness facilities available on-site?", tip:"On-site = helyszínen. Facilities = létesítmények. Pool, gym, sauna = medence, edzőterem, szauna." },
        { level:"B2", cat:"🏨 Szálloda", hu:"A légkondicionáló meghibásodott, jelzed.", en:"The air conditioning appears to be malfunctioning.", tip:"Malfunctioning = meghibásodott. Maintenance = karbantartás. I'd appreciate if someone could look at it." },

        // ══════════════════════════════════════════

        // ══════════════════════════════════════════
        { level:"B1", cat:"🚕 Taxi", hu:"Megkérdezed, mennyi a becsült menetidő.", en:"How long will it take to get there?", tip:"How long will it take? = Mennyi ideig tart? Estimated time = becsült idő." },
        { level:"B1", cat:"🚕 Taxi", hu:"Kéred, hogy kapcsolja be a taxiórát.", en:"Could you put the meter on, please?", tip:"Meter = taxióra. Fixed rate = rögzített díj. No meter? Ask before you get in!" },
        { level:"B1", cat:"🚕 Taxi", hu:"Kéred, hogy lassabban vezessen.", en:"Could you slow down a little, please?", tip:"Slow down = lassít. I'm in no hurry = nem sietem. Safety first = biztonság az első." },
        { level:"B1", cat:"🚕 Taxi", hu:"Megkérdezed, hol vehetsz napi bérletet a metróra.", en:"Where can I buy a day pass for the metro?", tip:"Day pass = napi bérlet. Metro/underground/subway = metró. Ticket office = jegypénztár." },
        { level:"B1", cat:"🚕 Taxi", hu:"Kéred, hogy várjon rád.", en:"Could you wait for me here? I'll be back in ten minutes.", tip:"Wait for me = várj rám. Keep the meter running = hagyd futni az órát." },
        { level:"B1", cat:"🚕 Taxi", hu:"Megkérdezed, melyik busz megy a városközpontba.", en:"Which bus goes to the city centre from here?", tip:"Which bus goes to...? = Melyik busz megy...? Frequency = milyen sűrűn jár?" },

        { level:"B2", cat:"🚕 Taxi", hu:"Vitatod a taxi árát, túl magasnak tartod.", en:"I believe the fare is higher than what was agreed. Could we discuss this?", tip:"Fare = viteldíj. Agreed = megállapodott. Overcharged = túlszámlázott." },
        { level:"B2", cat:"🚕 Taxi", hu:"Előre egyeztetett felvételről kérdezel.", en:"I have a pre-booked pickup arranged for this address.", tip:"Pre-booked = előre foglalt. Pickup = felvétel. Confirmation number = visszaigazolási szám." },
        { level:"B2", cat:"🚕 Taxi", hu:"Kéred, hogy az autópályát kerüljék el.", en:"Could you avoid the motorway? I'd prefer the scenic route.", tip:"Motorway = autópálya. Scenic route = festői útvonal. Toll = útdíj." },
        { level:"B2", cat:"🚕 Taxi", hu:"Tömegközlekedési bérlet érvényességéről kérdezel.", en:"Is this travel card valid for all zones on the network?", tip:"Travel card = bérlet. Zones = zónák. Network = hálózat. Peak hours = csúcsidő." },
        { level:"B2", cat:"🚕 Taxi", hu:"Sofőrrel rendelt transzferről érdeklődsz.", en:"I've arranged a private transfer. Could you confirm the driver's details?", tip:"Private transfer = egyedi transzfer. Driver's details = sofőr adatai. Meet and greet = fogadás." },
        { level:"B2", cat:"🚕 Taxi", hu:"Megkérdezed a kerékpárkölcsönzési lehetőségeket.", en:"Are there any bicycle hire schemes available in the city?", tip:"Hire = bérlés. Scheme = rendszer. Docking station = állomás. Electric bike = elektromos kerékpár." },

        // ══════════════════════════════════════════

    let studentName = "";
    // Read student name from URL ?name=...
    const urlParams = new URLSearchParams(window.location.search);
    studentName = decodeURIComponent(urlParams.get('name') || 'Student');
    let selectedLevel = "ALL";
    let cardList = [];
    let currentIndex = 0;
    let isFlipped = false;

    function selectLevel(lvl) {
        selectedLevel = lvl;
        document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('selected'));
        document.getElementById(`lvl-${lvl}`).classList.add('selected');
    }

    function startApp() {
        
        
        
        

        if (selectedLevel === 'ALL') {
            cardList = [...ALL_CARDS];
        } else {
            cardList = ALL_CARDS.filter(c => c.level === selectedLevel);
        }

        // Shuffle
        for (let i = cardList.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [cardList[i], cardList[j]] = [cardList[j], cardList[i]];
        }

        currentIndex = 0;
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('card-screen').classList.remove('hidden');
        renderCard();
    }

    
    });

    function renderCard() {
        const card = cardList[currentIndex];
        const total = cardList.length;

        document.getElementById('card-counter').innerText = `${currentIndex + 1} / ${total}`;
        document.getElementById('progress-fill').style.width = `${((currentIndex + 1) / total) * 100}%`;
        document.getElementById('cat-label').innerText = card.cat;
        document.getElementById('front-cat').innerText = card.cat;
        document.getElementById('back-cat').innerText = card.cat;
        document.getElementById('card-hu').innerText = card.hu;
        document.getElementById('card-en').innerText = card.en;
        document.getElementById('card-tip').innerText = card.tip;

        // Level badge
        const badgeClass = card.level === 'B1' ? 'b1-badge' : 'b2-badge';
        ['front-level-badge','back-level-badge'].forEach(id => {
            const el = document.getElementById(id);
            el.innerText = card.level;
            el.className = `level-badge ${badgeClass}`;
        });

        isFlipped = false;
        document.getElementById('flip-inner').classList.remove('is-flipped');
    }

    function flipCard() {
        isFlipped = !isFlipped;
        document.getElementById('flip-inner').classList.toggle('is-flipped', isFlipped);
    }

    function nextCard() {
        if (currentIndex < cardList.length - 1) {
            currentIndex++;
            renderCard();
        } else {
            showResult();
        }
    }

    function prevCard() {
        if (currentIndex > 0) {
            currentIndex--;
            renderCard();
        }
    }

    function shuffleCards() {
        for (let i = cardList.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [cardList[i], cardList[j]] = [cardList[j], cardList[i]];
        }
        currentIndex = 0;
        renderCard();
    }

    function showResult() {
        document.getElementById('card-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('display-name').innerText = studentName;
        document.getElementById('seen-count').innerText = currentIndex + 1;
        document.getElementById('result-total').innerText = `/ ${cardList.length} szituáció`;

        const pct = Math.round(((currentIndex + 1) / cardList.length) * 100);
        const msg = pct === 100
            ? "Zseniális! Az összes kártyát átmenté! Magabiztosan kommunikálsz külföldön! ✈️"
            : pct >= 60
            ? "Szép haladás! Folytasd, hamarosan készen leszel az utazásra!"
            : "Jó kezdés! Ismételj még és magabiztos leszel!";
        document.getElementById('feedback-msg').innerText = msg;

        fetch(MAKE_WEBHOOK_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                Student: studentName,
                Quiz: `Traveling Guide ${selectedLevel} Flashcards`,
                Score: currentIndex + 1,
                TotalQuestions: cardList.length,
                Level: selectedLevel,
                Skill: "Speaking",
                Percentage: pct,
                CompletedAt: new Date().toISOString()
            })
        }).catch(e => console.error("Webhook error:", e));
    }

    function restartFromStart() {
        currentIndex = 0;
        document.getElementById('result-screen').classList.add('hidden');
        document.getElementById('card-screen').classList.remove('hidden');
        renderCard();
    }

    function shuffleAndRestart() {
        shuffleCards();
        document.getElementById('result-screen').classList.add('hidden');
        document.getElementById('card-screen').classList.remove('hidden');
    }

    function adminAccess() {
        if (prompt("Jelszó:") === "bettina2026") {
            alert("Az eredmények a Make → Airtable rendszerben mentődnek.");
        }
    }

    // Keyboard navigation
    document.addEventListener('keydown', e => {
        if (document.getElementById('card-screen').classList.contains('hidden')) return;
        if (e.key === 'ArrowRight') nextCard();
        if (e.key === 'ArrowLeft') prevCard();
        if (e.key === ' ') { e.preventDefault(); flipCard(); }
    });
</script>
</body>
</html>
