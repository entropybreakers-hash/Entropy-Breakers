            <div class="flex justify-between items-center text-xs font-black uppercase tracking-widest text-slate-400 mb-3">
                <span>Teljesítmény</span><span id="result-percent-text" class="text-teal-300">0%</span>
            </div>

            { q: "B2 szint: 'Difficult' (fáradságos feladat) leírása:", options: ["Arduous / Demanding", "Hard", "Very tough", "Complex"], correct: 0, exp: "Arduous = rendkívül fáradságos." },
            { q: "B2 szint: 'Danger' (veszélyben) C1 kifejezése:", options: ["Jeopardy / Peril", "Problem", "Bad situation", "Risk"], correct: 0, exp: "In jeopardy = veszélyben van." },
            { q: "B2 szint: 'To reduce' (megnyirbálni/csökkenteni) igéje:", options: ["To curtail / To diminish", "To lower", "To make small", "To cut"], correct: 0, exp: "Curtail és diminish kifinomultabb szavak." },
            { q: "B2 szint: 'To strengthen' (megerősíteni egy érvet) szintemelése:", options: ["To bolster / To reinforce", "To make strong", "To power up", "To build"], correct: 0, exp: "Bolster = megerősít, alátámaszt." },
            { q: "B2 szint: 'Agreement' (konszenzus/egyetértés) szava:", options: ["Consensus", "Deal", "Ok", "Meeting of minds"], correct: 0, exp: "Reach a consensus = konszenzusra jutni." },
            { q: "B2 szint: 'Result' (következmény/hatás) C1 formája:", options: ["Consequence / Implication", "End", "Finish", "After thing"], correct: 0, exp: "Consequence és implication pontosabb, fejlettebb szavak." },
            { q: "B2 szint: 'Help' (segítség/támogatás) formális formája:", options: ["Assistance", "Help", "Give hand", "Support"], correct: 0, exp: "Assistance formális, professzionális szó." },
            { q: "B2 szint: 'Many' (számos) választékos megfelelője:", options: ["Numerous / Countless", "Lots", "A lot", "Plenties"], correct: 0, exp: "Numerous = számos." },
            { q: "B2 szint: 'Big' (jelentős mértékű) akadémiai szava:", options: ["Substantial / Enormous", "Large", "Giant", "Mega"], correct: 0, exp: "Substantial growth = jelentős növekedés." },
            { q: "B2 szint: 'To encourage' (elősegíteni/táplálni) C1 igéje:", options: ["To foster / To stimulate", "To say go", "To help", "To push"], correct: 0, exp: "Foster growth = elősegíteni a fejlődést." },
            { q: "B2 szint: 'Fast' (gyors/hatékony) üzleti szinonimája:", options: ["Rapid / Expeditious", "Quick", "Speedy", "High velocity"], correct: 0, exp: "Rapid change természetesebb, erősebb szerkezet." },
            { q: "B2 szint: 'Maybe' (vélhetően/vitathatóan) érvrendszerben:", options: ["Arguably / Perchance", "Perhaps", "Maybe", "Possibility"], correct: 0, exp: "Arguably egy nagyon erős C1-es vitakifejezés." },
            { q: "B2 szint: 'To explain' (megvilágítani a részleteket) igéje:", options: ["To elucidate", "To say why", "To make clear", "To show"], correct: 0, exp: "Elucidate = részletesen megvilágítani." },
            { q: "B2 szint: 'Necessary' (nélkülözhetetlen) szintemelése:", options: ["Indispensable / Vital", "Needful", "Important", "Required"], correct: 0, exp: "Indispensable = nélkülözhetetlen." },
            { q: "B2 szint: 'Enough' (elegendő) precíz szinonimája:", options: ["Sufficient / Adequate", "Okay", "Full", "Plentiful"], correct: 0, exp: "Sufficient és adequate = elegendő." }
        ]
    };

    let studentName = "";
    const urlParams = new URLSearchParams(window.location.search);
    studentName = decodeURIComponent(urlParams.get('name') || 'Student');
    let currentMode = "FIX";
    let score = 0;
    let currentIndex = 0;
    let activeList = [];
    let answered = false;

    function selectMode(mode) {
        currentMode = mode;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('selected'));
        document.getElementById(`m-${mode}`).classList.add('selected');
    }

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function startTraining() { const urlParams = new URLSearchParams(window.location.search);
    studentName = decodeURIComponent(urlParams.get('name') || 'Student'); document.getElementById('start-screen').classList.add('hidden'); document.getElementById('quiz-ui').classList.remove('hidden'); loadQuestion(); }

    
    });

    function loadQuestion() {
        answered = false;
        const qData = activeList[currentIndex];
        document.getElementById('q-counter').innerText = `${currentIndex + 1} / ${activeList.length}`;
        document.getElementById('progress-fill').style.width = `${(currentIndex / activeList.length) * 100}%`;
        document.getElementById('question-text').innerText = qData.q;
        document.getElementById('explanation-box').classList.add('hidden');

        let optionsWithMeta = qData.options.map((opt, idx) => ({ text: opt, isCorrect: idx === qData.correct }));
        shuffleArray(optionsWithMeta);

        const container = document.getElementById('options-container');
        container.innerHTML = '';
        optionsWithMeta.forEach((opt) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt.text;
            btn.onclick = () => handleAnswer(opt.isCorrect, btn, qData.options[qData.correct]);
            container.appendChild(btn);
        });
    }

    function handleAnswer(isCorrect, clickedBtn, correctText) {
        if (answered) return;
        answered = true;
        const qData = activeList[currentIndex];
        const btns = document.querySelectorAll('.option-btn');
        btns.forEach((btn) => { btn.disabled = true; });

        if (isCorrect) {
            score++;
            clickedBtn.classList.add('correct');
            document.getElementById('answer-status').innerText = "Helyes! ✓";
            document.getElementById('answer-status').className = "text-sm font-black uppercase tracking-widest mb-2 text-emerald-400";
        } else {
            clickedBtn.classList.add('wrong');
            btns.forEach(btn => { if (btn.innerText === correctText) btn.classList.add('correct'); });
            document.getElementById('answer-status').innerText = "C1 Logic Check! ✗";
            document.getElementById('answer-status').className = "text-sm font-black uppercase tracking-widest mb-2 text-rose-400";
        }

        document.getElementById('answer-explanation').innerText = qData.exp;
        document.getElementById('explanation-box').classList.remove('hidden');
    }

    function nextQuestion() {
        currentIndex++;
        if (currentIndex < activeList.length) loadQuestion();
        else finishQuiz();
    }

    async function finishQuiz() {
        document.getElementById('quiz-ui').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('display-name').innerText = studentName;
        document.getElementById('final-score').innerText = score;
        document.getElementById('final-total').innerText = ` / ${activeList.length}`;
        document.getElementById('progress-fill').style.width = '100%';

        const percent = Math.round((score / activeList.length) * 100);
        document.getElementById('result-percent-text').innerText = `${percent}%`;
        document.getElementById('result-progress-fill').style.width = `${percent}%`;
        document.getElementById('feedback-rating').innerText = "⚡ AI elemzés folyamatban...";

        try {
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 30000);

            const response = await fetch(MAKE_WEBHOOK_URL, {
                signal: controller.signal,
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    Student: studentName,
                    Quiz: QUIZ_NAME,
                    Score: score,
                    TotalQuestions: activeList.length,
                    Level: QUIZ_LEVEL,
                    Skill: QUIZ_SKILL,
                    Percentage: percent,
                    Mode: currentMode,
                    CompletedAt: new Date().toISOString()
                })
            });

            clearTimeout(timeout);
            const text = await response.text();
            document.getElementById('feedback-rating').innerText = text || "Szép munka! Folytasd a gyakorlást!";

        } catch (e) {
            console.error("Error:", e);
            document.getElementById('feedback-rating').innerText =
                percent >= 80 ? "Zseniális! Valódi C1 szint!" :
                percent >= 60 ? "Szép munka, de gyakorolj még!" :
                "Ne add fel, próbáld újra!";
        }
    }

    function adminAccess() {
        if (prompt("Jelszó:") === "bettina2026") {
            alert("Az eredmények a Make → Airtable rendszerben mentődnek.");
        }
    }

    function restartQuiz() {
        studentName = ""; currentMode = "FIX"; score = 0; currentIndex = 0; activeList = []; answered = false;
        document.getElementById('student-name').value = "";
        document.getElementById('mode-label').innerText = "-";
        document.getElementById('q-counter').innerText = "1 / 40";
        document.getElementById('progress-fill').style.width = "0%";
        document.getElementById('result-progress-fill').style.width = "0%";
        document.getElementById('result-percent-text').innerText = "0%";
        document.getElementById('final-score').innerText = "0";
        document.getElementById('final-total').innerText = " / 40";
        document.getElementById('feedback-rating').innerText = "-";
        document.getElementById('display-name').innerText = "";
        document.getElementById('question-text').innerText = "-";
        document.getElementById('options-container').innerHTML = "";
        document.getElementById('explanation-box').classList.add('hidden');
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('selected'));
        document.getElementById('m-FIX').classList.add('selected');
        document.getElementById('result-screen').classList.add('hidden');
        document.getElementById('quiz-ui').classList.add('hidden');
        
    }
</script>
