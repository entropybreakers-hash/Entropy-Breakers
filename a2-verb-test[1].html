<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>A2 Verb Test | Entropy Breakers</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;500;600;700;800;900&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:#020F09;color:rgba(255,255,255,0.90);font-family:'Manrope',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px 16px;}
.bg-wrap{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.mesh{position:absolute;inset:0;background:radial-gradient(ellipse 120% 80% at 50% -10%,rgba(6,78,59,0.95) 0%,rgba(4,120,87,0.65) 25%,transparent 60%),radial-gradient(ellipse 80% 60% at 0% 50%,rgba(16,185,129,0.45) 0%,transparent 55%),radial-gradient(ellipse 80% 60% at 100% 50%,rgba(52,211,153,0.35) 0%,transparent 55%),#020F09;}
.light-rays{position:absolute;inset:0;background:conic-gradient(from 270deg at 50% -5%,transparent 0deg,rgba(16,185,129,0.08) 8deg,transparent 16deg,rgba(52,211,153,0.06) 24deg,transparent 40deg,transparent 180deg);mask-image:linear-gradient(to bottom,black 0%,transparent 70%)}
.grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(52,211,153,0.07) 1px,transparent 1px),linear-gradient(90deg,rgba(52,211,153,0.07) 1px,transparent 1px);background-size:48px 48px;mask-image:radial-gradient(ellipse 90% 90% at 50% 30%,black 10%,transparent 80%)}
.floor-glow{position:absolute;bottom:0;left:0;right:0;height:40%;background:radial-gradient(ellipse 80% 60% at 50% 100%,rgba(16,185,129,0.28) 0%,transparent 70%);filter:blur(20px)}
.noise{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
.shell{position:relative;z-index:1;width:100%;max-width:500px}
.eb-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:36px}
.eb-logo{font-family:'Exo 2',sans-serif;font-size:.88rem;font-weight:800;text-transform:uppercase;background:linear-gradient(135deg,#fff 40%,#6EE7B7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.eb-badge{font-family:'Exo 2',sans-serif;font-size:.58rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#10B981;background:rgba(16,185,129,0.10);border:1px solid rgba(16,185,129,0.25);border-radius:100px;padding:5px 14px}
#start-screen{text-align:center}
.start-icon-wrap{position:relative;display:inline-block;margin-bottom:22px}
.start-icon-glow{position:absolute;inset:-10px;border-radius:32px;background:radial-gradient(circle,rgba(16,185,129,0.45) 0%,transparent 70%);filter:blur(14px);z-index:-1}
.start-icon{width:76px;height:76px;border-radius:22px;background:linear-gradient(135deg,rgba(6,95,70,0.8),rgba(16,185,129,0.67));border:1px solid rgba(16,185,129,0.30);display:flex;align-items:center;justify-content:center;font-size:1.9rem;backdrop-filter:blur(12px);box-shadow:0 0 40px rgba(16,185,129,0.45),0 8px 32px rgba(0,0,0,0.4)}
.start-eyebrow{font-size:.6rem;font-weight:700;letter-spacing:.24em;text-transform:uppercase;color:#10B981;opacity:.75;margin-bottom:10px}
.start-title{font-family:'Exo 2',sans-serif;font-size:clamp(1.9rem,8vw,2.8rem);font-weight:900;letter-spacing:-.02em;line-height:1.1;margin-bottom:32px;background:linear-gradient(135deg,#fff 20%,#34D399 65%,#6EE7B7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.name-input{width:100%;padding:15px 20px;background:rgba(255,255,255,0.05);border:1px solid rgba(16,185,129,0.30);border-radius:14px;font-family:'Manrope',sans-serif;font-size:.95rem;font-weight:500;color:#fff;text-align:center;outline:none;transition:all .25s;margin-bottom:12px}
.name-input::placeholder{color:rgba(255,255,255,0.2)}
.name-input:focus{border-color:#10B981;box-shadow:0 0 0 3px rgba(16,185,129,0.10);background:rgba(255,255,255,0.07)}
.cta-btn{width:100%;padding:15px;background:linear-gradient(135deg,#065F46,#10B981);border:none;border-radius:14px;font-family:'Exo 2',sans-serif;font-size:.8rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#fff;cursor:pointer;transition:all .25s;box-shadow:0 0 40px rgba(16,185,129,0.45),0 8px 24px rgba(0,0,0,0.4)}
#test-ui{display:none}
.status-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.cat-tag{font-size:.58rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:#10B981;opacity:.8}
.counter{font-size:.7rem;font-weight:600;color:rgba(255,255,255,0.35)}
.prog-track{height:3px;background:rgba(255,255,255,0.07);border-radius:999px;overflow:hidden;margin-bottom:26px}
.prog-fill{height:100%;width:2%;background:linear-gradient(90deg,#065F46,#10B981,#34D399);border-radius:999px;box-shadow:0 0 10px rgba(16,185,129,0.7);transition:width .55s ease}
.question-card{background:linear-gradient(145deg,rgba(255,255,255,0.07),rgba(255,255,255,0.02));border:1px solid rgba(16,185,129,0.30);border-radius:22px;padding:36px 28px;text-align:center;margin-bottom:20px;backdrop-filter:blur(20px);position:relative;overflow:hidden;box-shadow:0 16px 48px rgba(0,0,0,0.4)}
.question-card::before{content:'';position:absolute;top:0;left:15%;right:15%;height:1px;background:linear-gradient(90deg,transparent,rgba(16,185,129,0.5),transparent)}
.q-label{font-size:.56rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,0.28);margin-bottom:14px}
.hu-word{font-family:'Exo 2',sans-serif;font-size:clamp(2rem,9vw,2.8rem);font-weight:900;color:#fff;margin-bottom:8px}
.q-hint{font-size:.8rem;color:#34D399;font-weight:600;min-height:22px}
.answer-input{width:100%;padding:15px 20px;background:rgba(255,255,255,0.05);border:1px solid rgba(16,185,129,0.30);border-radius:14px;font-family:'Manrope',sans-serif;font-size:1rem;font-weight:600;color:#fff;text-align:center;outline:none;transition:all .25s;margin-bottom:10px}
.answer-input::placeholder{color:rgba(255,255,255,0.2)}
.answer-input:focus{border-color:#10B981;box-shadow:0 0 0 3px rgba(16,185,129,0.10);background:rgba(255,255,255,0.07)}
.answer-input.correct{border-color:#10B981;background:rgba(16,185,129,0.10)}
.answer-input.wrong{border-color:#EF4444;background:rgba(239,68,68,0.08)}
.feedback-msg{font-size:.82rem;font-weight:600;text-align:center;min-height:24px;margin-bottom:12px}
.feedback-msg.correct{color:#34D399}.feedback-msg.wrong{color:#F87171}
.feedback-bad{background:rgba(239,68,68,0.12);color:#fecaca;border:1px solid rgba(239,68,68,0.25);border-radius:16px;padding:20px;font-weight:700;font-size:.9rem;text-align:center;margin-top:8px}
.feedback-good{background:rgba(34,197,94,0.12);color:#bbf7d0;border:1px solid rgba(34,197,94,0.25);border-radius:16px;padding:20px;font-weight:700;font-size:.9rem;text-align:center;margin-top:8px}
.btn-row{display:flex;flex-direction:column;gap:10px}
.btn-ghost{padding:14px;background:rgba(255,255,255,0.04);border:1px solid rgba(16,185,129,0.30);border-radius:14px;font-family:'Manrope',sans-serif;font-size:.74rem;font-weight:600;color:rgba(255,255,255,0.45);cursor:pointer;transition:all .2s}
.btn-ghost:hover{border-color:#10B981;color:#34D399}
.btn-main{padding:14px;background:linear-gradient(135deg,#065F46,#10B981);border:none;border-radius:14px;font-family:'Exo 2',sans-serif;font-size:.74rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#fff;cursor:pointer;box-shadow:0 0 24px rgba(16,185,129,0.45)}
#result-screen{display:none;text-align:center}
.result-icon{width:80px;height:80px;border-radius:22px;margin:0 auto 20px;background:linear-gradient(135deg,rgba(6,95,70,0.8),rgba(16,185,129,0.67));border:1px solid rgba(16,185,129,0.30);display:flex;align-items:center;justify-content:center;font-size:2rem;box-shadow:0 0 40px rgba(16,185,129,0.45)}
.result-title{font-family:'Exo 2',sans-serif;font-size:2.2rem;font-weight:900;margin-bottom:6px;background:linear-gradient(135deg,#fff 30%,#34D399 70%,#6EE7B7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.result-sub{font-size:.82rem;color:rgba(255,255,255,0.38);margin-bottom:24px}
.result-sub strong{color:#34D399;font-weight:700}
.result-panel{background:rgba(255,255,255,0.04);border:1px solid rgba(16,185,129,0.30);border-radius:20px;padding:28px;margin-bottom:14px;backdrop-filter:blur(20px);position:relative;overflow:hidden}
.result-panel::before{content:'';position:absolute;top:0;left:15%;right:15%;height:1px;background:linear-gradient(90deg,transparent,#10B981,transparent)}
.res-eyebrow{font-size:.56rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,0.25);margin-bottom:10px}
.res-score{font-family:'Exo 2',sans-serif;font-size:4.5rem;font-weight:900;color:#fff;line-height:1;margin-bottom:4px}
.res-denom{font-size:.74rem;color:rgba(255,255,255,0.3);margin-bottom:14px}
.res-msg{font-size:.78rem;color:rgba(255,255,255,0.38);font-style:italic}
.wrong-section{margin-top:16px;text-align:left;display:none}
.wrong-title{font-size:.56rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,0.25);margin-bottom:10px}
.wrong-item{font-size:.76rem;color:rgba(255,255,255,0.5);padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
.wrong-item strong{color:#F87171}
.hidden{display:none!important}

</style>
<script>if(new URLSearchParams(location.search).get('name')){document.documentElement.classList.add('eb-autostart');}</script><style>.eb-autostart #start-screen,.eb-autostart #s-start{display:none!important}</style>
</head>
<body>
<div class="bg-wrap"><div class="mesh"></div><div class="light-rays"></div><div class="grid-bg"></div><div class="floor-glow"></div></div>
<div class="noise"></div>
<div class="shell">

  <div class="eb-header">
    <div class="eb-logo">&#9889; Entropy Breakers</div>
    <div class="eb-badge">A2 &middot; Verbs</div>
  </div>

  <div id="start-screen">
    <div class="start-icon-wrap">
      <div class="start-icon-glow"></div>
      <div class="start-icon">&#9997;</div>
    </div>
    <div class="start-eyebrow">Verb Test</div>
    <h1 class="start-title">A2 Verb Test</h1>
    <input type="text" id="student-name" class="name-input" placeholder="Enter your name..." autocomplete="off">
    <button class="cta-btn" onclick="startApp()">Start Test &#8594;</button>
  </div>

  <div id="test-ui">
    <div class="status-row">
      <span class="cat-tag">A2 Verbs</span>
      <span class="counter" id="q-counter">1 / 47</span>
    </div>
    <div class="prog-track"><div id="prog-fill" class="prog-fill"></div></div>
    <div class="question-card">
      <div class="q-label">Translate to English</div>
      <div id="hu-word" class="hu-word">&#8212;</div>
      <div id="q-hint" class="q-hint"></div>
    </div>
    <input type="text" id="en-input" class="answer-input" placeholder="Type the English verb..." autocomplete="off">
    <div id="feedback-msg" class="feedback-msg"></div>
    <div id="instant-feedback" class="hidden feedback-bad" style="display:none"></div>
    <div class="btn-row">
      <button class="btn-ghost" id="reveal-btn" onclick="revealAnswer()">&#128161; Reveal</button>
      <button class="btn-main" id="next-btn" onclick="handleSubmit()">Check &#8594;</button>
    </div>
  </div>

  <div id="result-screen">
    <div class="result-icon">&#9997;</div>
    <h2 class="result-title">Test Complete!</h2>
    <p class="result-sub">Well done, <strong id="r-name"></strong></p>
    <div class="result-panel">
      <div class="res-eyebrow">Your Score</div>
      <div class="res-score" id="r-score">0</div>
      <div class="res-denom" id="r-denom">/ 47 correct</div>
      <div class="res-msg" id="r-msg"></div>
      <div id="ai-feedback" style="margin-top:16px;padding:14px 16px;background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.25);border-radius:14px;font-size:.82rem;color:#6EE7B7;font-style:italic;min-height:44px;text-align:center">⚡ AI elemzés folyamatban...</div>
      <div class="wrong-section" id="wrong-section">
        <div class="wrong-title">Review these:</div>
        <div id="wrong-list"></div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn-ghost" onclick="restartQuiz()">&#8635; Restart</button>
      <button class="btn-main" onclick="restartQuiz()">&#8635; Try Again</button>
    </div>
  </div>

</div>
<script>
const MAKE_WEBHOOK = "https://hook.eu1.make.com/ww4obw8ghb8h46ti1gi6yoy2qg1db7ad";
const VERBS = [
    {en:"Ask",hu:"K\u00e9rdez"},{en:"Answer",hu:"V\u00e1laszol"},{en:"Clean",hu:"Takar\u00edt"},
    {en:"Cook",hu:"F\u0151z"},{en:"Dance",hu:"T\u00e1ncol"},{en:"Drink",hu:"Iszik"},
    {en:"Eat",hu:"Eszik"},{en:"Help",hu:"Seg\u00edt"},{en:"Jump",hu:"Ugrik"},
    {en:"Listen",hu:"Hallgat"},{en:"Look",hu:"N\u00e9z"},{en:"Play",hu:"J\u00e1tszik"},
    {en:"Read",hu:"Olvas"},{en:"Run",hu:"Fut"},{en:"Sing",hu:"\u00c9nekel"},
    {en:"Sleep",hu:"Alszik"},{en:"Smile",hu:"Mosolyog"},{en:"Speak",hu:"Besz\u00e9l"},
    {en:"Swim",hu:"\u00daszik"},{en:"Talk",hu:"Besz\u00e9lget"},{en:"Walk",hu:"S\u00e9t\u00e1l"},
    {en:"Wash",hu:"Mos"},{en:"Watch",hu:"N\u00e9z (TV)"},{en:"Write",hu:"\u00cdr"},
    {en:"Open",hu:"Kinyit"},{en:"Close",hu:"Bez\u00e1r"},{en:"Call",hu:"H\u00edv"},
    {en:"Check",hu:"Ellen\u0151riz"},{en:"Count",hu:"Sz\u00e1mol"},{en:"Dream",hu:"\u00c1lmodik"},
    {en:"Find",hu:"Tal\u00e1l"},{en:"Give",hu:"Ad"},{en:"Go",hu:"Megy"},
    {en:"Know",hu:"Tud / Ismer"},{en:"Like",hu:"Szeret"},{en:"Live",hu:"\u00c9l / Lakik"},
    {en:"Love",hu:"Szeret nagyon"},{en:"Make",hu:"Csin\u00e1l"},{en:"Need",hu:"Sz\u00fcks\u00e9ge van"},
    {en:"Say",hu:"Mond"},{en:"See",hu:"L\u00e1t"},{en:"Show",hu:"Megmutat"},
    {en:"Think",hu:"Gondol"},{en:"Try",hu:"Megpr\u00f3b\u00e1l"},{en:"Use",hu:"Haszn\u00e1l"},
    {en:"Want",hu:"Akar"},{en:"Work",hu:"Dolgozik"}
];
let studentName="", qIdx=0, score=0, wrongAnswers=[], revealed=false, answered=false;

function startApp(){
    var input=document.getElementById('student-name');
    var name=(window.__eb_student_name||input.value.trim());
    if(name.length<2){input.style.borderColor='#10B981';input.focus();return;}
    studentName=name;
    document.getElementById('start-screen').classList.add('hidden');
    document.getElementById('test-ui').style.display='block';
    loadWord();
}
function loadWord(){
    if(qIdx>=VERBS.length){showResult();return;}
    var tot=VERBS.length;
    document.getElementById('q-counter').innerText=(qIdx+1)+' / '+tot;
    document.getElementById('prog-fill').style.width=(((qIdx+1)/tot)*100)+'%';
    document.getElementById('hu-word').innerText=VERBS[qIdx].hu;
    document.getElementById('q-hint').innerText='';
    document.getElementById('en-input').value='';
    document.getElementById('en-input').className='answer-input';
    document.getElementById('feedback-msg').innerText='';
    document.getElementById('feedback-msg').className='feedback-msg';
    document.getElementById('feedback-msg').style.cssText='';
    var inf=document.getElementById('instant-feedback');
    inf.style.display='none';inf.innerText='';inf.className='feedback-bad';
    document.getElementById('reveal-btn').style.display='';
    document.getElementById('next-btn').innerText='Check \u2192';
    revealed=false;
    answered=false;
    setTimeout(function(){document.getElementById('en-input').focus();},50);
}
function norm(s){return s.trim().toLowerCase().replace(/[^a-z\s\/]/g,'').replace(/\s+/,' ').trim();}
function handleSubmit(){
    if(answered){qIdx++;loadWord();return;}
    var input=document.getElementById('en-input');
    var ans=norm(input.value);
    var correct=norm(VERBS[qIdx].en);
    var feedback=document.getElementById('instant-feedback');
    var isOk=(ans===correct||ans===correct.replace(' (tv)','').trim());
    if(isOk){
        score++;
        input.className='answer-input correct';
        feedback.innerText='Excellent! ✓';
        feedback.className='feedback-good';
    }else{
        if(!revealed)wrongAnswers.push({hu:VERBS[qIdx].hu,correct:VERBS[qIdx].en});
        input.className='answer-input wrong';
        feedback.innerText='Sajnos nem. A helyes: '+VERBS[qIdx].en;
        feedback.className='feedback-bad';
    }
    feedback.style.display='';
    answered=true;
    document.getElementById('next-btn').innerText='Next \u2192';
    document.getElementById('reveal-btn').style.display='none';
}
function revealAnswer(){
    revealed=true;
    var feedback=document.getElementById('instant-feedback');
    feedback.innerText='→ '+VERBS[qIdx].en;
    feedback.className='feedback-bad';
    feedback.style.display='';
    document.getElementById('reveal-btn').style.display='none';
}
async function showResult(){
    document.getElementById('test-ui').style.display='none';
    document.getElementById('result-screen').style.display='block';
    var tot=VERBS.length,pct=Math.round((score/tot)*100);
    document.getElementById('r-name').innerText=studentName;
    document.getElementById('r-score').innerText=score;
    document.getElementById('r-denom').innerText='/ '+tot+' correct';
    document.getElementById('r-msg').innerText=pct>=90?'Outstanding! Perfect! \ud83c\udfc6':pct>=70?'Great work! \ud83d\udcaa':pct>=50?'Good effort! Try again. \ud83d\udcc8':'Keep practicing! \ud83d\ude80';
    if(wrongAnswers.length>0){
        document.getElementById('wrong-section').style.display='block';
        document.getElementById('wrong-list').innerHTML=wrongAnswers.map(function(w){return '<div class="wrong-item"><strong>'+w.hu+'</strong> \u2192 '+w.correct+'</div>';}).join('');
    }
    document.getElementById('ai-feedback').innerText='\u26a1 AI elem\u00e9zes folyamatban...';
    try {
        var response = await fetch(MAKE_WEBHOOK,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({Student:studentName,Quiz:'A2 Verb Test',Score:score,TotalQuestions:tot,Level:'A2',Skill:'Verbs',Percentage:pct,CompletedAt:new Date().toISOString()})});
        var text = await response.text();
        document.getElementById('ai-feedback').innerText = text || (pct>=80?'Szuper! Magabiztos A2 tud\u00e1s! \u2728':pct>=60?'Well done! M\u00e9g egy kis gyakorl\u00e1ssal t\u00f6k\u00e9letes leszel!':'Ne add fel \u2014 minden hib\u00e1b\u00f3l tanulsz!');
    } catch(e) {
        document.getElementById('ai-feedback').innerText = pct>=80?'Szuper! Magabiztos A2 tud\u00e1s! \u2728':pct>=60?'Well done! M\u00e9g egy kis gyakorl\u00e1ssal t\u00f6k\u00e9letes leszel!':'Ne add fel \u2014 minden hib\u00e1b\u00f3l tanulsz!';
    }
}
function restartQuiz(){qIdx=0;score=0;wrongAnswers=[];document.getElementById('result-screen').style.display='none';document.getElementById('test-ui').style.display='block';loadWord();}
document.addEventListener('keydown',function(e){if(document.getElementById('test-ui').style.display==='none')return;if(e.key==='Enter')handleSubmit();});
</script>
<script>
(function(){
    var p=new URLSearchParams(window.location.search);
    var n=p.get('name');
    if(!n||n.length<1)return;
    var name=decodeURIComponent(n);
    window.__eb_student_name=name;
    function doStart(){
        var el=document.getElementById('student-name');
        if(el)el.value=name;
        try{studentName=name;}catch(e){}
        var ss=document.getElementById('start-screen');
        if(ss)ss.classList.add('hidden');
        if(typeof startApp==='function')try{startApp();}catch(e){}
    }
    if(document.readyState==='complete')setTimeout(doStart,100);
    else window.addEventListener('load',function(){setTimeout(doStart,100);});
})();

</script>
</body>
</html>
