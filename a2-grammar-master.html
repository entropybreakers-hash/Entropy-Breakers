        { q: "__________ Nile is the longest river in Africa.", options: ["The", "A", "An", "-"], correct: 0, exp: "Határozott névelő: Egyedi földrajzi nevek (folyók, hegyek) előtt 'the'." },
        // ── PREPOSITIONS ──
        { q: "My birthday is __________ July.", options: ["in", "on", "at", "by"], correct: 0, exp: "Időelöljárók: Hónapok és évek előtt 'in'." },
        { q: "The meeting starts __________ 10 o'clock.", options: ["at", "in", "on", "by"], correct: 0, exp: "Időelöljárók: Pontos időpont előtt 'at'." },
        { q: "She was born __________ 5th March.", options: ["on", "in", "at", "by"], correct: 0, exp: "Időelöljárók: Dátumok előtt 'on'." },
        { q: "The keys are __________ the table.", options: ["on", "in", "at", "by"], correct: 0, exp: "Helyhatározós elöljáró: 'on' = valami felszínén." },
        { q: "He lives __________ a small flat __________ the city centre.", options: ["in / in", "at / in", "on / at", "in / on"], correct: 0, exp: "In: Elzárt terekben (lakás, város) egyaránt 'in'-t használunk." },
        // ── QUANTIFIERS ──
        { q: "There isn't __________ sugar in the bowl.", options: ["any", "some", "a", "many"], correct: 0, exp: "Any: Tagadó mondatokban megszámlálhatatlan főnevekkel." },
        { q: "Would you like __________ coffee?", options: ["some", "any", "a", "many"], correct: 0, exp: "Some: Kínálatnál és kérésnél igenlő választ várunk." },
        { q: "How __________ students are in your class?", options: ["many", "much", "any", "some"], correct: 0, exp: "Many: Megszámlálható főnevekkel kérdő mondatban." },
        { q: "I only have __________ money left.", options: ["a little", "a few", "many", "any"], correct: 0, exp: "A little: Kis mennyiség megszámlálhatatlan főnévnél (pozitív értelemben)." },
        { q: "She has __________ friends in this city — maybe three or four.", options: ["a few", "a little", "much", "any"], correct: 0, exp: "A few: Kis mennyiség megszámlálható főnévnél (pozitív értelemben)." },
        // ── COMPARATIVES & SUPERLATIVES ──
        { q: "This test is __________ than the last one.", options: ["more difficult", "difficulter", "most difficult", "difficult"], correct: 0, exp: "Comparative: Hosszú mellékneveknél 'more + melléknév' alakot használunk." },
        { q: "She is the __________ student in the class.", options: ["best", "good", "better", "more good"], correct: 0, exp: "Superlative: A 'good' rendhagyó felsőfoka 'the best'." },
        { q: "My bag is __________ than yours.", options: ["heavier", "more heavy", "heaviest", "heavy"], correct: 0, exp: "Comparative: -y végű mellékneveknél az -y helyett -ier ragot kapunk." },
        { q: "This is __________ pizza I've ever eaten!", options: ["the most delicious", "more delicious", "the deliciouser", "most delicious"], correct: 0, exp: "Superlative: 'the most + melléknév' + 'I've ever' + Past Participle." },
        // ── MODAL VERBS ──
        { q: "You __________ wear a seatbelt. It's the law.", options: ["must", "can", "might", "should"], correct: 0, exp: "Must: Kötelezettség kifejezése (külső vagy belső kényszer)." },
        { q: "__________ I borrow your pen, please?", options: ["Can", "Must", "Will", "Should"], correct: 0, exp: "Can: Engedélykérés informális helyzetben." },
        { q: "You __________ smoke in the restaurant — it's not allowed.", options: ["can't", "don't have to", "mustn't", "shouldn't"], correct: 0, exp: "Mustn't / Can't: Tilalom (nem szabad)." },
        { q: "You __________ come if you're busy — it's optional.", options: ["don't have to", "mustn't", "can't", "shouldn't"], correct: 0, exp: "Don't have to: Nincs szükség rá, de nincs tiltva (nem kötelező)." },
        { q: "You __________ eat more vegetables — it's good for you.", options: ["should", "must", "can", "would"], correct: 0, exp: "Should: Javaslat vagy tanács (nem kötelezettség)." },

        { q: "That bag is not mine. Is it __________?", options: ["yours", "your", "you", "you're"], correct: 0, exp: "Yours: Önálló birtokos névmás — főnév nélkül áll." },
        { q: "I hurt __________ arm when I fell.", options: ["my", "me", "mine", "I"], correct: 0, exp: "My: Jelzői (attributive) birtokos melléknév — főnév előtt áll." },
        { q: "Can you help __________? I can't open this jar.", options: ["me", "I", "my", "mine"], correct: 0, exp: "Me: Tárgyes névmás — ige után tárgyesetben áll." },
        // ── CONJUNCTIONS & LINKING ──
        { q: "I wanted to go out, __________ it was raining heavily.", options: ["but", "and", "so", "because"], correct: 0, exp: "But: Ellentétes összekötő szó két tagmondat között." },
        { q: "She studied hard __________ she passed the exam.", options: ["so", "but", "although", "however"], correct: 0, exp: "So: Következményt fejez ki (tehát, ezért)." },
        { q: "I didn't go to the party __________ I was tired.", options: ["because", "so", "but", "and"], correct: 0, exp: "Because: Okot, magyarázatot vezet be." },
        { q: "He is tall __________ his brother is short.", options: ["but", "so", "because", "although"], correct: 0, exp: "But: Ellentétet fejez ki két mondat között." },
        // ── ADJECTIVE ORDER & USAGE ──
        { q: "She wore a __________ dress to the party.", options: ["beautiful red", "red beautiful", "beautifully red", "red beauty"], correct: 0, exp: "Melléknévsorend: Vélemény (beautiful) megelőzi a színt (red)." },
        { q: "The weather was __________ yesterday.", options: ["terrible", "terribly", "more terrible", "terriblest"], correct: 0, exp: "Melléknév: A 'was' (to be) után melléknév áll, nem határozószó." },
        // ── QUESTION WORDS ──
        { q: "__________ did you buy that jacket? — At the market.", options: ["Where", "When", "What", "Who"], correct: 0, exp: "Where: Helyre vonatkozó kérdőszó." },
        { q: "__________ does it take to get to school? — About 20 minutes.", options: ["How long", "How much", "How many", "How far"], correct: 0, exp: "How long: Időtartam megkérdezésére." }
    ];

    let currentQuestion = 0;
    let score = 0;
    let studentName = "";
    let answered = false;

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function checkName() {
        const input = document.getElementById('student-name');
        const name = input.value.trim();
        if (name.length < 3) { alert("Kérlek írj be legalább 3 karaktert a névhez."); input.focus(); return; }
        studentName = name;
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('quiz-ui').classList.remove('hidden');
        loadQuestion();
    }

    document.getElementById('student-name').addEventListener('keypress', e => {
        if (e.key === 'Enter') checkName();
    });

    function loadQuestion() {
        answered = false;
        const q = quizData[currentQuestion];
        document.getElementById('q-counter').innerText = `${currentQuestion + 1} / ${quizData.length}`;
        document.getElementById('progress-fill').style.width = `${(currentQuestion / quizData.length) * 100}%`;
        document.getElementById('question-text').innerText = q.q;
        document.getElementById('explanation-box').classList.add('hidden');

        let optionsWithMeta = q.options.map((opt, idx) => ({ text: opt, isCorrect: idx === q.correct }));
        shuffleArray(optionsWithMeta);

        const container = document.getElementById('options-container');
        container.innerHTML = '';
        optionsWithMeta.forEach((opt) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn animate-slide';
            btn.innerText = opt.text;
            btn.onclick = () => handleAnswer(opt.isCorrect, btn);
            container.appendChild(btn);
        });
    }

    function handleAnswer(isCorrect, clickedBtn) {
        if (answered) return;
        answered = true;
        const q = quizData[currentQuestion];
        const btns = document.querySelectorAll('.option-btn');
        btns.forEach((btn) => { btn.disabled = true; });

        if (isCorrect) {
            score++;
            clickedBtn.classList.add('correct');
            document.getElementById('answer-status').innerText = "Helyes! ✓";
            document.getElementById('answer-status').className = "text-sm font-black uppercase tracking-widest mb-2 text-emerald-400";
        } else {
            clickedBtn.classList.add('wrong');
            btns.forEach(btn => { if (btn.innerText === q.options[q.correct]) btn.classList.add('correct'); });
            document.getElementById('answer-status').innerText = "Helytelen. ✗";
            document.getElementById('answer-status').className = "text-sm font-black uppercase tracking-widest mb-2 text-rose-400";
        }

        document.getElementById('live-score').innerText = score;
        document.getElementById('answer-explanation').innerText = q.exp;
        document.getElementById('explanation-box').classList.remove('hidden');
    }

    function nextQuestion() {
        currentQuestion++;
        if (currentQuestion < quizData.length) loadQuestion();
        else finishQuiz();
    }

    async function finishQuiz() {
        document.getElementById('quiz-ui').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('display-name').innerText = studentName;
        document.getElementById('final-score').innerText = score;
        document.getElementById('progress-fill').style.width = '100%';

        const percent = Math.round((score / quizData.length) * 100);
        document.getElementById('result-percent-text').innerText = `${percent}%`;
        document.getElementById('result-progress-fill').style.width = `${percent}%`;
        document.getElementById('feedback-rating').innerText = "⚡ AI elemzés folyamatban...";

        try {
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 30000);

            const response = await fetch(MAKE_WEBHOOK_URL, {
                signal: controller.signal,
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    Student: studentName,
                    Quiz: QUIZ_NAME,
                    Score: score,
                    TotalQuestions: quizData.length,
                    Level: QUIZ_LEVEL,
                    Skill: QUIZ_SKILL,
                    Percentage: percent,
                    CompletedAt: new Date().toISOString()
                })
            });

            clearTimeout(timeout);
            const text = await response.text();
            document.getElementById('feedback-rating').innerText = text || "Szép munka! Folytasd a gyakorlást!";

        } catch (e) {
            console.error("Error:", e);
            document.getElementById('feedback-rating').innerText =
                percent >= 80 ? "Fantasztikus! Készen állsz a B1 szintre!" :
                percent >= 60 ? "Szép munka! Még egy kis gyakorlással tökéletes leszel!" :
                "Ne add fel — minden hibából tanulsz!";
        }
    }

    function adminAccess() {
        if (prompt("Jelszó:") === "bettina2026") {
            alert("Az eredmények a Make → Airtable rendszerben mentődnek.");
        }
    }

    function restartQuiz() {
        studentName = ""; score = 0; currentQuestion = 0; answered = false;
        document.getElementById('student-name').value = "";
        document.getElementById('live-score').innerText = "0";
        document.getElementById('q-counter').innerText = `1 / ${quizData.length}`;
        document.getElementById('progress-fill').style.width = "0%";
        document.getElementById('result-progress-fill').style.width = "0%";
        document.getElementById('result-percent-text').innerText = "0%";
        document.getElementById('final-score').innerText = "0";
        document.getElementById('feedback-rating').innerText = "-";
        document.getElementById('display-name').innerText = "";
        document.getElementById('question-text').innerText = "-";
        document.getElementById('options-container').innerHTML = "";
        document.getElementById('explanation-box').classList.add('hidden');
        document.getElementById('result-screen').classList.add('hidden');
        document.getElementById('quiz-ui').classList.add('hidden');
        document.getElementById('start-screen').classList.remove('hidden');
    }
</script>


<script>
// ═══ ENTROPY BREAKERS — DEFINITIVE AUTO-START ═══
(function() {
  var p = new URLSearchParams(window.location.search);
  var n = p.get('name');
  if (!n || n.length < 1) return;
  var name = decodeURIComponent(n);
  window.__eb_student_name = name;

  function doStart() {
    // 1. Fill all possible name inputs
    var inputIds = ['student-name','name-input','nameInput','studentName','player-name'];
    for (var i = 0; i < inputIds.length; i++) {
      var el = document.getElementById(inputIds[i]);
      if (el) el.value = name;
    }

    // 2. Set global studentName variable if it exists
    try { if (typeof studentName !== 'undefined') studentName = name; } catch(e) {}
    try { if (typeof window.studentName !== 'undefined') window.studentName = name; } catch(e) {}

    // 3. Hide start screen
    var startEl = document.getElementById('start-screen');
    if (startEl) startEl.classList.add('hidden');

    // 4. Call whichever start function exists
    var fns = ['startApp','checkName','startQuiz','startTest','start','startTraining','startPlatform'];
    for (var j = 0; j < fns.length; j++) {
      if (typeof window[fns[j]] === 'function') {
        try { window[fns[j]](); } catch(e) {}
        break;
      }
    }
  }

  // Run after full page load
  if (document.readyState === 'complete') {
    setTimeout(doStart, 100);
  } else {
    window.addEventListener('load', function() { setTimeout(doStart, 100); });
  }
})();
</script>
