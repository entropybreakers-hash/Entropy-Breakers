<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prepositions Quiz | Entropy Breakers Academy</title>
    <style>
        :root {
            --primary-blue: #003366; /* Matching PPT Theme */
            --accent-blue: #00509d;
            --light-bg: #f8f9fa;
            --white: #ffffff;
            --correct: #28a745;
            --wrong: #dc3545;
        }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--light-bg); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        header { background: var(--primary-blue); color: white; width: 100%; padding: 25px 0; text-align: center; border-bottom: 5px solid var(--accent-blue); }
        .academy-tag { font-size: 0.9rem; letter-spacing: 3px; text-transform: uppercase; opacity: 0.9; }
        .container { max-width: 700px; width: 90%; background: var(--white); margin: 40px 0; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .progress-bar { height: 10px; background: #eee; border-radius: 5px; margin-bottom: 20px; overflow: hidden; }
        #progress-fill { height: 100%; background: var(--accent-blue); width: 0%; transition: 0.3s; }
        .question-text { font-size: 1.5rem; color: var(--primary-blue); margin-bottom: 25px; font-weight: bold; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        button { padding: 15px; font-size: 1rem; border: 2px solid var(--primary-blue); background: none; color: var(--primary-blue); border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        button:hover { background: var(--primary-blue); color: white; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .reveal-section { margin-top: 25px; border-top: 1px solid #eee; padding-top: 20px; text-align: center; }
        .reveal-btn { background: #6c757d; color: white; border: none; padding: 10px 20px; border-radius: 5px; }
        #solution-text { display: none; margin-top: 15px; padding: 15px; background: #eef7ff; border-radius: 8px; color: #004085; font-style: italic; border-left: 4px solid var(--accent-blue); }
        #next-btn { display: none; width: 100%; margin-top: 20px; background: var(--correct); color: white; border: none; }
        .score-box { text-align: center; }
        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <div class="academy-tag">Entropy Breakers Academy</div>
    <h1>Prepositions Practice</h1>
</header>

<div class="container" id="quiz-app">
    <div class="progress-bar"><div id="progress-fill"></div></div>
    <p id="stats">Question 1 of 50 | Score: 0</p>
    
    <div class="question-text" id="q-text">Loading...</div>
    
    <div class="options" id="opt-container"></div>

    <div class="reveal-section">
        <button class="reveal-btn" id="rev-btn" onclick="toggleReveal()">Reveal Solution</button>
        <div id="solution-text"></div>
    </div>

    <button id="next-btn" onclick="handleNext()">Next Question →</button>
</div>

<div class="container hidden" id="result-screen">
    <div class="score-box">
        <h2>Practice Complete!</h2>
        <p style="font-size: 3rem; color: var(--primary-blue);" id="final-score">0/50</p>
        <button onclick="location.reload()">Try Again</button>
    </div>
</div>

<script>
    const questions = [
        [span_2](start_span){ q: "I usually wake up ___ 7 o'clock.", a: "at", s: "AT is used for exact times[span_2](end_span)." },
        [span_3](start_span){ q: "My birthday is ___ March.", a: "in", s: "IN is used for months[span_3](end_span)." },
        [span_4](start_span){ q: "She was born ___ 15th August.", a: "on", s: "ON is used for specific dates[span_4](end_span)." },
        [span_5](start_span){ q: "We always go to the beach ___ summer.", a: "in", s: "IN is used for seasons[span_5](end_span)." },
        [span_6](start_span)[span_7](start_span){ q: "The meeting is ___ Monday morning.", a: "on", s: "ON is used for days[span_6](end_span)[span_7](end_span)." },
        [span_8](start_span)[span_9](start_span){ q: "He arrived ___ midnight.", a: "at", s: "AT is used for exact points like midnight[span_8](end_span)[span_9](end_span)." },
        [span_10](start_span)[span_11](start_span){ q: "I'll meet you ___ the station.", a: "at", s: "AT is used for points and specific buildings[span_10](end_span)[span_11](end_span)." },
        [span_12](start_span)[span_13](start_span){ q: "There's a cat ___ the roof.", a: "on", s: "ON is used for surfaces[span_12](end_span)[span_13](end_span)." },
        [span_14](start_span){ q: "I live ___ Hungary.", a: "in", s: "IN is used for countries[span_14](end_span)." },
        [span_15](start_span){ q: "The keys are ___ the box.", a: "in", s: "IN is used for enclosed spaces[span_15](end_span)." },
        [span_16](start_span)[span_17](start_span){ q: "She lives ___ London Street.", a: "on", s: "ON is used for streets[span_16](end_span)[span_17](end_span)." },
        [span_18](start_span){ q: "A bridge ___ the lake.", a: "over", s: "OVER is used for across or above[span_18](end_span)." },
        [span_19](start_span){ q: "The shoes are ___ the bed.", a: "under", s: "UNDER is used for directly below[span_19](end_span)." },
        [span_20](start_span){ q: "Sit ___ me.", a: "next to", s: "NEXT TO means beside[span_20](end_span)." },
        [span_21](start_span){ q: "I see you ___ the morning.", a: "in", s: "IN is used for parts of the day[span_21](end_span)." },
        [span_22](start_span){ q: "He is ___ the car.", a: "in", s: "IN is used for enclosed spaces[span_22](end_span)." },
        [span_23](start_span){ q: "The book is ___ the table.", a: "on", s: "ON is used for surfaces[span_23](end_span)." },
        [span_24](start_span){ q: "We met ___ Christmas.", a: "at", s: "AT is used for specific holidays[span_24](end_span)." },
        [span_25](start_span){ q: "I am ___ home.", a: "at", s: "AT is used for specific points[span_25](end_span)." },
        [span_26](start_span){ q: "The shop is ___ the bank.", a: "next to", s: "NEXT TO means beside[span_26](end_span)." },
        [span_27](start_span){ q: "The plane flies ___ the city.", a: "over", s: "OVER means above[span_27](end_span)." },
        [span_28](start_span){ q: "The 21st century started ___ 2001.", a: "in", s: "IN is used for years[span_28](end_span)." },
        [span_29](start_span){ q: "I was born ___ 1995.", a: "in", s: "IN is used for years[span_29](end_span)." },
        [span_30](start_span){ q: "The party is ___ Saturday.", a: "on", s: "ON is used for days[span_30](end_span)." },
        [span_31](start_span){ q: "He arrived ___ noon.", a: "at", s: "AT is used for exact times[span_31](end_span)." },
        [span_32](start_span){ q: "The cat is hiding ___ the chair.", a: "under", s: "UNDER means directly below[span_32](end_span)." },
        [span_33](start_span){ q: "There's a fly ___ the wall.", a: "on", s: "ON is used for surfaces[span_33](end_span)." },
        [span_34](start_span){ q: "We are ___ France.", a: "in", s: "IN is used for countries[span_34](end_span)." },
        [span_35](start_span){ q: "Wait ___ the door.", a: "at", s: "AT is used for specific points[span_35](end_span)." },
        [span_36](start_span){ q: "I'll see you ___ 10 minutes.", a: "in", s: "IN can express time duration[span_36](end_span)." },
        [span_37](start_span){ q: "I work ___ the top floor.", a: "on", s: "ON is used for floors[span_37](end_span)." },
        [span_38](start_span){ q: "The bus is ___ the station.", a: "at", s: "AT is used for buildings/points[span_38](end_span)." },
        [span_39](start_span){ q: "The paper is ___ the floor.", a: "on", s: "ON is used for surfaces[span_39](end_span)." },
        [span_40](start_span){ q: "A bridge ___ the river.", a: "over", s: "OVER means across[span_40](end_span)." },
        [span_41](start_span){ q: "He works ___ London.", a: "in", s: "IN is used for cities[span_41](end_span)." },
        [span_42](start_span){ q: "My house is ___ 10 Baker Street.", a: "at", s: "AT is used for specific addresses[span_42](end_span)." },
        [span_43](start_span){ q: "The meeting is ___ 3pm.", a: "at", s: "AT is used for exact times[span_43](end_span)." },
        [span_44](start_span){ q: "I like to ski ___ winter.", a: "in", s: "IN is used for seasons[span_44](end_span)." },
        [span_45](start_span){ q: "The keys are ___ the table.", a: "on", s: "ON is used for surfaces[span_45](end_span)." },
        [span_46](start_span){ q: "He sits ___ me in class.", a: "next to", s: "NEXT TO means beside[span_46](end_span)." },
        [span_47](start_span){ q: "I'll be back ___ an hour.", a: "in", s: "IN is used for periods of time[span_47](end_span)." },
        [span_48](start_span){ q: "She is ___ the cinema.", a: "at", s: "AT is used for buildings[span_48](end_span)." },
        [span_49](start_span){ q: "The pen is ___ the drawer.", a: "in", s: "IN is used for enclosed spaces[span_49](end_span)." },
        [span_50](start_span){ q: "The coffee is ___ the tray.", a: "on", s: "ON is used for surfaces[span_50](end_span)." },
        [span_51](start_span){ q: "He is ___ school.", a: "at", s: "AT is used for buildings[span_51](end_span)." },
        [span_52](start_span){ q: "I was born ___ May.", a: "in", s: "IN is used for months[span_52](end_span)." },
        [span_53](start_span){ q: "We met ___ my birthday.", a: "on", s: "ON is used for specific days[span_53](end_span)." },
        [span_54](start_span){ q: "The lamp is ___ the desk.", a: "on", s: "ON is used for surfaces[span_54](end_span)." },
        [span_55](start_span){ q: "The spider is ___ the bed.", a: "under", s: "UNDER means below[span_55](end_span)." },
        [span_56](start_span){ q: "I study ___ night.", a: "at", s: "AT is used for night[span_56](end_span)." }
    ];

    let current = 0;
    let score = 0;
    const preps = ["in", "on", "at", "under", "over", "next to"];

    function init() {
        const q = questions[current];
        document.getElementById("q-text").innerText = q.q;
        document.getElementById("stats").innerText = `Question ${current + 1} of 50 | Score: ${score}`;
        document.getElementById("progress-fill").style.width = `${(current / 50) * 100}%`;
        document.getElementById("solution-text").style.display = "none";
        document.getElementById("next-btn").style.display = "none";
        
        const container = document.getElementById("opt-container");
        container.innerHTML = "";
        preps.forEach(p => {
            const b = document.createElement("button");
            b.innerText = p.toUpperCase();
            b.onclick = () => select(p, b);
            container.appendChild(b);
        });
    }

    function select(p, btn) {
        const correct = questions[current].a;
        const allBtns = document.querySelectorAll("#opt-container button");
        allBtns.forEach(b => b.disabled = true);
        
        if(p === correct) {
            btn.style.background = "var(--correct)";
            btn.style.color = "white";
            score++;
        } else {
            btn.style.background = "var(--wrong)";
            btn.style.color = "white";
        }
        document.getElementById("next-btn").style.display = "block";
    }

    function toggleReveal() {
        const sol = document.getElementById("solution-text");
        sol.innerText = questions[current].s;
        sol.style.display = "block";
    }

    function handleNext() {
        current++;
        if(current < questions.length) init();
        else {
            document.getElementById("quiz-app").classList.add("hidden");
            document.getElementById("result-screen").classList.remove("hidden");
            document.getElementById("final-score").innerText = `${score} / 50`;
        }
    }

    init();
</script>
</body>
</html>
