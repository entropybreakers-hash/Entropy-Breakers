<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Vocabulary Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%}
body{
  background:#080510;
  color:#fff;
  font-family:'DM Sans',sans-serif;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:8px;
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
}

/* ── BACKGROUND ── */
.bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}

/* Deep space */
.bg-base{position:absolute;inset:0;background:radial-gradient(ellipse 150% 100% at 50% 0%,#1a0533 0%,#080510 55%)}

/* Top violet bloom */
.bg-bloom{
  position:absolute;left:50%;top:-10%;
  transform:translateX(-50%);
  width:900px;height:500px;
  background:
    radial-gradient(ellipse 50% 50% at 50% 0%,rgba(139,92,246,0.35) 0%,transparent 70%),
    radial-gradient(ellipse 80% 60% at 30% 30%,rgba(236,72,153,0.12) 0%,transparent 60%),
    radial-gradient(ellipse 80% 60% at 70% 30%,rgba(99,102,241,0.15) 0%,transparent 60%);
  animation:bloom 8s ease-in-out infinite;
}
@keyframes bloom{0%,100%{opacity:.8;transform:translateX(-50%) scale(1)}50%{opacity:1;transform:translateX(-50%) scale(1.05)}}

/* Horizontal light line */
.bg-line{
  position:absolute;left:0;right:0;top:42%;
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(139,92,246,0.2) 30%,rgba(216,180,254,0.5) 50%,rgba(139,92,246,0.2) 70%,transparent);
  animation:linepulse 8s ease-in-out infinite;
}
@keyframes linepulse{0%,100%{opacity:.35}50%{opacity:.8}}

/* Subtle noise */
.bg-noise{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.022;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

/* Vignette */
.bg-vign{position:absolute;inset:0;background:radial-gradient(ellipse 120% 120% at 50% 50%,transparent 35%,rgba(5,3,12,0.9) 100%)}

/* ── SHELL ── */
.shell{
  position:relative;z-index:1;
  width:100%;max-width:500px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.09);
  border-radius:30px;
  padding:22px 20px;
  backdrop-filter:blur(60px);-webkit-backdrop-filter:blur(60px);
  box-shadow:
    0 0 0 1px rgba(139,92,246,0.12),
    0 50px 120px rgba(0,0,0,0.75),
    0 16px 48px rgba(0,0,0,0.5),
    inset 0 1px 0 rgba(255,255,255,0.08);
}
.shell::before{
  content:'';position:absolute;top:0;left:18%;right:18%;height:1px;border-radius:999px;
  background:linear-gradient(90deg,transparent,rgba(196,181,253,0.55),transparent);
}

/* ── STATUS ── */
.status-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.cat-tag{font-size:.58rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:#A78BFA;opacity:.9}
.counter{font-size:.68rem;font-weight:500;color:rgba(255,255,255,0.22);font-variant-numeric:tabular-nums}
.prog-track{height:2px;background:rgba(255,255,255,0.06);border-radius:999px;overflow:hidden;margin-bottom:18px}
.prog-fill{height:100%;background:linear-gradient(90deg,#7C3AED,#A855F7,#EC4899);border-radius:999px;box-shadow:0 0 10px rgba(139,92,246,0.8);transition:width .55s ease}

/* ── FLIP CARD ── */
.flip-wrap{perspective:1400px;width:100%;height:300px;cursor:pointer;margin-bottom:16px;user-select:none}
.flip-inner{position:relative;width:100%;height:100%;transition:transform .65s cubic-bezier(.4,0,.2,1);transform-style:preserve-3d}
.flip-inner.flipped{transform:rotateY(180deg)}

.flip-front,.flip-back{
  position:absolute;width:100%;height:100%;backface-visibility:hidden;
  border-radius:22px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:22px 20px;text-align:center;
}

/* FRONT — very subtle, almost transparent */
.flip-front{
  background:rgba(255,255,255,0.035);
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:0 8px 40px rgba(0,0,0,0.35),inset 0 1px 0 rgba(255,255,255,0.05);
}
.flip-front::after{
  content:'';position:absolute;inset:0;border-radius:22px;
  background:radial-gradient(ellipse 70% 50% at 50% 100%,rgba(139,92,246,0.06),transparent 70%);
  pointer-events:none;
}

/* BACK — warm violet gradient, clearly premium */
.flip-back{
  background:linear-gradient(150deg,
    rgba(109,40,217,0.65) 0%,
    rgba(88,28,135,0.80) 40%,
    rgba(49,10,84,0.92) 100%);
  border:1px solid rgba(167,139,250,0.35);
  box-shadow:0 8px 40px rgba(0,0,0,0.4),0 0 80px rgba(109,40,217,0.15),inset 0 1px 0 rgba(216,180,254,0.2);
  transform:rotateY(180deg);
}
.flip-back::before{
  content:'';position:absolute;top:0;left:10%;right:10%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(216,180,254,0.7),transparent);
}
.flip-back::after{
  content:'';position:absolute;inset:0;border-radius:22px;
  background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(167,139,250,0.12),transparent 65%);
  pointer-events:none;
}

.cat-pill{
  display:inline-flex;background:rgba(139,92,246,0.15);border:1px solid rgba(139,92,246,0.30);
  border-radius:999px;padding:5px 16px;font-size:.58rem;font-weight:600;
  letter-spacing:.14em;text-transform:uppercase;color:#C4B5FD;margin-bottom:16px;
}
.hu-word{
  font-family:'Outfit',sans-serif;
  font-size:clamp(1.5rem,6vw,2.4rem);
  font-weight:800;letter-spacing:-.02em;
  color:#fff;line-height:1.1;
}
.tap-hint{font-size:.54rem;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,0.14);position:absolute;bottom:16px;right:20px}

.en-label{font-size:.56rem;font-weight:600;letter-spacing:.26em;text-transform:uppercase;color:rgba(196,181,253,0.75);margin-bottom:12px;position:relative;z-index:1}
.en-word{
  font-family:'Outfit',sans-serif;
  font-size:clamp(1.5rem,6vw,2.4rem);
  font-weight:800;letter-spacing:-.02em;
  background:linear-gradient(135deg,#fff 20%,#DDD6FE 60%,#C4B5FD 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  line-height:1.1;margin-bottom:12px;position:relative;z-index:1;
}
.example{
  font-size:.73rem;font-weight:300;
  color:rgba(255,255,255,0.4);
  font-style:italic;line-height:1.6;max-width:300px;position:relative;z-index:1;
}

/* ── BUTTONS ── */
.nav-row{display:grid;grid-template-columns:1fr 1.6fr;gap:10px;margin-bottom:8px}
.btn-ghost{
  padding:14px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:16px;
  font-family:'DM Sans',sans-serif;font-size:.76rem;font-weight:500;
  color:rgba(255,255,255,0.3);cursor:pointer;transition:all .2s;
}
.btn-ghost:hover{border-color:rgba(139,92,246,0.4);color:#C4B5FD}

.btn-main{
  padding:14px;
  background:linear-gradient(135deg,#6D28D9,#8B5CF6 50%,#7C3AED);
  border:none;border-radius:16px;
  font-family:'Outfit',sans-serif;font-size:.78rem;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;color:#fff;cursor:pointer;
  box-shadow:0 0 30px rgba(109,40,217,0.45),0 6px 16px rgba(0,0,0,0.35);
  transition:all .2s;position:relative;overflow:hidden;
}
.btn-main::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(to bottom,rgba(255,255,255,0.13),transparent);pointer-events:none}
.btn-main:hover{transform:translateY(-2px);box-shadow:0 0 45px rgba(109,40,217,0.6),0 8px 20px rgba(0,0,0,0.4)}
.btn-main:active{transform:scale(.98)}

.btn-shuffle{
  width:100%;padding:8px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:16px;
  font-family:'DM Sans',sans-serif;font-size:.72rem;font-weight:500;
  color:rgba(255,255,255,0.22);cursor:pointer;transition:all .2s;
}
.btn-shuffle:hover{border-color:rgba(139,92,246,0.35);color:#C4B5FD}

/* ── RESULT ── */
#result-view{display:none;text-align:center}
.result-icon{width:80px;height:80px;border-radius:22px;margin:0 auto 20px;
  background:linear-gradient(135deg,rgba(109,40,217,0.8),rgba(139,92,246,0.6));
  border:1px solid rgba(167,139,250,0.4);display:flex;align-items:center;justify-content:center;
  font-size:2rem;box-shadow:0 0 50px rgba(109,40,217,0.45)}
.result-title{font-family:'Outfit',sans-serif;font-size:2.4rem;font-weight:800;letter-spacing:-.03em;
  background:linear-gradient(135deg,#fff 30%,#C4B5FD 70%,#DDD6FE);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.result-sub{font-size:.82rem;font-weight:300;color:rgba(255,255,255,0.28);margin-bottom:26px}
.result-panel{background:rgba(255,255,255,0.04);border:1px solid rgba(139,92,246,0.18);
  border-radius:20px;padding:28px;margin-bottom:14px;position:relative;overflow:hidden}
.result-panel::before{content:'';position:absolute;top:0;left:15%;right:15%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(167,139,250,0.45),transparent)}
.result-count{font-family:'Outfit',sans-serif;font-size:4.5rem;font-weight:800;letter-spacing:-.05em;
  background:linear-gradient(135deg,#fff,#C4B5FD);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  line-height:1;margin-bottom:4px}
.result-denom{font-size:.72rem;font-weight:400;color:rgba(255,255,255,0.22);margin-bottom:14px}
.result-msg{font-size:.76rem;font-weight:300;color:rgba(255,255,255,0.32);font-style:italic}
</style>
</head>
<body>

<div class="bg">
  <div class="bg-base"></div>
  <div class="bg-bloom"></div>
  <div class="bg-line"></div>
  <div class="bg-vign"></div>
</div>
<div class="bg-noise"></div>

<div class="shell">
  <div id="card-view">
    <div class="status-row">
      <span class="cat-tag" id="cat-label">—</span>
      <span class="counter" id="counter">1 / 65</span>
    </div>
    <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>

    <div class="flip-wrap" onclick="flipCard()">
      <div class="flip-inner" id="flip-inner">
        <div class="flip-front">
          <div class="cat-pill" id="front-cat">—</div>
          <div class="hu-word" id="hu-word">—</div>
          <div style="height:0.75rem"></div>
          <div style="font-size:.73rem;opacity:0;font-style:italic">placeholder</div>
          <span class="tap-hint">Tap to reveal →</span>
        </div>
        <div class="flip-back">
          <div class="en-label">English</div>
          <div class="en-word" id="en-word">—</div>
          <div class="example" id="example-text">—</div>
        </div>
      </div>
    </div>

    <div class="nav-row">
      <button class="btn-ghost" onclick="prevCard()">← Back</button>
      <button class="btn-main" onclick="nextCard()">Next →</button>
    </div>
    <button class="btn-shuffle" onclick="shuffleCards()">⇄ Shuffle</button>
  </div>

  <div id="result-view">
    <div class="result-icon">✅</div>
    <div class="result-title">All done!</div>
    <div class="result-sub">You reviewed all the cards</div>
    <div class="result-panel">
      <div class="result-count" id="res-count">65</div>
      <div class="result-denom">words reviewed</div>
      <div class="result-msg">Great work! Review again to remember them better.</div>
    </div>
    <div class="nav-row">
      <button class="btn-ghost" onclick="restart()">↺ Restart</button>
      <button class="btn-main" onclick="shuffleRestart()">⇄ Shuffle & Restart</button>
    </div>
  </div>
</div>

<script>
const CARDS = [
    {cat:"Kindness",hu:"Kedvesség",en:"Kindness",ex:"Her kindness made everyone feel welcome."},
    {cat:"Kindness",hu:"Adakozás",en:"Giving",ex:"Giving to others brings real happiness."},
    {cat:"Kindness",hu:"Ünnepi",en:"Festive",ex:"The town had a festive atmosphere at Christmas."},
    {cat:"Society",hu:"Bolti lopás",en:"Shoplifting",ex:"Shoplifting is a crime, even if you are desperate."},
    {cat:"Society",hu:"Élelmiszerek",en:"Groceries",ex:"She could not afford to buy groceries."},
    {cat:"Society",hu:"Megengedheti magának",en:"Afford",ex:"Not everyone can afford to eat healthy food."},
    {cat:"Society",hu:"Kétségbeesett",en:"Desperate",ex:"He was desperate and did not know what to do."},
    {cat:"Society",hu:"Megfelelő",en:"Proper",ex:"Everyone deserves a proper meal every day."},
    {cat:"Society",hu:"Ideiglenesen",en:"Temporarily",ex:"The shop was temporarily closed."},
    {cat:"Society",hu:"Vádat emel",en:"Press charges",ex:"She decided not to press charges against him."},
    {cat:"Society",hu:"Helyette",en:"Instead",ex:"Instead of calling the police, she bought him food."},
    {cat:"Society",hu:"Hálás",en:"Thankful",ex:"I am so thankful for your help."},
    {cat:"Society",hu:"Bíróság",en:"Court",ex:"The case was taken to court."},
    {cat:"Society",hu:"Jelentés",en:"Report",ex:"The manager wrote a report about the incident."},
    {cat:"Kindness",hu:"Jellem",en:"Character",ex:"Honesty is an important part of character."},
    {cat:"Kindness",hu:"Példáz",en:"Exemplify",ex:"She exemplifies everything a good leader should be."},
    {cat:"Kindness",hu:"Nagylelkű",en:"Generous",ex:"She was generous with her time and money."},
    {cat:"Resources",hu:"Biztosít",en:"Ensure",ex:"We must ensure everyone has clean water."},
    {cat:"Resources",hu:"Védő",en:"Protective",ex:"Wear protective clothing near chemicals."},
    {cat:"Resources",hu:"Sugárzás",en:"Radiation",ex:"Too much radiation can be dangerous."},
    {cat:"Resources",hu:"Hatékony",en:"Efficient",ex:"This machine is very efficient and saves energy."},
    {cat:"Resources",hu:"Készlet",en:"Supply",ex:"The supply of clean water is essential."},
    {cat:"Resources",hu:"Szükséglet",en:"Necessity",ex:"Food and shelter are basic necessities."},
    {cat:"Resources",hu:"Alapvető",en:"Essential",ex:"Sleep is essential for good health."},
    {cat:"Resources",hu:"Szárított",en:"Dried",ex:"Dried fruit lasts much longer than fresh fruit."},
    {cat:"Resources",hu:"Morzsálódik",en:"Crumble",ex:"The old bread started to crumble."},
    {cat:"Resources",hu:"Árt",en:"Harm",ex:"Too much sugar can harm your health."},
    {cat:"Resources",hu:"Megőriz",en:"Preserve",ex:"Salt was used to preserve food for centuries."},
    {cat:"Anxiety",hu:"Szorongás",en:"Anxiety",ex:"Many students feel anxiety before exams."},
    {cat:"Anxiety",hu:"Ideges",en:"Nervous",ex:"She felt nervous before her presentation."},
    {cat:"Anxiety",hu:"Leblokkol",en:"Blank out",ex:"He blanked out completely during the test."},
    {cat:"Anxiety",hu:"Reagál",en:"Respond",ex:"How do you respond when you feel under pressure?"},
    {cat:"Anxiety",hu:"Várakozás",en:"Anticipation",ex:"The anticipation before results can be stressful."},
    {cat:"Anxiety",hu:"Remegő",en:"Shaky",ex:"My hands were shaky before the interview."},
    {cat:"Anxiety",hu:"Izzadt",en:"Sweaty",ex:"His palms were sweaty with nerves."},
    {cat:"Anxiety",hu:"Aggódik",en:"Worry",ex:"Try not to worry too much about the exam."},
    {cat:"Anxiety",hu:"Nyomás",en:"Pressure",ex:"She works well under pressure."},
    {cat:"Anxiety",hu:"Hatalmas",en:"Enormous",ex:"The pressure she felt was enormous."},
    {cat:"Language",hu:"Azonban",en:"However",ex:"I was nervous. However, I did very well."},
    {cat:"Language",hu:"Vajon / Hogy (pl. 'hogy-e')",en:"Whether",ex:"I was not sure whether I would pass the exam."},
    {cat:"Language",hu:"Valaki szerint",en:"According to",ex:"According to scientists, stress can be useful."},
    {cat:"Language",hu:"Stressz alatt",en:"Under stress",ex:"People behave differently under stress."},
    {cat:"Anxiety",hu:"(Hormont) kibocsát",en:"Release a hormone",ex:"Exercise releases a hormone that makes you happy."},
    {cat:"Anxiety",hu:"Felkészít",en:"Prepare",ex:"Adrenaline prepares your body for action."},
    {cat:"Anxiety",hu:"Tulajdonság",en:"Trait",ex:"Resilience is an important personality trait."},
    {cat:"Anxiety",hu:"Idegesség",en:"Nervousness",ex:"A little nervousness before a test is normal."},
    {cat:"Anxiety",hu:"Megzavar / Akadályoz",en:"Interfere with",ex:"Anxiety can interfere with your concentration."},
    {cat:"Anxiety",hu:"Koncentráció",en:"Concentration",ex:"Stress affects concentration and memory."},
    {cat:"Anxiety",hu:"Teljesítmény",en:"Performance",ex:"Nervousness can sometimes improve your performance."},
    {cat:"Anxiety",hu:"Megbirkózik valamivel",en:"Cope with",ex:"Exercise helps you cope with stress."},
    {cat:"Anxiety",hu:"Hányinger",en:"Nausea",ex:"Stress can cause nausea and stomach problems."},
    {cat:"Anxiety",hu:"Gyomorfájás",en:"Stomach ache",ex:"He got a stomach ache from worrying too much."},
    {cat:"Health",hu:"Abban az esetben, ha",en:"In case of",ex:"In case of emergency, call 112."},
    {cat:"Health",hu:"Súlyos",en:"Severe",ex:"Severe anxiety needs professional help."},
    {cat:"Health",hu:"Ajánlott",en:"Advisable",ex:"It is advisable to see a doctor if symptoms continue."},
    {cat:"Health",hu:"Védőfelszerelés",en:"Protective gear",ex:"Always wear protective gear in the laboratory."},
    {cat:"Health",hu:"Azonnal",en:"Immediately",ex:"Call a doctor immediately if you feel chest pain."},
    {cat:"Health",hu:"Jelentős mennyiség",en:"Significant amount",ex:"A significant amount of vitamin D comes from sunlight."},
    {cat:"Resources",hu:"Íz",en:"Flavour",ex:"This soup has a wonderful flavour."},
    {cat:"Health",hu:"Rendszeres testmozgás",en:"Regular exercise",ex:"Regular exercise reduces stress and anxiety."},
    {cat:"Language",hu:"Számol / Megszámol",en:"Count",ex:"Count to ten slowly to calm down."},
    {cat:"Life",hu:"Nehéz idők",en:"Rough times",ex:"Friends help you through rough times."},
    {cat:"Life",hu:"Figyelmet vonz",en:"Attract attention",ex:"His generous act attracted a lot of attention."},
    {cat:"Life",hu:"Médiafigyelem",en:"Media attention",ex:"The story received huge media attention."},
    {cat:"Kindness",hu:"Nagylelkű cselekedet",en:"Generous act",ex:"Buying food for a stranger was a generous act."},
];

let cards = [...CARDS];
let idx = 0;
let isFlipped = false;

function render() {
    var card = cards[idx];
    var tot = cards.length;
    document.getElementById('cat-label').innerText = card.cat;
    document.getElementById('counter').innerText = (idx+1) + ' / ' + tot;
    document.getElementById('prog-fill').style.width = (((idx+1)/tot)*100) + '%';
    document.getElementById('front-cat').innerText = card.cat;
    document.getElementById('hu-word').innerText = card.hu;
    document.getElementById('en-word').innerText = card.en;
    document.getElementById('example-text').innerText = card.ex;
    // Reset flip
    isFlipped = false;
    document.getElementById('flip-inner').classList.remove('flipped');
}

function flipCard() {
    isFlipped = !isFlipped;
    document.getElementById('flip-inner').classList.toggle('flipped', isFlipped);
}

function nextCard() {
    if (idx >= cards.length - 1) {
        document.getElementById('card-view').style.display = 'none';
        document.getElementById('result-view').style.display = 'block';
        document.getElementById('res-count').innerText = cards.length;
        return;
    }
    idx++;
    render();
}

function prevCard() {
    if (idx > 0) { idx--; render(); }
}

function shuffleCards() {
    for (var i = cards.length-1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i+1));
        var tmp = cards[i]; cards[i] = cards[j]; cards[j] = tmp;
    }
    idx = 0;
    render();
}

function restart() {
    cards = [...CARDS];
    idx = 0;
    document.getElementById('result-view').style.display = 'none';
    document.getElementById('card-view').style.display = 'block';
    render();
}

function shuffleRestart() {
    cards = [...CARDS];
    shuffleCards();
    document.getElementById('result-view').style.display = 'none';
    document.getElementById('card-view').style.display = 'block';
}

document.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowRight') nextCard();
    if (e.key === 'ArrowLeft') prevCard();
    if (e.key === ' ') flipCard();
});

render();


</script>
</body>
</html>
