    const QUESTIONS = [
        { q: "I __________ English since I was ten years old.", options: ["studied", "was studying", "have studied", "study"], correct: 2, exp: "Present Perfect: A cselekvés a múltban kezdődött és ma is tart." },
        { q: "If it __________ tomorrow, we will stay at home.", options: ["rains", "will rain", "rained", "is raining"], correct: 0, exp: "First Conditional: Az 'if' utáni tagmondatban jelen időt használunk." },
        { q: "She asked me where __________ from.", options: ["I came", "did I come", "I come", "come I"], correct: 0, exp: "Reported speech: Függő kérdésben az igealak nem kérdő sorrendű." },
        { q: "By the time we arrived, the film __________.", options: ["had already started", "already started", "has already started", "was already starting"], correct: 0, exp: "Past Perfect: Egy múltbeli cselekvés, amely egy másik előtt történt." },
        { q: "You __________ take an umbrella — it's not going to rain.", options: ["don't have to", "mustn't", "shouldn't", "can't"], correct: 0, exp: "Don't have to: Nincs szükség rá, de nem tiltott." },
        { q: "The report __________ by the manager every month.", options: ["is written", "writes", "is writing", "has written"], correct: 0, exp: "Passive voice (Present Simple): A cselekvés tárgya az alany." },

        { q: "They __________ for three hours when the storm started.", options: ["had been driving", "drove", "were driving", "have been driving"], correct: 0, exp: "Past Perfect Continuous: Folyamatban lévő múltbeli cselekvés, mielőtt egy másik bekövetkezett." },
        { q: "The new bridge __________ next year.", options: ["will be opened", "will open", "is opening", "opens"], correct: 0, exp: "Future Passive: A jövőbeli cselekvés szenvedő szerkezetben." },
        { q: "I'd rather you __________ so loudly.", options: ["didn't talk", "don't talk", "won't talk", "not talk"], correct: 0, exp: "I'd rather + past subjunctive: Mást kérünk meg valamire." },
        { q: "Despite __________ hard, she failed the exam.", options: ["studying", "study", "studied", "to study"], correct: 0, exp: "Despite + -ing: A 'despite' elöljáró után gerund következik." },

        { q: "The letter __________ before I got to the office.", options: ["had been sent", "was sent", "has been sent", "is sent"], correct: 0, exp: "Past Perfect Passive: Szenvedő szerkezet múlt idejű befejezett aspektussal." },
        { q: "She __________ to speak to the director when I saw her.", options: ["was trying", "tried", "has tried", "tries"], correct: 0, exp: "Past Continuous: Folyamatban lévő cselekvés a múltban." },
        { q: "We need someone __________ can speak both French and English.", options: ["who", "which", "whose", "whom"], correct: 0, exp: "Relative pronoun: 'who' személyekre vonatkozik." },

        { q: "You __________ have told me earlier — now it's too late.", options: ["should", "must", "would", "could"], correct: 0, exp: "Should have + past participle: Múltbeli mulasztás kifejezése." },
        { q: "I don't know __________ she passed the test or not.", options: ["whether", "if", "that", "what"], correct: 0, exp: "Whether: Kétféle lehetőség esetén használjuk, főleg 'or not'-tal." },
        { q: "The harder you work, __________ you will become.", options: ["the better", "better", "the more better", "most better"], correct: 0, exp: "The + comparative … the + comparative: Párhuzamos fokozás." },
        { q: "She __________ for the job when she heard about the salary.", options: ["had already applied", "already applied", "has already applied", "was already applying"], correct: 0, exp: "Past Perfect: A jelentkezés megelőzte a fizetésről való értesülést." },
        { q: "He admitted __________ the money from the till.", options: ["taking", "to take", "take", "took"], correct: 0, exp: "Admit + -ing: Az 'admit' után gerund következik." },
        { q: "The concert __________ at eight o'clock sharp.", options: ["starts", "is starting", "will start", "started"], correct: 0, exp: "Present Simple: Menetrend szerinti, rögzített jövőbeli esemény." },
        { q: "__________ she studied a lot, she didn't pass the exam.", options: ["Even though", "Despite", "In spite of", "Because"], correct: 0, exp: "Even though: Erős ellentétet hangsúlyoz (+ teljes mondat)." },
        { q: "He is __________ to get the promotion — his work is excellent.", options: ["likely", "probably", "surely", "maybe"], correct: 0, exp: "Likely (adjective): 'He is likely to' = valószínűleg meg fogja kapni." },
        { q: "We __________ finish the project by Friday if we start now.", options: ["will be able to", "can", "could", "would"], correct: 0, exp: "Will be able to: Jövőbeli képesség kifejezése." }
    ];

    let currentQuestion = 0;
    let score = 0;
    let studentName = "";
    let answered = false;

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function checkName() {
        const input = document.getElementById('student-name');
        const name = (window.__eb_student_name || input.value.trim());
        if (name.length < 2) { input.focus(); return; }
        studentName = name;
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('quiz-ui').classList.remove('hidden');
        loadQuestion();
    }

    document.getElementById('student-name').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') checkName();
    });

    function loadQuestion() {
        answered = false;
        const q = QUESTIONS[currentQuestion];
        document.getElementById('q-counter').innerText = `${currentQuestion + 1} / ${QUESTIONS.length}`;
        document.getElementById('progress-fill').style.width = `${(currentQuestion / QUESTIONS.length) * 100}%`;
        document.getElementById('question-text').innerText = q.q;
        document.getElementById('explanation-box').classList.add('hidden');

        let optionsWithMeta = q.options.map((opt, idx) => ({ text: opt, isCorrect: idx === q.correct }));
        shuffleArray(optionsWithMeta);

        const container = document.getElementById('options-container');
        container.innerHTML = '';
        optionsWithMeta.forEach((opt) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt.text;
            btn.onclick = () => handleAnswer(opt.isCorrect, btn);
            container.appendChild(btn);
        });
    }

    function handleAnswer(isCorrect, clickedBtn) {
        if (answered) return;
        answered = true;
        const q = QUESTIONS[currentQuestion];
        const btns = document.querySelectorAll('.option-btn');
        btns.forEach((btn) => { btn.disabled = true; });

        if (isCorrect) {
            score++;
            clickedBtn.classList.add('correct');
            document.getElementById('answer-status').innerText = "Correct! ✓";
            document.getElementById('answer-status').className = "text-sm font-black uppercase tracking-widest mb-2 text-emerald-400";
        } else {
            clickedBtn.classList.add('wrong');
            btns.forEach(btn => { if (btn.innerText === q.options[q.correct]) btn.classList.add('correct'); });
            document.getElementById('answer-status').innerText = "Incorrect. ✗";
            document.getElementById('answer-status').className = "text-sm font-black uppercase tracking-widest mb-2 text-rose-400";
        }

        document.getElementById('live-score').innerText = score; document.getElementById('answer-explanation').innerText = q.exp;
        document.getElementById('explanation-box').classList.remove('hidden');
    }

    function nextQuestion() {
        currentQuestion++;
        if (currentQuestion < QUESTIONS.length) loadQuestion();
        else finishQuiz();
    }

    async function finishQuiz() {
        document.getElementById('quiz-ui').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('display-name').innerText = studentName;
        document.getElementById('final-score').innerText = score;
        document.getElementById('progress-fill').style.width = '100%';

        const percent = Math.round((score / QUESTIONS.length) * 100);
        document.getElementById('result-percent-text').innerText = `${percent}%`;
        document.getElementById('result-progress-fill').style.width = `${percent}%`;
        document.getElementById('feedback-rating').innerText = "⚡ AI elemzés folyamatban...";

        try {
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 30000);

            const response = await fetch(MAKE_WEBHOOK_URL, {
                signal: controller.signal,
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    Student: studentName,
                    Quiz: QUIZ_NAME,
                    Score: score,
                    TotalQuestions: QUESTIONS.length,
                    Level: QUIZ_LEVEL,
                    Skill: QUIZ_SKILL,
                    Percentage: percent,
                    CompletedAt: new Date().toISOString()
                })
            });

            clearTimeout(timeout);
            const text = await response.text();
            document.getElementById('feedback-rating').innerText = text || "Well done! Folytasd a gyakorlást!";

        } catch (e) {
            console.error("Error:", e);
            document.getElementById('feedback-rating').innerText =
                percent >= 80 ? "Zseniális! Készen állsz a haladóbb szintre!" :
                percent >= 60 ? "Szép munka, de gyakorolj még!" :
                "Ne add fel, próbáld újra!";
        }
    }

    function adminAccess() {
        if (prompt("Jelszó:") === "bettina2026") {
            alert("Az eredmények a Make → Airtable rendszerben mentődnek.");
        }
    }

    function restartQuiz() {
        studentName = ""; score = 0; currentQuestion = 0; answered = false;
        document.getElementById('student-name').value = "";
        document.getElementById('live-score').innerText = "0";
        document.getElementById('q-counter').innerText = `1 / ${QUESTIONS.length}`;
        document.getElementById('progress-fill').style.width = "0%";
        document.getElementById('result-progress-fill').style.width = "0%";
        document.getElementById('result-percent-text').innerText = "0%";
        document.getElementById('final-score').innerText = "0";
        document.getElementById('feedback-rating').innerText = "-";
        document.getElementById('display-name').innerText = "";
        document.getElementById('question-text').innerText = "-";
        document.getElementById('options-container').innerHTML = "";
        document.getElementById('explanation-box').classList.add('hidden');
        document.getElementById('result-screen').classList.add('hidden');
        document.getElementById('quiz-ui').classList.add('hidden');
        document.getElementById('start-screen').classList.remove('hidden');
    }
</script>


<script>
// ═══ ENTROPY BREAKERS — DEFINITIVE AUTO-START ═══
(function() {
  var p = new URLSearchParams(window.location.search);
  var n = p.get('name');
  if (!n || n.length < 1) return;
  var name = decodeURIComponent(n);
  window.__eb_student_name = name;

  function doStart() {
    // 1. Fill all possible name inputs
    var inputIds = ['student-name','name-input','nameInput','studentName','player-name'];
    for (var i = 0; i < inputIds.length; i++) {
      var el = document.getElementById(inputIds[i]);
      if (el) el.value = name;
    }

    // 2. Set global studentName variable if it exists
    try { if (typeof studentName !== 'undefined') studentName = name; } catch(e) {}
    try { if (typeof window.studentName !== 'undefined') window.studentName = name; } catch(e) {}

    // 3. Hide start screen
    var startEl = document.getElementById('start-screen');
    if (startEl) startEl.classList.add('hidden');

    // 4. Call whichever start function exists
    var fns = ['startApp','checkName','startQuiz','startTest','start','startTraining','startPlatform'];
    for (var j = 0; j < fns.length; j++) {
      if (typeof window[fns[j]] === 'function') {
        try { window[fns[j]](); } catch(e) {}
        break;
      }
    }
  }

  // Run after full page load
  if (document.readyState === 'complete') {
    setTimeout(doStart, 100);
  } else {
    window.addEventListener('load', function() { setTimeout(doStart, 100); });
  }
})();
</script>
