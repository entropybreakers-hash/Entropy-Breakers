<script>
    // ── API KEY STORED SAFELY IN MAKE.COM — NOT HERE ──
    const MAKE_WEBHOOK_URL = "https://hook.eu1.make.com/ww4obw8ghb8h46ti1gi6yoy2qg1db7ad";
    const QUIZ_NAME = "C1 Phrase Learner";
    const QUIZ_LEVEL = "C1";
    const QUIZ_SKILL = "Vocabulary";

    const VERB_DATA = [
        // ── VÉLEMÉNY / OPINION ──
        { en: "From my perspective...", hu: "Szempontomból..." },
        { en: "I am of the opinion that...", hu: "Úgy vélem, hogy..." },
        { en: "It is my firm belief that...", hu: "Határozottan úgy gondolom..." },
        { en: "I would argue that...", hu: "Azt állítanám, hogy..." },
        { en: "As far as I'm concerned...", hu: "Ami engem illet..." },
        { en: "It could be argued that...", hu: "Érvelni lehet amellett, hogy..." },
        { en: "I am inclined to think that...", hu: "Hajlok arra, hogy azt gondoljam..." },
        { en: "To my mind...", hu: "Az én megítélésem szerint..." },
        { en: "It is my view that...", hu: "Az én nézetem az, hogy..." },
        { en: "Broadly speaking...", hu: "Általánosságban véve..." },
        // ── EGYETÉRTÉS / AGREEMENT ──
        { en: "I couldn't agree more.", hu: "Teljes mértékben egyetértek." },
        { en: "You raise a valid point.", hu: "Érvényes pontot vetett fel." },
        { en: "I am inclined to agree.", hu: "Hajlok az egyetértésre." },
        { en: "That is absolutely right.", hu: "Ez teljesen helytálló." },
        { en: "I second that entirely.", hu: "Ezt teljes mértékben támogatom." },
        // ── ELLENTMONDÁS / DISAGREEMENT ──
        { en: "I beg to differ.", hu: "Engedje meg, hogy vitatkozzam." },
        { en: "I'm not entirely convinced.", hu: "Nem vagyok teljesen meggyőzve." },
        { en: "I see it differently.", hu: "Én ezt másképp látom." },
        { en: "With all due respect...", hu: "Minden tiszteletem megadva..." },
        { en: "That's not quite my view.", hu: "Ez nem egészen az én álláspontom." },
        // ── ÖSSZEKÖTŐK / DISCOURSE MARKERS ──
        { en: "Nevertheless...", hu: "Mindazonáltal..." },
        { en: "Furthermore...", hu: "Ráadásul / Emellett..." },
        { en: "Consequently...", hu: "Következésképpen..." },
        { en: "In contrast...", hu: "Ezzel szemben..." },
        { en: "On the other hand...", hu: "Másrészt..." },
        { en: "Moreover...", hu: "Továbbá..." },
        { en: "Nonetheless...", hu: "Ennek ellenére..." },
        { en: "As a result...", hu: "Ennek eredményeként..." },
        { en: "In addition to this...", hu: "Ezen kívül..." },
        { en: "By contrast...", hu: "Ezzel ellentétben..." },
        // ── MONDATNYITÓK / SENTENCE STARTERS ──
        { en: "It goes without saying that...", hu: "Magától értetődő, hogy..." },
        { en: "It is worth noting that...", hu: "Érdemes megjegyezni, hogy..." },
        { en: "There is no denying that...", hu: "Nem tagadható, hogy..." },
        { en: "It stands to reason that...", hu: "Logikus, hogy..." },
        { en: "It is widely acknowledged that...", hu: "Közismert, hogy..." },
        // ── LEZÁRÓK / CLOSING PHRASES ──
        { en: "To sum up...", hu: "Összefoglalva..." },
        { en: "All things considered...", hu: "Mindent egybevetve..." },
        { en: "On balance...", hu: "Összességében..." },
        { en: "To put it another way...", hu: "Más szóval..." },
        { en: "In the final analysis...", hu: "Végső elemzésben..." },
        // ── ÁRNYALÁS / HEDGING ──
        { en: "To a certain extent...", hu: "Bizonyos mértékig..." },
        { en: "By and large...", hu: "Nagyjából / Általában véve..." },
        { en: "In theory...", hu: "Elméletileg..." },
        { en: "Arguably...", hu: "Vitathatóan / Feltehetőleg..." },
        { en: "To be fair...", hu: "Igazságos megközelítéssel..." },
        // ── HANGSÚLYOZÁS / EMPHASIS ──
        { en: "Above all...", hu: "Mindenekelőtt..." },
        { en: "In particular...", hu: "Különösen..." },
        { en: "As a matter of fact...", hu: "Valójában / Tulajdonképpen..." },
        { en: "In the long run...", hu: "Hosszú távon..." },
        { en: "At the same time...", hu: "Ugyanakkor..." }
    ];

    const CHUNK_SIZE = 10;

    let studentName = "";
    let moves = 0;
    let matchedInTotal = 0;
    let currentChunk = [];
    let flippedCards = [];
    let isProcessing = false;
    let fullList = [...VERB_DATA].sort(() => Math.random() - 0.5);

    function checkName() {
        const input = document.getElementById('student-name');
        const name = (window.__eb_student_name || input.value.trim());
        if (name.length < 2) { input.focus(); return; }
        studentName = name;
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        loadNextChunk();
    }

    document.getElementById('student-name').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') checkName();
    });

    function loadNextChunk() {
        document.getElementById('next-round-modal').classList.add('hidden');
        currentChunk = fullList.slice(matchedInTotal, matchedInTotal + CHUNK_SIZE);
        const roundNum = Math.floor(matchedInTotal / CHUNK_SIZE) + 1;
        document.getElementById('round-info').innerText = `${roundNum} / 5`;

        let displayCards = [];
        currentChunk.forEach((pair, idx) => {
            displayCards.push({ id: idx, text: pair.en, pairId: idx });
            displayCards.push({ id: idx + 100, text: pair.hu, pairId: idx });
        });

        displayCards.sort(() => Math.random() - 0.5);

        const grid = document.getElementById('card-grid');
        grid.innerHTML = '';
        displayCards.forEach(card => {
            const el = document.createElement('div');
            el.className = 'card-flip active-tap';
            el.innerHTML = `
                <div class="card-inner" id="card-${card.id}" onclick="handleCardClick(${card.id}, ${card.pairId})">
                    <div class="card-front">?</div>
                    <div class="card-back">${card.text}</div>
                </div>
            `;
            grid.appendChild(el);
        });

        window.scrollTo(0, 0);
    }

    function handleCardClick(id, pairId) {
    var txt = arguments[0] && arguments[0].dataset ? arguments[0].dataset.en : ""; if(txt)
        if (isProcessing) return;
        const el = document.getElementById(`card-${id}`);
        if (el.classList.contains('is-flipped') || el.classList.contains('is-matched')) return;

        el.classList.add('is-flipped');
        flippedCards.push({ id, pairId, el });

        if (flippedCards.length === 2) {
            moves++;
            document.getElementById('move-count').innerText = moves;
            isProcessing = true;

            if (flippedCards[0].pairId === flippedCards[1].pairId) {
                setTimeout(() => {
                    flippedCards.forEach(c => c.el.classList.add('is-matched'));
                    matchedInTotal++;
                    flippedCards = [];
                    isProcessing = false;

                    if (matchedInTotal % CHUNK_SIZE === 0) {
                        if (matchedInTotal === fullList.length) finishGame();
                        else document.getElementById('next-round-modal').classList.remove('hidden');
                    }
                }, 400);
            } else {
                setTimeout(() => {
                    flippedCards.forEach(c => c.el.classList.remove('is-flipped'));
                    flippedCards = [];
                    isProcessing = false;
                }, 750);
            }
        }
    }

    async function finishGame() {
        document.getElementById('game-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('display-name').innerText = studentName;
        document.getElementById('final-moves').innerText = moves;
        document.getElementById('feedback-rating').innerText = "⚡ AI elemzés folyamatban...";

        try {
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 30000);

            const response = await fetch(MAKE_WEBHOOK_URL, {
                signal: controller.signal,
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    Student: studentName,
                    Quiz: QUIZ_NAME,
                    Score: moves,
                    TotalQuestions: VERB_DATA.length,
                    Level: QUIZ_LEVEL,
                    Skill: QUIZ_SKILL,
                    CompletedAt: new Date().toISOString()
                })
            });

            clearTimeout(timeout);
            const text = await response.text();
            document.getElementById('feedback-rating').innerText = text || "Well done! Keep practising!";

        } catch (e) {
            console.error("Error:", e);
            document.getElementById('feedback-rating').innerText =
                moves <= 70 ? "Outstanding! True C1 vocabulary!" :
                moves <= 95 ? "Szép munka, de gyakorolj még!" :
                "Don't give up, try again!";
        }
    }

    function adminAccess() {
        if (prompt("Jelszó:") === "bettina2026") {
            alert("Az eredmények a Make → Airtable rendszerben mentődnek.");
        }
    }

    function restartQuiz() {
        studentName = ""; moves = 0; matchedInTotal = 0; currentChunk = [];
        flippedCards = []; isProcessing = false;
        fullList = [...VERB_DATA].sort(() => Math.random() - 0.5);

        document.getElementById('student-name').value = "";
        document.getElementById('round-info').innerText = "1 / 5";
        document.getElementById('move-count').innerText = "0";
        document.getElementById('final-moves').innerText = "0";
        document.getElementById('feedback-rating').innerText = "-";
        document.getElementById('display-name').innerText = "";
        document.getElementById('card-grid').innerHTML = "";
        document.getElementById('next-round-modal').classList.add('hidden');
        document.getElementById('result-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.add('hidden');
        document.getElementById('start-screen').classList.remove('hidden');
    }
</script>


<script>
// ═══ ENTROPY BREAKERS — DEFINITIVE AUTO-START ═══
(function() {
  var p = new URLSearchParams(window.location.search);
  var n = p.get('name');
  if (!n || n.length < 1) return;
  var name = decodeURIComponent(n);
  window.__eb_student_name = name;

  function doStart() {
    // 1. Fill all possible name inputs
    var inputIds = ['student-name','name-input','nameInput','studentName','player-name'];
    for (var i = 0; i < inputIds.length; i++) {
      var el = document.getElementById(inputIds[i]);
      if (el) el.value = name;
    }

    // 2. Set global studentName variable if it exists
    try { if (typeof studentName !== 'undefined') studentName = name; } catch(e) {}
    try { if (typeof window.studentName !== 'undefined') window.studentName = name; } catch(e) {}

    // 3. Hide start screen
    var startEl = document.getElementById('start-screen');
    if (startEl) startEl.classList.add('hidden');

    // 4. Call whichever start function exists
    var fns = ['startApp','checkName','startQuiz','startTest','start','startTraining','startPlatform'];
    for (var j = 0; j < fns.length; j++) {
      if (typeof window[fns[j]] === 'function') {
        try { window[fns[j]](); } catch(e) {}
        break;
      }
    }
  }

  // Run after full page load
  if (document.readyState === 'complete') {
    setTimeout(doStart, 100);
  } else {
    window.addEventListener('load', function() { setTimeout(doStart, 100); });
  }
})();
</script>
