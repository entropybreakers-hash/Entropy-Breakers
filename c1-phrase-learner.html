<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>C1 Phrase Learner | Entropy Breakers 🚀</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-dark: #020617;
            --neon-mint: #2dd4bf;
            --neon-indigo: #6366f1;
            --glass-bg: rgba(255, 255, 255, 0.04);
            --card-border: rgba(45, 212, 191, 0.16);
            --correct: #22c55e;
            --wrong: #ef4444;
        }
        body {
            background: radial-gradient(circle at 15% 15%, rgba(45,212,191,0.12), transparent 40%),
                        radial-gradient(circle at 85% 85%, rgba(99,102,241,0.12), transparent 40%), #020617;
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #f1f5f9; min-height: 100vh; display: flex;
            align-items: center; justify-content: center; padding: 15px; margin: 0;
        }
        .cyber-shell { background: rgba(2,6,23,0.88); backdrop-filter: blur(16px); border: 1px solid var(--card-border); box-shadow: 0 0 30px rgba(45,212,191,0.08); border-radius: 32px; width: 100%; max-width: 560px; overflow: hidden; }
        .mint-glow-text { color: var(--neon-mint); text-shadow: 0 0 14px rgba(45,212,191,0.6); }
        .aurora-title { background: linear-gradient(135deg, #fff 35%, var(--neon-mint) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass-panel { background: var(--glass-bg); border: 1px solid rgba(255,255,255,0.06); border-radius: 24px; }
        .input-field { width: 100%; padding: 18px 20px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.04); color: white; font-weight: 700; text-align: center; outline: none; transition: all 0.25s ease; }
        .input-field::placeholder { color: #94a3b8; }
        .input-field:focus { border-color: var(--neon-mint); box-shadow: 0 0 20px rgba(45,212,191,0.15); background: rgba(255,255,255,0.06); }
        .primary-btn { background: linear-gradient(135deg, #0d9488 0%, #4f46e5 100%); box-shadow: 0 0 20px rgba(45,212,191,0.22); border: 1px solid rgba(255,255,255,0.14); transition: all 0.25s ease; }
        .primary-btn:hover:not(:disabled) { filter: brightness(1.1); transform: translateY(-1px); box-shadow: 0 0 30px rgba(45,212,191,0.35); }
        .card-flip { perspective: 1000px; height: 80px; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.5s cubic-bezier(0.4,0,0.2,1); transform-style: preserve-3d; cursor: pointer; }
        .card-inner.is-flipped { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; border-radius: 16px; padding: 6px; font-weight: 700; text-align: center; }
        .card-front { background: linear-gradient(135deg, #0d9488 0%, #4f46e5 100%); color: white; border: 1px solid rgba(255,255,255,0.14); box-shadow: 0 0 16px rgba(45,212,191,0.16); font-size: 1.35rem; }
        .card-back { background: rgba(255,255,255,0.06); color: #e2e8f0; transform: rotateY(180deg); border: 1px solid rgba(255,255,255,0.08); font-size: 0.72rem; line-height: 1.3; padding: 8px; }
        .card-inner.is-matched .card-back { background: rgba(34,197,94,0.12); border-color: var(--correct); color: #bbf7d0; opacity: 0.6; }
        .grid-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .active-tap:active { transform: scale(0.96); }
        .animate-slide { animation: slideIn 0.35s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        .result-card { background: linear-gradient(135deg, rgba(13,148,136,0.18), rgba(79,70,229,0.18)); border: 1px solid rgba(45,212,191,0.16); border-radius: 32px; box-shadow: 0 0 30px rgba(45,212,191,0.08); }
    
    /* ── LEVEL COLOUR THEME ── */
    :root {
        --accent:    #F59E0B;
        --accent-l:  #FBBF24;
        --accent-ll: #FDE68A;
        --border-hi: rgba(245,158,11,0.30);
        --border-lo: rgba(245,158,11,0.15);
    }
    .orb-theme-1 { background: radial-gradient(circle, rgba(217,119,6,0.55), transparent 70%) !important; }
    .orb-theme-2 { background: radial-gradient(circle, rgba(245,158,11,0.40), transparent 70%) !important; }
    .orb-theme-3 { background: radial-gradient(circle, rgba(252,211,77,0.18), transparent 70%) !important; }
    
    </style>
</head>
<body>
<script>
// Auto-read student name from URL — injected by Entropy Breakers platform
(function() {
    var params = new URLSearchParams(window.location.search);
    var urlName = params.get('name');
    if (urlName) {
        window.__eb_student_name = decodeURIComponent(urlName);
    }
})();
</script>


<div id="app" class="cyber-shell p-6 md:p-10 relative">

    <!-- START SCREEN -->
    <div id="start-screen" class="text-center py-6">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-3xl bg-teal-500/10 mb-6 border border-teal-500/20">
            <span class="text-2xl mint-glow-text">⚡</span>
        </div>
        <h1 onclick="adminAccess()" class="text-4xl md:text-5xl font-black mb-4 tracking-tighter cursor-pointer">
            <span class="aurora-title uppercase">Entropy Breakers 🚀</span>
        </h1>
        <p class="text-xl md:text-2xl font-black text-white mb-2 uppercase tracking-tight">C1 Phrase Learner</p>
        <p class="text-teal-300 font-bold text-[10px] tracking-[0.3em] mb-4 uppercase">50 Essential C1 Phrases</p>
        <div class="space-y-4 max-w-sm mx-auto">
            <input type="text" id="student-name" placeholder="Írd be a teljes neved" class="input-field">
            <button onclick="checkName()" class="w-full py-5 primary-btn text-white rounded-2xl font-black uppercase tracking-widest active-tap">Játék indítása</button>
        </div>
        </div>

    <!-- GAME UI -->
    <div id="game-screen" class="hidden animate-slide">
        <header class="flex justify-between items-center mb-6">
            <div class="glass-panel px-4 py-2 text-[10px] font-black uppercase text-teal-300 tracking-widest">Kör: <span id="round-info">1 / 5</span></div>
            <div class="glass-panel px-4 py-2 text-[10px] font-black uppercase text-slate-300 tracking-widest">Lépés: <span id="move-count">0</span></div>
        </header>
        <div id="card-grid" class="grid-container"></div>
    </div>

    <!-- NEXT ROUND MODAL -->
    <div id="next-round-modal" class="hidden fixed inset-0 bg-slate-950/90 flex items-center justify-center z-50 p-6 backdrop-blur-md">
        <div class="cyber-shell p-8 shadow-2xl w-full text-center max-w-md">
            <div class="text-4xl mb-4">🎓</div>
            <h2 class="text-2xl font-black text-white mb-2 uppercase">Kör kész!</h2>
            <button onclick="loadNextChunk()" class="w-full py-4 primary-btn text-white font-black rounded-xl uppercase tracking-widest shadow-lg">Következő 10 kifejezés</button>
        </div>
    </div>

    <!-- RESULT SCREEN -->
    <div id="result-screen" class="hidden text-center animate-slide">
        <div class="text-6xl mb-6">🏆</div>
        <h2 class="text-3xl font-black text-white mb-2 uppercase">Kész vagy!</h2>
        <p class="text-slate-400 font-medium mb-8"><span id="display-name" class="mint-glow-text"></span>, mind az 50 C1 kifejezést teljesítetted!</p>
        <div class="result-card p-8 mb-8 shadow-2xl relative overflow-hidden">
            <div class="text-teal-300 font-black uppercase text-xs mb-2">Összesített lépésszám</div>
            <div class="text-7xl font-black text-white" id="final-moves">0</div>
            <div id="feedback-rating" class="mt-4 text-teal-200 font-bold italic">-</div>
        </div>
        <button onclick="restartQuiz()" class="w-full py-5 bg-white/5 text-slate-300 rounded-2xl font-black uppercase tracking-widest hover:bg-white/10 transition">Újrakezdés</button>
    </div>
</div>

<script>
    // ── API KEY STORED SAFELY IN MAKE.COM — NOT HERE ──
    const MAKE_WEBHOOK_URL = "https://hook.eu1.make.com/ww4obw8ghb8h46ti1gi6yoy2qg1db7ad";
    const QUIZ_NAME = "C1 Phrase Learner";
    const QUIZ_LEVEL = "C1";
    const QUIZ_SKILL = "Vocabulary";

    const VERB_DATA = [
        // ── VÉLEMÉNY / OPINION ──
        { en: "From my perspective...", hu: "Szempontomból..." },
        { en: "I am of the opinion that...", hu: "Úgy vélem, hogy..." },
        { en: "It is my firm belief that...", hu: "Határozottan úgy gondolom..." },
        { en: "I would argue that...", hu: "Azt állítanám, hogy..." },
        { en: "As far as I'm concerned...", hu: "Ami engem illet..." },
        { en: "It could be argued that...", hu: "Érvelni lehet amellett, hogy..." },
        { en: "I am inclined to think that...", hu: "Hajlok arra, hogy azt gondoljam..." },
        { en: "To my mind...", hu: "Az én megítélésem szerint..." },
        { en: "It is my view that...", hu: "Az én nézetem az, hogy..." },
        { en: "Broadly speaking...", hu: "Általánosságban véve..." },
        // ── EGYETÉRTÉS / AGREEMENT ──
        { en: "I couldn't agree more.", hu: "Teljes mértékben egyetértek." },
        { en: "You raise a valid point.", hu: "Érvényes pontot vetett fel." },
        { en: "I am inclined to agree.", hu: "Hajlok az egyetértésre." },
        { en: "That is absolutely right.", hu: "Ez teljesen helytálló." },
        { en: "I second that entirely.", hu: "Ezt teljes mértékben támogatom." },
        // ── ELLENTMONDÁS / DISAGREEMENT ──
        { en: "I beg to differ.", hu: "Engedje meg, hogy vitatkozzam." },
        { en: "I'm not entirely convinced.", hu: "Nem vagyok teljesen meggyőzve." },
        { en: "I see it differently.", hu: "Én ezt másképp látom." },
        { en: "With all due respect...", hu: "Minden tiszteletem megadva..." },
        { en: "That's not quite my view.", hu: "Ez nem egészen az én álláspontom." },
        // ── ÖSSZEKÖTŐK / DISCOURSE MARKERS ──
        { en: "Nevertheless...", hu: "Mindazonáltal..." },
        { en: "Furthermore...", hu: "Ráadásul / Emellett..." },
        { en: "Consequently...", hu: "Következésképpen..." },
        { en: "In contrast...", hu: "Ezzel szemben..." },
        { en: "On the other hand...", hu: "Másrészt..." },
        { en: "Moreover...", hu: "Továbbá..." },
        { en: "Nonetheless...", hu: "Ennek ellenére..." },
        { en: "As a result...", hu: "Ennek eredményeként..." },
        { en: "In addition to this...", hu: "Ezen kívül..." },
        { en: "By contrast...", hu: "Ezzel ellentétben..." },
        // ── MONDATNYITÓK / SENTENCE STARTERS ──
        { en: "It goes without saying that...", hu: "Magától értetődő, hogy..." },
        { en: "It is worth noting that...", hu: "Érdemes megjegyezni, hogy..." },
        { en: "There is no denying that...", hu: "Nem tagadható, hogy..." },
        { en: "It stands to reason that...", hu: "Logikus, hogy..." },
        { en: "It is widely acknowledged that...", hu: "Közismert, hogy..." },
        // ── LEZÁRÓK / CLOSING PHRASES ──
        { en: "To sum up...", hu: "Összefoglalva..." },
        { en: "All things considered...", hu: "Mindent egybevetve..." },
        { en: "On balance...", hu: "Összességében..." },
        { en: "To put it another way...", hu: "Más szóval..." },
        { en: "In the final analysis...", hu: "Végső elemzésben..." },
        // ── ÁRNYALÁS / HEDGING ──
        { en: "To a certain extent...", hu: "Bizonyos mértékig..." },
        { en: "By and large...", hu: "Nagyjából / Általában véve..." },
        { en: "In theory...", hu: "Elméletileg..." },
        { en: "Arguably...", hu: "Vitathatóan / Feltehetőleg..." },
        { en: "To be fair...", hu: "Igazságos megközelítéssel..." },
        // ── HANGSÚLYOZÁS / EMPHASIS ──
        { en: "Above all...", hu: "Mindenekelőtt..." },
        { en: "In particular...", hu: "Különösen..." },
        { en: "As a matter of fact...", hu: "Valójában / Tulajdonképpen..." },
        { en: "In the long run...", hu: "Hosszú távon..." },
        { en: "At the same time...", hu: "Ugyanakkor..." }
    ];

    const CHUNK_SIZE = 10;

    let studentName = "";
    let moves = 0;
    let matchedInTotal = 0;
    let currentChunk = [];
    let flippedCards = [];
    let isProcessing = false;
    let fullList = [...VERB_DATA].sort(() => Math.random() - 0.5);

    function checkName() {
        const input = document.getElementById('student-name');
        const name = input.value.trim();
        if (name.length < 3) { alert("Kérlek írj be legalább 3 karaktert a névhez."); input.focus(); return; }
        studentName = name;
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        loadNextChunk();
    }

    document.getElementById('student-name').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') checkName();
    });

    function loadNextChunk() {
        document.getElementById('next-round-modal').classList.add('hidden');
        currentChunk = fullList.slice(matchedInTotal, matchedInTotal + CHUNK_SIZE);
        const roundNum = Math.floor(matchedInTotal / CHUNK_SIZE) + 1;
        document.getElementById('round-info').innerText = `${roundNum} / 5`;

        let displayCards = [];
        currentChunk.forEach((pair, idx) => {
            displayCards.push({ id: idx, text: pair.en, pairId: idx });
            displayCards.push({ id: idx + 100, text: pair.hu, pairId: idx });
        });

        displayCards.sort(() => Math.random() - 0.5);

        const grid = document.getElementById('card-grid');
        grid.innerHTML = '';
        displayCards.forEach(card => {
            const el = document.createElement('div');
            el.className = 'card-flip active-tap';
            el.innerHTML = `
                <div class="card-inner" id="card-${card.id}" onclick="handleCardClick(${card.id}, ${card.pairId})">
                    <div class="card-front">?</div>
                    <div class="card-back">${card.text}</div>
                </div>
            `;
            grid.appendChild(el);
        });

        window.scrollTo(0, 0);
    }

    function handleCardClick(id, pairId) {
        if (isProcessing) return;
        const el = document.getElementById(`card-${id}`);
        if (el.classList.contains('is-flipped') || el.classList.contains('is-matched')) return;

        el.classList.add('is-flipped');
        flippedCards.push({ id, pairId, el });

        if (flippedCards.length === 2) {
            moves++;
            document.getElementById('move-count').innerText = moves;
            isProcessing = true;

            if (flippedCards[0].pairId === flippedCards[1].pairId) {
                setTimeout(() => {
                    flippedCards.forEach(c => c.el.classList.add('is-matched'));
                    matchedInTotal++;
                    flippedCards = [];
                    isProcessing = false;

                    if (matchedInTotal % CHUNK_SIZE === 0) {
                        if (matchedInTotal === fullList.length) finishGame();
                        else document.getElementById('next-round-modal').classList.remove('hidden');
                    }
                }, 400);
            } else {
                setTimeout(() => {
                    flippedCards.forEach(c => c.el.classList.remove('is-flipped'));
                    flippedCards = [];
                    isProcessing = false;
                }, 750);
            }
        }
    }

    async function finishGame() {
        document.getElementById('game-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('display-name').innerText = studentName;
        document.getElementById('final-moves').innerText = moves;
        document.getElementById('feedback-rating').innerText = "⚡ AI elemzés folyamatban...";

        try {
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 30000);

            const response = await fetch(MAKE_WEBHOOK_URL, {
                signal: controller.signal,
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    Student: studentName,
                    Quiz: QUIZ_NAME,
                    Score: moves,
                    TotalQuestions: VERB_DATA.length,
                    Level: QUIZ_LEVEL,
                    Skill: QUIZ_SKILL,
                    CompletedAt: new Date().toISOString()
                })
            });

            clearTimeout(timeout);
            const text = await response.text();
            document.getElementById('feedback-rating').innerText = text || "Szép munka! Folytasd a gyakorlást!";

        } catch (e) {
            console.error("Error:", e);
            document.getElementById('feedback-rating').innerText =
                moves <= 70 ? "Zseniális! Valódi C1 szókincs!" :
                moves <= 95 ? "Szép munka, de gyakorolj még!" :
                "Ne add fel, próbáld újra!";
        }
    }

    function adminAccess() {
        if (prompt("Jelszó:") === "bettina2026") {
            alert("Az eredmények a Make → Airtable rendszerben mentődnek.");
        }
    }

    function restartQuiz() {
        studentName = ""; moves = 0; matchedInTotal = 0; currentChunk = [];
        flippedCards = []; isProcessing = false;
        fullList = [...VERB_DATA].sort(() => Math.random() - 0.5);

        document.getElementById('student-name').value = "";
        document.getElementById('round-info').innerText = "1 / 5";
        document.getElementById('move-count').innerText = "0";
        document.getElementById('final-moves').innerText = "0";
        document.getElementById('feedback-rating').innerText = "-";
        document.getElementById('display-name').innerText = "";
        document.getElementById('card-grid').innerHTML = "";
        document.getElementById('next-round-modal').classList.add('hidden');
        document.getElementById('result-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.add('hidden');
        document.getElementById('start-screen').classList.remove('hidden');
    }
</script>

<script>
// EB Auto-start: read name from URL and skip login screen
window.addEventListener('load', function() {
    if (window.__eb_student_name) {
        var inputs = ['student-name','name-input','nameInput','studentName'];
        for (var i=0; i<inputs.length; i++) {
            var el = document.getElementById(inputs[i]);
            if (el) { el.value = window.__eb_student_name; break; }
        }
        setTimeout(function(){
            if (typeof startApp === 'function') startApp();
            else if (typeof startQuiz === 'function') startQuiz();
            else if (typeof start === 'function') start();
            else if (typeof startTest === 'function') startTest();
        }, 80);
    }
});
</script>
</body>
</html>
